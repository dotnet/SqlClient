<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1029.683 282.294" width="1029.683" height="282.294" style="--bg:#FFFFFF;--fg:#27272A;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.5, 8 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>
<polyline class="edge" data-from="A" data-to="B" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="241.265,141.147 289.265,141.147" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="B" data-to="C" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="452.739,141.147 500.739,141.147" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="C" data-to="D" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="No" points="669.3173333333333,107.43133333333333 739.0329999999999,107.43133333333333 739.0329999999999,100.24699999999999 824.721,100.24699999999999" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="C" data-to="E" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="Yes" points="669.3173333333333,174.86266666666666 739.0329999999999,174.86266666666666 739.0329999999999,182.047 824.721,182.047" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<g class="edge-label" data-from="C" data-to="D" data-label="No">
  <rect x="747.0329999999999" y="84.24699999999999" width="30.718000000000004" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="762.3919999999999" y="99.39699999999999" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">No</text>
</g>
<g class="edge-label" data-from="C" data-to="E" data-label="Yes">
  <rect x="747.0329999999999" y="166.047" width="36.658" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="765.3619999999999" y="181.197" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">Yes</text>
</g>
<g class="node" data-id="A" data-label="TransactionScope created" data-shape="rectangle">
  <rect x="40" y="122.69699999999999" width="201.265" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="140.6325" y="141.147" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">TransactionScope created</text>
</g>
<g class="node" data-id="B" data-label="1st connection enlists" data-shape="rectangle">
  <rect x="289.265" y="122.69699999999999" width="163.474" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="371.00199999999995" y="141.147" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">1st connection enlists</text>
</g>
<g class="node" data-id="C" data-label="2nd durable resource?" data-shape="diamond">
  <polygon points="601.886,40 703.0329999999999,141.147 601.886,242.29399999999998 500.739,141.147" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="601.886" y="141.147" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">2nd durable resource?</text>
</g>
<g class="node" data-id="D" data-label="⚡ Lightweight
(no MSDTC)" data-shape="rectangle">
  <rect x="824.721" y="73.34699999999998" width="125.68299999999999" height="53.800000000000004" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="887.5625" y="100.24699999999999" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="887.5625" dy="-3.9000000000000012">⚡ Lightweight</tspan><tspan x="887.5625" dy="16.900000000000002">(no MSDTC)</tspan></text>
</g>
<g class="node" data-id="E" data-label="🐢 Promoted to
Distributed (MSDTC)" data-shape="rectangle">
  <rect x="824.721" y="155.147" width="161.992" height="53.800000000000004" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="905.717" y="182.047" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="905.717" dy="-3.9000000000000012">🐢 Promoted to</tspan><tspan x="905.717" dy="16.900000000000002">Distributed (MSDTC)</tspan></text>
</g>
</svg>