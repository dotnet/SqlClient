  <text x="724.5424999999999" y="72.0175" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Clear EnlistedTx</text>
</g>
<g class="node" data-id="E" data-label="Keep EnlistedTx" data-shape="rectangle">
  <rect x="654.2909999999999" y="118.4675" width="139.021" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="723.8014999999999" y="136.91750000000002" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Keep EnlistedTx</text>
</g>
<g class="node" data-id="F" data-label="→ General Pool" data-shape="rectangle">
  <rect x="842.0529999999999" y="53.567499999999995" width="127.90599999999999" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="906.0059999999999" y="72.0175" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">→ General Pool</text>
</g>
<g class="node" data-id="G" data-label="→ Transacted Pool" data-shape="rectangle">
  <rect x="842.0529999999999" y="118.4675" width="150.136" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="917.1209999999999" y="136.91750000000002" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">→ Transacted Pool</text>
</g>
<g class="node" data-id="H" data-label="TxCompleted event" data-shape="rectangle">
  <rect x="1119.6699999999998" y="118.4675" width="153.841" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="1196.5904999999998" y="136.91750000000002" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">TxCompleted event</text>
</g>
</svg>