  <rect x="204.05" y="86.0175" width="151.618" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="279.85900000000004" y="104.4675" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">DetachIfTxEnded()</text>
</g>
<g class="node" data-id="C" data-label="Tx ended?" data-shape="diamond">
  <polygon points="468.1355,40 532.603,104.4675 468.1355,168.935 403.668,104.4675" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="468.1355" y="104.4675" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Tx ended?</text>
</g>
