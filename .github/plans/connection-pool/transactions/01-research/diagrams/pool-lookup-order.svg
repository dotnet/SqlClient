<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1071.432 308.97" width="1071.432" height="308.97" style="--bg:#FFFFFF;--fg:#27272A;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.5, 8 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>
<polyline class="edge" data-from="A" data-to="B" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="Yes" points="230.80833333333334,116.32333333333334 393.62800000000004,116.32333333333334" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="A" data-to="C" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="No" points="230.80833333333337,192.64666666666668 659.0980000000001,192.64666666666668 659.0980000000001,160.63500000000002 671.0980000000001,160.63500000000002" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="B" data-to="C" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="Miss" points="542.282,116.32333333333334 659.0980000000001,116.32333333333334 659.0980000000001,148.335 671.0980000000001,148.335" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="C" data-to="D" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="Empty" points="775.292,154.485 909.4540000000001,154.485" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<g class="edge-label" data-from="A" data-to="B" data-label="Yes">
  <rect x="312.97" y="100.32333333333334" width="36.658" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="331.29900000000004" y="115.47333333333334" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">Yes</text>
</g>
<g class="edge-label" data-from="A" data-to="C" data-label="No">
  <rect x="596.3800000000001" y="176.64666666666668" width="30.718000000000004" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="611.7390000000001" y="191.79666666666668" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">No</text>
</g>
<g class="edge-label" data-from="B" data-to="C" data-label="Miss">
  <rect x="586.282" y="100.32333333333334" width="40.816" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="606.69" y="115.47333333333334" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">Miss</text>
</g>
<g class="edge-label" data-from="C" data-to="D" data-label="Empty">
  <rect x="819.292" y="138.485" width="46.162" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="842.373" y="153.63500000000002" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">Empty</text>
</g>
<g class="node" data-id="A" data-label="HasTxAffinity &amp; Tx.Current?" data-shape="diamond">
  <polygon points="154.485,40.000000000000014 268.97,154.485 154.485,268.97 40.000000000000014,154.485" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="154.485" y="154.485" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">HasTxAffinity &amp; Tx.Current?</text>
</g>
<g class="node" data-id="B" data-label="1. Transacted Pool" data-shape="rectangle">
  <rect x="393.62800000000004" y="97.87333333333333" width="148.654" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="467.95500000000004" y="116.32333333333334" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">1. Transacted Pool</text>
</g>
<g class="node" data-id="C" data-label="2. Idle Pool" data-shape="rectangle">
  <rect x="671.0980000000001" y="136.03500000000003" width="104.194" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="723.195" y="154.485" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">2. Idle Pool</text>
</g>
<g class="node" data-id="D" data-label="3. Create New" data-shape="rectangle">
  <rect x="909.4540000000001" y="136.03500000000003" width="121.97799999999998" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="970.4430000000001" y="154.485" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">3. Create New</text>
</g>
</svg>