#################################################################################
#
# Cherry-pick Hotfix to Release Branch
#
# Automatically cherry-picks merged PRs into release branches when a
# "Hotfix <version>" label is present. Supports multiple hotfix labels on
# a single PR — each one produces an independent cherry-pick PR targeting
# the corresponding release/<version> branch.
#
# Usage:
#   1. Merge a PR to the default branch.
#   2. Add a "Hotfix <version>" label (e.g. "Hotfix 7.0.1") either before
#      or after merging.
#   3. The workflow derives the release branch from the label's major.minor
#      version (e.g. "Hotfix 7.0.1" → release/7.0) and creates a cherry-pick
#      PR prefixed with "[<version> Cherry-pick]".
#   4. If the cherry-pick has conflicts, a placeholder PR is opened with
#      "[<version> Cherry-pick - CONFLICTS]" and manual resolution steps.
#
#################################################################################

name: Cherry-pick Hotfix to release branch

# Triggers:
#   - 'closed': fires at merge time — if a "Hotfix <version>" label is already present,
#     the cherry-pick runs immediately.
#   - 'labeled': fires when a label is added after merge — allows retroactive cherry-picks
#     by adding the label to an already-merged PR.
on:
  pull_request_target:
    types: [closed, labeled]

# 'contents: write' is needed to push the cherry-pick branch.
# 'pull-requests: write' is needed to create the new PR via the GitHub CLI.
permissions:
  contents: write
  pull-requests: write

jobs:
  # First job: extract all hotfix versions from the PR labels and emit them as
  # a JSON array so the matrix strategy can fan out one job per version.
  detect-versions:
    runs-on: ubuntu-latest
    # Only fire for merged PRs targeting the default branch that have at least
    # one "Hotfix *" label.  The default-branch guard prevents recursive
    # cherry-picks when a cherry-pick PR is merged into a release branch.
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == github.event.repository.default_branch &&
      join(github.event.pull_request.labels.*.name, ' ') != '' &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'Hotfix ')
    outputs:
      versions: ${{ steps.extract.outputs.versions }}
    steps:
      - name: Extract hotfix versions from labels
        id: extract
        env:
          # Pass label names via env to avoid script injection from label text.
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          # For the 'labeled' event, this is the single label that was just added.
          # For the 'closed' event this is empty, meaning all labels are processed.
          EVENT_LABEL: ${{ github.event.label.name || '' }}
          EVENT_ACTION: ${{ github.event.action }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # For the 'labeled' event, only process the newly added label to avoid
          # re-processing labels that were already cherry-picked.
          if [[ "${EVENT_ACTION}" == "labeled" ]]; then
            CANDIDATE=$(echo "${EVENT_LABEL}" | sed -n 's/^Hotfix \([0-9]\+\.[0-9]\+\.[0-9]\+\)$/\1/p')
            if [[ -z "${CANDIDATE}" ]]; then
              echo "Label '${EVENT_LABEL}' is not a valid 'Hotfix X.Y.Z' label. Skipping."
              echo "versions=[]" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            # Skip if a cherry-pick branch or open PR already exists for this version.
            CHERRY_PICK_BRANCH="dev/automation/pr-${PR_NUMBER}-to-${CANDIDATE}"
            if git ls-remote --heads origin "${CHERRY_PICK_BRANCH}" | grep -q .; then
              echo "Cherry-pick branch '${CHERRY_PICK_BRANCH}' already exists. Skipping."
              echo "versions=[]" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            EXISTING_PR=$(gh pr list --head "${CHERRY_PICK_BRANCH}" --state all --json number --jq 'length')
            if [[ "${EXISTING_PR}" -gt 0 ]]; then
              echo "A cherry-pick PR from '${CHERRY_PICK_BRANCH}' already exists. Skipping."
              echo "versions=[]" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            VERSIONS="${CANDIDATE}"
          else
            # 'closed' event: process all hotfix labels on the PR.
            VERSIONS=$(echo "${LABELS}" | tr ',' '\n' | sed -n 's/^Hotfix \([0-9]\+\.[0-9]\+\.[0-9]\+\)$/\1/p')
          fi

          # Extract version strings matching X.Y.Z (e.g. "7.0.1", "8.0.0") from
          # "Hotfix X.Y.Z" labels. Rejects malformed labels to avoid invalid
          # branch names or milestone lookups.
          if [[ -z "${VERSIONS}" ]]; then
            echo "::error::No valid 'Hotfix X.Y.Z' label found. Labels must match 'Hotfix <major>.<minor>.<patch>'."
            exit 1
          fi
          # Convert newline-separated list to JSON array: ["7.0.1","8.0.0"]
          JSON=$(echo "${VERSIONS}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "versions=${JSON}" >> "${GITHUB_OUTPUT}"
          echo "Detected hotfix versions: ${JSON}"

  # Second job: runs once per detected version, cherry-picking the merge commit
  # into each target release branch.
  cherry-pick:
    needs: detect-versions
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel other cherry-picks if one version fails.
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.detect-versions.outputs.versions) }}
    name: Cherry-pick to release branch (${{ matrix.version }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history is required so the merge commit and target branch are available
          # for the cherry-pick operation.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Cherry-pick and create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          VERSION: ${{ matrix.version }}
        run: |
          # Derive major.minor from the full version for branch targeting.
          # e.g. "7.0.1" → "7.0", so the target branch is release/7.0.
          BRANCH_VERSION=$(echo "${VERSION}" | grep -oP '^\d+\.\d+')
          if [[ -z "${BRANCH_VERSION}" ]]; then
            echo "::error::Could not parse major.minor from version '${VERSION}'."
            exit 1
          fi

          TARGET_BRANCH="release/${BRANCH_VERSION}"
          CHERRY_PICK_BRANCH="dev/automation/pr-${PR_NUMBER}-to-${VERSION}"

          git fetch origin "${TARGET_BRANCH}"

          # Check if the commit's changes are already applied on the target branch.
          # 'git cherry' marks already-applied patches with '-' and unapplied with '+'.
          if git cherry "origin/${TARGET_BRANCH}" "${MERGE_COMMIT_SHA}^" "${MERGE_COMMIT_SHA}" | grep -q '^-'; then
            echo "::notice::Commit ${MERGE_COMMIT_SHA} is already applied on ${TARGET_BRANCH}. Skipping cherry-pick."
            exit 0
          fi

          git checkout -b "${CHERRY_PICK_BRANCH}" "origin/${TARGET_BRANCH}"

          # --mainline 1 is required for merge commits (2+ parents) but fails
          # on squash-merge commits (single parent). Detect and adapt.
          PARENT_COUNT=$(git rev-list --parents -n1 "${MERGE_COMMIT_SHA}" | awk '{print NF - 1}')
          MAINLINE_FLAG=""
          if [[ "${PARENT_COUNT}" -gt 1 ]]; then
            MAINLINE_FLAG="--mainline 1"
          fi

          if git cherry-pick "${MERGE_COMMIT_SHA}" ${MAINLINE_FLAG}; then
            git push origin "${CHERRY_PICK_BRANCH}"

            # Look up the milestone; if it doesn't exist yet, create the PR
            # without one and note the gap in the description.
            MILESTONE_ARG=""
            MILESTONE_NOTE=""
            if gh api "repos/${GITHUB_REPOSITORY}/milestones" --jq '.[].title' | grep -qx "${VERSION}"; then
              MILESTONE_ARG="--milestone ${VERSION}"
            else
              echo "::warning::Milestone '${VERSION}' does not exist. PR will be created without a milestone."
              MILESTONE_NOTE=$'\n\n> **Note:** Milestone `'"${VERSION}"'` does not exist yet. Please create it and assign this PR manually.'
            fi

            gh pr create \
              --base "${TARGET_BRANCH}" \
              --head "${CHERRY_PICK_BRANCH}" \
              --title "[${VERSION} Cherry-pick] ${PR_TITLE}" \
              --body "Cherry-pick of #${PR_NUMBER} (${MERGE_COMMIT_SHA}) into \`${TARGET_BRANCH}\`.${MILESTONE_NOTE}" \
              ${MILESTONE_ARG}
          else
            # Surface the failure in the workflow run summary.
            echo "::error::Cherry-pick of ${MERGE_COMMIT_SHA} failed due to conflicts."
            git cherry-pick --abort

            # Build the cherry-pick command for the conflict-resolution instructions.
            CHERRY_PICK_CMD="git cherry-pick ${MERGE_COMMIT_SHA}"
            if [[ -n "${MAINLINE_FLAG}" ]]; then
              CHERRY_PICK_CMD="${CHERRY_PICK_CMD} ${MAINLINE_FLAG}"
            fi

            # Create a PR with an empty commit so the team is notified and can
            # resolve conflicts manually. The PR body includes the commands needed.
            git checkout "origin/${TARGET_BRANCH}"
            git checkout -B "${CHERRY_PICK_BRANCH}"
            git commit --allow-empty \
              -m "Cherry-pick of #${PR_NUMBER} requires manual resolution" \
              -m "To resolve, run:  ${CHERRY_PICK_CMD}"
            git push origin "${CHERRY_PICK_BRANCH}"

            # Look up the milestone for the conflict PR as well.
            MILESTONE_ARG=""
            MILESTONE_NOTE=""
            if gh api "repos/${GITHUB_REPOSITORY}/milestones" --jq '.[].title' | grep -qx "${VERSION}"; then
              MILESTONE_ARG="--milestone ${VERSION}"
            else
              echo "::warning::Milestone '${VERSION}' does not exist. PR will be created without a milestone."
              MILESTONE_NOTE=$'\n\n> **Note:** Milestone `'"${VERSION}"'` does not exist yet. Please create it and assign this PR manually.'
            fi

            gh pr create \
              --base "${TARGET_BRANCH}" \
              --head "${CHERRY_PICK_BRANCH}" \
              --title "[${VERSION} Cherry-pick - CONFLICTS] ${PR_TITLE}" \
              ${MILESTONE_ARG} \
              --body $'Cherry-pick of #'"${PR_NUMBER}"' ('"${MERGE_COMMIT_SHA}"') into `'"${TARGET_BRANCH}"'` **failed due to merge conflicts**.'"${MILESTONE_NOTE}"$'\n\nPlease resolve manually:\n```bash\ngit fetch origin\ngit checkout '"${CHERRY_PICK_BRANCH}"'\n'"${CHERRY_PICK_CMD}"$'\n# resolve conflicts\ngit push origin '"${CHERRY_PICK_BRANCH}"' --force\n```'
          fi
