name: Auto-assign PR assignees

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, milestoned]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: auto-assign-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-assign:
    name: Assign least busy assignees
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.milestone != null
    steps:
      - name: Pick assignees from load-balanced pool
        uses: actions/github-script@v8
        env:
          ASSIGNEE_POOL: ${{ vars.AUTO_ASSIGN_ASSIGNEE_POOL }}
        with:
          script: |
            const pool = [...new Set(
              (process.env.ASSIGNEE_POOL || '')
                .split(',')
                .map(login => login.trim())
                .filter(Boolean)
            )];

            // This workflow intentionally load-balances across a six-person
            // alias pool.
            const expectedPoolSize = 6;
            const targetAssignees = 2;

            if (pool.length !== expectedPoolSize) {
              core.warning(
                'AUTO_ASSIGN_ASSIGNEE_POOL must contain exactly 6 usernames.'
              );
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const author = pr.user.login.toLowerCase();
            const existing = new Set(
              (pr.assignees || []).map(a => a.login.toLowerCase())
            );

            const existingFromPool = pool.filter(
              login => existing.has(login.toLowerCase())
            );
            const needed = Math.max(
              0,
              targetAssignees - existingFromPool.length
            );
            if (needed === 0) {
              core.info('PR already has two pool assignees.');
              return;
            }

            const candidates = pool.filter(login =>
              login.toLowerCase() !== author &&
              !existing.has(login.toLowerCase()));

            if (candidates.length === 0) {
              core.info(
                'No eligible assignees after filtering out author and existing.'
              );
              return;
            }

            const openPulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            const reviewEligiblePulls = openPulls.filter(
              openPr => !openPr.draft
            );

            const load = candidates.map(login => {
              const count = reviewEligiblePulls.filter(openPr =>
                (openPr.assignees || []).some(
                  assignee =>
                    assignee.login.toLowerCase() === login.toLowerCase()
                )
              ).length;

              return { login, count };
            });
            }

            load.sort(
              (a, b) => a.count - b.count || a.login.localeCompare(b.login)
            );

            const selected = load.slice(0, needed).map(entry => entry.login);
            if (selected.length === 0) {
              core.info('No assignees selected.');
              return;
            }

            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: pr.number,
              assignees: selected
            });

            core.info(`Assigned: ${selected.join(', ')}`);
