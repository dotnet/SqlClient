name: Auto-assign PR assignees

# Required repository variables:
# - AUTO_ASSIGN_ASSIGNEE_POOL: comma-separated GitHub usernames
# - AUTO_ASSIGN_EXPECTED_POOL_SIZE: expected pool size (default: 6)
# - AUTO_ASSIGN_TARGET_ASSIGNEES: assignees to add per PR (default: 2)
on:
  # pull_request_target is required because assignment needs write permissions.
  # This workflow does not check out or execute PR code.
  pull_request_target:
    types: [opened, reopened, ready_for_review, milestoned]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: auto-assign-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-assign:
    name: Assign least busy assignees
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.milestone != null
    steps:
      - name: Pick assignees from load-balanced pool
        uses: actions/github-script@v8
        env:
          # Comma-separated GitHub usernames; spaces are trimmed
          # (for example: user1, user2, user3).
          ASSIGNEE_POOL: ${{ vars.AUTO_ASSIGN_ASSIGNEE_POOL }}
          EXPECTED_POOL_SIZE: ${{ vars.AUTO_ASSIGN_EXPECTED_POOL_SIZE || '6' }}
          TARGET_ASSIGNEES: ${{ vars.AUTO_ASSIGN_TARGET_ASSIGNEES || '2' }}
        with:
          script: |
            const pool = [...new Set(
              (process.env.ASSIGNEE_POOL || '')
                .split(',')
                .map(login => login.trim())
                .filter(Boolean)
            )];

            // This workflow intentionally load-balances across an exact pool
            // size defined by policy for this repository.
            const expectedPoolSize = parseInt(
              process.env.EXPECTED_POOL_SIZE || '6',
              10
            );
            const targetAssignees = parseInt(
              process.env.TARGET_ASSIGNEES || '2',
              10
            );

            if (
              Number.isNaN(expectedPoolSize) ||
              Number.isNaN(targetAssignees)
            ) {
              core.warning(
                'EXPECTED_POOL_SIZE ' +
                `(${process.env.EXPECTED_POOL_SIZE}) and TARGET_ASSIGNEES ` +
                `(${process.env.TARGET_ASSIGNEES}) must be valid numbers.`
              );
              return;
            }

            if (pool.length !== expectedPoolSize) {
              core.warning(
                `AUTO_ASSIGN_ASSIGNEE_POOL must contain exactly ` +
                `${expectedPoolSize} usernames, but found ${pool.length}.`
              );
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const author = pr.user.login.toLowerCase();
            const existing = new Set(
              (pr.assignees || []).map(a => a.login.toLowerCase())
            );

            const existingFromPool = pool.filter(
              login => existing.has(login.toLowerCase())
            );
            const needed = Math.max(
              0,
              targetAssignees - existingFromPool.length
            );
            if (needed === 0) {
              core.info(
                `PR already has ${targetAssignees} pool assignees.`
              );
              return;
            }

            const candidates = pool.filter(login => {
              return (
                login.toLowerCase() !== author &&
                !existing.has(login.toLowerCase())
              );
            });

            if (candidates.length === 0) {
              core.info(
                'No eligible assignees after filtering out author and existing.'
              );
              return;
            }

            // This makes at most one query per candidate in the configured
            // pool.
            let load;
            try {
              load = await Promise.all(candidates.map(async login => {
                const q =
                  `repo:${owner}/${repo} is:pr is:open draft:false ` +
                  `assignee:${login}`;
                const { data } =
                  await github.rest.search.issuesAndPullRequests({
                    q,
                    per_page: 1
                  });
                return { login, count: data.total_count };
              }));
            } catch (error) {
              core.setFailed(
                `Failed to calculate assignee load: ${error.message}`
              );
              return;
            }

            load.sort(
              (a, b) => a.count - b.count || a.login.localeCompare(b.login)
            );

            const selected = load.slice(0, needed).map(entry => entry.login);
            if (selected.length === 0) {
              core.info('No assignees selected.');
              return;
            }

            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: pr.number,
              assignees: selected
            });

            core.info(`Assigned: ${selected.join(', ')}`);
