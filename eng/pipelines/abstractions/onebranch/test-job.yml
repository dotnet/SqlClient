parameters:

  # The build configuration to use.
  - name: buildConfiguration
    type: string
    values:
      - Debug
      - Release

  # True to enable debug steps and logging.
  - name: debug
    type: boolean
    default: false

  # The verbosity level for the dotnet CLI commands.
  - name: dotnetVerbosity
    type: string
    default: normal
    values:
    - quiet
    - minimal
    - normal
    - detailed
    - diagnostic

jobs:
  - job: test_job
    displayName: Run Tests

    pool:
      type: linux

    variables:
      - template: /eng/pipelines/abstractions/onebranch/variables.yml@self

    steps:
      # Install the .NET SDK.
      - template: /eng/pipelines/steps/install-dotnet.yml@self

      # Run the unit tests.
      - task: DotNetCoreCLI@2
        displayName: Run Unit Tests
        inputs:
          command: custom
          custom: test
          projects: $(Build.SourcesDirectory)/src/Microsoft.Data.SqlClient.Extensions/Abstractions/src/Abstractions.csproj
          arguments: >-
            --configuration ${{ parameters.buildConfiguration }}
            -p:AbstractionsAssemblyFileVersion=$(abstractionsAssemblyFileVersion)
            -p:AbstractionsPackageVersion=$(abstractionsPackageVersion)
            -p:ReferenceType=Package
            --verbosity ${{ parameters.dotnetVerbosity }}
