# SqlClient Performance Test pipeline.
#
# This pipeline runs the Microsoft.Data.SqlClient BenchmarkDotNet performance tests on the internal
# "Perf Test Lab" (Azure Dedicated Hosts).  It does so by consuming the reusable extends template
# published by the InternalDriverTools/PerfTest repository:
#
#   v1/Perf.Test.Job.yml@PerfTemplates
#
# See the design/usage guidance on the wiki:
#   InternalDriverTools.wiki - "Performance Test Automation" (page 284)
#
# The template owns the full run lifecycle (SSH key generation, dedicated-host VM provisioning, test
# execution over SSH, result collection, and teardown).  All this pipeline supplies is:
#
#   * the source directory to copy to the VM (testRootDir),
#   * the entry-point script to execute on the VM (testScript + testScriptArgs),
#   * the results subfolder to copy back (testResultsSubDir), and
#   * optional post-test steps to surface the results.
#
# The on-VM script (eng/pipelines/perf/scripts/run-perf-tests.*) installs the .NET SDK, creates the
# perf database, injects the VM's SQL Server connection string into the benchmark runner config,
# pins the client to the reserved CPU set, runs the benchmarks, and collects the BenchmarkDotNet
# artifacts into the results subfolder.

# Set the pipeline run name to the day-of-year and the daily run counter.
name: $(DayOfYear)$(Rev:rr)

# This pipeline is manual/scheduled only; never trigger on PRs or commits.
pr: none
trigger: none

# Uncomment to run nightly.  Times are UTC.
# schedules:
#   - cron: "0 6 * * *"
#     displayName: Nightly performance run
#     branches:
#       include:
#         - main
#     always: true

parameters:

  # Target OS for the perf VM and the benchmark client.
  - name: platform
    displayName: Platform
    type: string
    default: linux
    values:
      - linux
      - windows

  # The build configuration used to build and run the benchmarks on the VM.  Performance numbers are
  # only meaningful in Release, so that is the default (and only) supported value.
  - name: buildConfiguration
    displayName: Build Configuration
    type: string
    default: Release
    values:
      - Release

  # The .NET runtime the benchmarks are executed against.  Must be one of the target frameworks of
  # the PerformanceTests project (net8.0/net9.0/net10.0).
  - name: dotnetFramework
    displayName: .NET Framework (TFM)
    type: string
    default: net9.0
    values:
      - net8.0
      - net9.0
      - net10.0

  # Maximum time (minutes) the template waits for the benchmark run on the VM before timing out.
  - name: testTimeoutMinutes
    displayName: Test Timeout (minutes)
    type: number
    default: 180

  # The folder name this repository ('self') is checked out into.  The Perf.Test.Job template
  # performs a MULTI-REPO checkout ('checkout: self' + the template repo), so Azure DevOps places
  # 'self' under $(Build.SourcesDirectory)/<repoName> rather than at $(Build.SourcesDirectory)
  # directly (mirroring how the template repo lands at $(Build.SourcesDirectory)/PerfTest).  This
  # must match the ADO repository name for the SqlClient repo hosting this pipeline.
  - name: sourcesSubDir
    displayName: Self checkout folder name
    type: string
    default: dotnet-sqlclient

  # The released Microsoft.Data.SqlClient version the branch under test is benchmarked against.
  # Manually managed: bump this after each stable release (e.g. to the latest 7.0.x).  Overridable
  # at queue time.  Set to an empty string to skip the baseline pass and run current-only.
  - name: baselineVersion
    displayName: Baseline Version
    type: string
    default: 7.0.2

  # Percent slowdown (current vs baseline mean) that the comparison flags as a regression.
  - name: regressionThreshold
    displayName: Regression Threshold (%)
    type: number
    default: 10

  # --- Kusto (perf-results database) ingestion -----------------------------------------------------
  # Ingestion into the InternalDriverTools perf-results Kusto database (wiki spec 270) is OPTIONAL:
  # it only runs when both kustoClusterUri and kustoServiceConnection are supplied.  This lets the
  # pipeline run + compare before the cluster/service connection are provisioned.
  - name: kustoClusterUri
    displayName: Kusto Cluster URI (blank = skip ingestion)
    type: string
    default: ''

  - name: kustoDatabase
    displayName: Kusto Database
    type: string
    default: PerfResults

  # An Azure DevOps ARM service connection whose service principal has 'Database Ingestor' (and
  # 'Database Viewer') rights on the Kusto database above.
  - name: kustoServiceConnection
    displayName: Kusto Service Connection (blank = skip ingestion)
    type: string
    default: ''

  # Logical driver name recorded on every row (schema DriverName / DerivedRunId component).
  - name: driverName
    displayName: Driver Name
    type: string
    default: Microsoft.Data.SqlClient

# Reference the PerfTest repository that hosts the reusable extends template.  Driver-team projects
# have been onboarded with the Agent Pools and Service Connections required to consume it.
resources:
  repositories:
    - repository: PerfTemplates
      type: git
      name: InternalDriverTools/PerfTest
      ref: refs/heads/main

# Consume the Perf Test Lab template.  The template defines the whole job/stage structure; we only
# pass parameters into it.
extends:
  template: v1/Perf.Test.Job.yml@PerfTemplates
  parameters:
    platform: ${{ parameters.platform }}

    # The entire driver source tree is copied to the VM so the benchmarks (which reference
    # Microsoft.Data.SqlClient as a project) can be built from source against the current commit.
    # Under the template's multi-repo checkout, 'self' lands in a repo-named subfolder.
    testRootDir: $(Build.SourcesDirectory)/${{ parameters.sourcesSubDir }}

    # Entry-point script (relative to testRootDir), selected by platform.  Linux uses bash, Windows
    # uses PowerShell, per the template's .sh/.ps1 convention.
    ${{ if eq(parameters.platform, 'windows') }}:
      testScript: eng/pipelines/perf/scripts/run-perf-tests.ps1
    ${{ else }}:
      testScript: eng/pipelines/perf/scripts/run-perf-tests.sh

    # Arguments forwarded to the script.  The script also reads SQL_SERVER, SQL_PASSWORD and
    # PERF_CLIENT_CPUS directly from the VM session environment (injected by the template).
    testScriptArgs: '--configuration ${{ parameters.buildConfiguration }} --framework ${{ parameters.dotnetFramework }} --results-subdir perf-results --baseline-version ${{ parameters.baselineVersion }} --regression-threshold ${{ parameters.regressionThreshold }}'

    # Subfolder (relative to testRootDir on the VM) the script writes results into.  The template
    # copies this VM folder back to the agent, but always lands it at a fixed location:
    # $(Build.ArtifactStagingDirectory)/results (and publishes it as the 'perf-results' artifact).
    testResultsSubDir: perf-results

    testTimeoutMinutes: ${{ parameters.testTimeoutMinutes }}
    jobName: SqlClientPerf

    # Post-test steps run on the agent after results have been copied back.  The template already
    # publishes the results artifact and attaches any top-level results/*.md as run summaries; this
    # step additionally surfaces the BenchmarkDotNet markdown reports in the build log.
    steps:
      - bash: |
          set -euo pipefail
          resultsDir="$(Build.ArtifactStagingDirectory)/results"
          echo "=== Performance results ($resultsDir) ==="
          if [ ! -d "$resultsDir" ]; then
            echo "##vso[task.logissue type=warning]No results directory was collected from the VM."
            exit 0
          fi
          find "$resultsDir" -type f | sort
          echo
          # Print every BenchmarkDotNet GitHub-markdown report that was produced.
          while IFS= read -r report; do
            echo "----------------------------------------------------------------"
            echo "### $report"
            echo "----------------------------------------------------------------"
            cat "$report"
            echo
          done < <(find "$resultsDir" -type f -name '*-report-github.md' | sort)
        displayName: 'Show performance results'
        condition: succeededOrFailed()

      # Translate the BenchmarkDotNet "full" JSON from both passes into the Kusto perf-results
      # schema (wiki 270): one PerfRun row + N PerfBenchmarkResult rows per pass, as NDJSON.  This
      # runs on the AGENT (which has native pipeline-context variables and the collected results)
      # and always executes so the NDJSON is published even when ingestion is skipped.
      - bash: |
          set -euo pipefail
          repoDir="$(Build.SourcesDirectory)/${{ parameters.sourcesSubDir }}"
          scriptsDir="$repoDir/eng/pipelines/perf/scripts"
          resultsDir="$(Build.ArtifactStagingDirectory)/results"
          kustoOut="$(Build.ArtifactStagingDirectory)/kusto"
          mkdir -p "$kustoOut"

          if [ ! -d "$resultsDir/current" ]; then
            echo "##vso[task.logissue type=warning]No 'current' results found; skipping Kusto translation."
            exit 0
          fi

          buildUrl="$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)"
          machineName="$(Agent.MachineName)"
          # The VM writes its hostname into runinfo.env; prefer it when present.
          if [ -f "$resultsDir/runinfo.env" ]; then
            # shellcheck disable=SC1091
            . "$resultsDir/runinfo.env" 2>/dev/null || true
            machineName="${MACHINE_NAME:-$machineName}"
          fi

          commitHash="$(Build.SourceVersion)"
          commitDate="$(git -C "$repoDir" show -s --format=%cI "$commitHash" 2>/dev/null || true)"
          shortSha="$(git -C "$repoDir" rev-parse --short "$commitHash" 2>/dev/null || echo "$commitHash")"

          # --- current (branch under test) ---
          python3 "$scriptsDir/perf_to_kusto.py" \
            --input-dir "$resultsDir/current" \
            --out-run "$kustoOut/current.PerfRun.ndjson" \
            --out-results "$kustoOut/current.PerfBenchmarkResult.ndjson" \
            --driver-name "${{ parameters.driverName }}" \
            --machine-name "$machineName" \
            --agent-name "$(Agent.MachineName)" \
            --pipeline-run-id "$(Build.BuildId)" \
            --build-url "$buildUrl" \
            --branch-name "$(Build.SourceBranch)" \
            --version-string "$shortSha" \
            --commit-hash "$commitHash" \
            --commit-date "$commitDate" \
            --is-comparable-base false

          # --- baseline (released NuGet package), when a baseline pass ran ---
          if [ -d "$resultsDir/baseline" ]; then
            baseVer="${{ parameters.baselineVersion }}"
            python3 "$scriptsDir/perf_to_kusto.py" \
              --input-dir "$resultsDir/baseline" \
              --out-run "$kustoOut/baseline.PerfRun.ndjson" \
              --out-results "$kustoOut/baseline.PerfBenchmarkResult.ndjson" \
              --driver-name "${{ parameters.driverName }}" \
              --machine-name "$machineName" \
              --agent-name "$(Agent.MachineName)" \
              --pipeline-run-id "$(Build.BuildId)" \
              --build-url "$buildUrl" \
              --branch-name "refs/tags/v$baseVer" \
              --version-string "$baseVer" \
              --commit-hash "v$baseVer" \
              --is-comparable-base true
          fi

          echo "Translated Kusto payloads:"
          find "$kustoOut" -type f | sort
        displayName: 'Translate results to Kusto schema'
        condition: succeededOrFailed()

      # Publish the translated NDJSON alongside the raw results for traceability / manual ingestion.
      - task: PublishPipelineArtifact@1
        displayName: 'Publish Kusto payloads'
        condition: succeededOrFailed()
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)/kusto
          artifact: perf-kusto-payloads

      # Ingest both result sets into the Kusto perf-results database using the ARM service
      # connection's service principal (az CLI auth).  Conditional: only runs when a cluster URI and
      # a service connection are supplied, so the pipeline still runs+compares before the cluster is
      # provisioned.
      - ${{ if and(ne(parameters.kustoClusterUri, ''), ne(parameters.kustoServiceConnection, '')) }}:
          - task: AzureCLI@2
            displayName: 'Ingest results into Kusto'
            condition: succeededOrFailed()
            inputs:
              azureSubscription: ${{ parameters.kustoServiceConnection }}
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                scriptsDir="$(Build.SourcesDirectory)/${{ parameters.sourcesSubDir }}/eng/pipelines/perf/scripts"
                kustoOut="$(Build.ArtifactStagingDirectory)/kusto"

                python3 -m pip install --quiet --upgrade azure-kusto-data azure-kusto-ingest

                runFiles=""
                resFiles=""
                for f in "$kustoOut/baseline.PerfRun.ndjson" "$kustoOut/current.PerfRun.ndjson"; do
                  [ -f "$f" ] && runFiles="${runFiles:+$runFiles,}$f"
                done
                for f in "$kustoOut/baseline.PerfBenchmarkResult.ndjson" "$kustoOut/current.PerfBenchmarkResult.ndjson"; do
                  [ -f "$f" ] && resFiles="${resFiles:+$resFiles,}$f"
                done

                if [ -z "$runFiles" ]; then
                  echo "##vso[task.logissue type=warning]No Kusto payloads to ingest."
                  exit 0
                fi

                python3 "$scriptsDir/ingest_kusto.py" \
                  --cluster "${{ parameters.kustoClusterUri }}" \
                  --database "${{ parameters.kustoDatabase }}" \
                  --run-file "$runFiles" \
                  --results-file "$resFiles"
