# Generic job template for building and signing packages via build.proj targets.
#
# The job builds DLLs via build.proj (Build[packageName] target), ESRP signs the DLLs, creates
# NuGet packages via build.proj (Pack[packageName] target), ESRP signs the NuGet packages, and
# finally publishes symbols if requested.

parameters:
  # General Parameters -----------------------------------------------------

  # Optional list of pipeline artifacts to download before building. Each entry is an object
  # with 'artifactName' (the pipeline artifact name) and 'displayName' (used in the task label).
  - name: dependencyArtifacts
    type: object
    default: []

  # Additional MSBuild -p: arguments for version properties. These may include versions of packages
  # this package depends on.
  # Eg: -p:AbstractionsPackageVersion=1.2.3
  - name: dependencyVersionArguments
    type: string
    default: ''

  # Assembly version of the package that is being built, for APIScan (e.g., 1.0.0.12345).
  - name: packageAssemblyVersion
    type: string

  # Short package name used in the job name, display strings, filesystem paths, and as a suffix for
  # the default Build and Pack targets.
  - name: packageName
    type: string

  # Fully qualified name for the package, used for building search patterns for DLLs and PDBs.
  - name: packageNameFull
    type: string

  # The version of the package. Used for the NuGet package and symbols publishing.
  - name: packageVersion
    type: string

  # Whether to publish symbols for the specified package to public and private servers.
  - name: publishSymbols
    type: boolean

  # APIScan Parameters -----------------------------------------------------

  # Path where DLLs should be copied such that APIScan can find and scan them.
  - name: apiScanDllPath
    type: string

  # Path where PDBs should be copied such that APIScan can find and scan them.
  - name: apiScanPdbPath
    type: string

  # Signing Parameters -----------------------------------------------------

  - name: signingAppRegistrationClientId
    type: string

  - name: signingAppRegistrationTenantId
    type: string

  - name: signingAuthAkvName
    type: string

  - name: signingAuthSignCertName
    type: string

  - name: signingEsrpClientId
    type: string

  - name: signingConnectedServiceName
    type: string

  # Symbols Publishing Parameters ------------------------------------------

  - name: symbolsAzureSubscription
    type: string

  - name: symbolsPublishProjectName
    type: string

  - name: symbolsPublishServer
    type: string

  - name: symbolsPublishTokenUri
    type: string

  - name: symbolsUploadAccount
    type: string

jobs:
  - job: build_package_${{ parameters.packageName }}
    displayName: Build ${{ parameters.packageNameFull }}
    pool:
      type: windows

    variables:
      # Construct the build/pack target names
      buildTarget: 'Build${{ parameters.packageName }}'
      packTarget: 'Pack${{ parameters.packageName }}'
      packageVersionArgument: '-p:${{ parameters.packageName }}=${{ parameters.packageVersion }}'

      # Let OneBranch know where the build output will be
      ob_outputDirectory: '$(BUILD_OUTPUT)'

      # Update APIScan so it knows what software is being generated by this job.
      ob_sdl_apiscan_softwarename: '${{ parameters.packageNameFull }}'
      ob_sdl_apiscan_versionNumber: '${{ parameters.packageAssemblyVersion }}'

    steps:
      # Dump environment and parameters
      - template: /eng/pipelines/steps/script-output-environment-variables-step.yml@self
      - template: /eng/pipelines/steps/script-output-job-parameters-step.yml@self
        inputs:
          providedParameters: ${{ parameters }}

      # Download any pipeline artifacts this package depends on.
      - ${{ each artifact in parameters.dependencyArtifacts }}:
          - task: DownloadPipelineArtifact@2
            displayName: Download ${{ artifact.displayName }}
            inputs:
              artifactName: '${{ artifact.artifactName }}'
              targetPath: '$(REPO_ROOT)/packages'

      # Install the .NET SDK.
      - template: /eng/pipelines/steps/install-dotnet.yml@self

      # Perform Roslyn analysis before building, since this step will clobber build output.
      - template: /eng/pipelines/onebranch/steps/roslyn-analyzers-csproj-step.yml@self
        parameters:
          msBuildArguments: >-
            -t:${{ variables.buildTarget }}
            -p:Configuration=Release
            -p:ReferenceType=Package
            ${{ variables.packageVersionArgument }}
            ${{ parameters.dependencyVersion }}

      # Build the package, producing DLLs only (no NuGet package yet).
      - template: /eng/pipelines/onebranch/steps/compound-build-csproj-step.yml@self
        parameters:
          buildTarget: ${{ variables.buildTarget }}
          packageVersion: ${{ parameters.packageVersion }}
          versionProperties: ${{ parameters.versionProperties }}

      # ESRP sign the DLLs.
      - template: /eng/pipelines/onebranch/steps/compound-esrp-dll-signing-step.yml@self
        parameters:
          appRegistrationClientId: ${{ parameters.appRegistrationClientId }}
          appRegistrationTenantId: ${{ parameters.appRegistrationTenantId }}
          authAkvName: ${{ parameters.authAkvName }}
          authSignCertName: ${{ parameters.authSignCertName }}
          esrpClientId: ${{ parameters.esrpClientId }}
          esrpConnectedServiceName: ${{ parameters.esrpConnectedServiceName }}
          pattern: ${{ parameters.packageFullName }}.dll

      # Copy signed DLLs and PDBs to APIScan folders.
      - task: CopyFiles@2
        displayName: Copy DLLs for APIScan
        inputs:
          SourceFolder: $(BUILD_OUTPUT)/Package/bin
          Contents: "**/${{ parameters.packageFullName }}.dll"
          TargetFolder: $(ob_sdl_apiscan_softwareFolder)
          # We must preserve the folder structure since our C# projects may produce multiple
          # identically named DLLs for different target frameworks (e.g. netstandard2.0, net5.0,
          # etc.), and we need to keep those separate for APIScan to work correctly.
          flattenFolders: false

      - task: CopyFiles@2
        displayName: Copy PDBs for APIScan
        inputs:
          SourceFolder: $(BUILD_OUTPUT)/Package/bin
          Contents: "**/${{ parameters.packageFullName }}.pdb"
          TargetFolder: $(ob_sdl_apiscan_symbolsFolder)
          flattenFolders: false

      # Pack the signed DLLs into NuGet package (NoBuild=true).
      - template: /eng/pipelines/onebranch/steps/compound-pack-csproj-step.yml@self
        parameters:
          packTarget: $(packTarget)
          buildConfiguration: ${{ parameters.buildConfiguration }}
          versionProperties: ${{ parameters.versionProperties }}

      # ESRP sign the NuGet package.
      - template: /eng/pipelines/onebranch/steps/compound-esrp-nuget-signing-step.yml@self
        parameters:
          appRegistrationClientId: ${{ parameters.appRegistrationClientId }}
          appRegistrationTenantId: ${{ parameters.appRegistrationTenantId }}
          authAkvName: ${{ parameters.authAkvName }}
          authSignCertName: ${{ parameters.authSignCertName }}
          esrpClientId: ${{ parameters.esrpClientId }}
          esrpConnectedServiceName: ${{ parameters.esrpConnectedServiceName }}

      # Publish symbols to servers
      - ${{ if eq(parameters.publishSymbols, true) }}:
          - template: /eng/pipelines/onebranch/steps/publish-symbols-step.yml@self
            parameters:
              packageFullName: ${{ parameters.packageFullName }}
              packageVersion: ${{ parameters.packageVersion }}
