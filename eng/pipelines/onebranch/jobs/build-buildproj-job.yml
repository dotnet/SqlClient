# Generic job template for building and signing simple build.proj packages.
#
# The job builds DLLs via build.proj, ESRP signs the DLLs, creates NuGet packages from the signed
# DLLs, ESRP signs the NuGet packages, and finally copies all the build output to the job output.

parameters:
  # Common Build Job Properties ############################################
  - name: apiScanDllPath
    type: string

  - name: apiScanPdbPath
    type: string

  # True to enable ESRP malware scanning and code signing steps, which should not be run on
  # non-official pipelines as they access production resources. If true, Signing* parameters must
  # be provided.
  - name: shouldSignPackage
    type: boolean

  # Signing Parameters -----------------------------------------------------
  # @TODO: Signing Parameters Object

  - name: signingAppRegistrationClientId
    type: string

  - name: signingAppRegistrationTenantId
    type: string

  - name: signingAuthAkvName
    type: string

  - name: signingAuthSignCertName
    type: string

  - name: signingEsrpClientId
    type: string

  - name: signingEsrpConnectedServiceName
    type: string

  # Package Properties #####################################################

  # A list of packages that the package being built with this job depends on. Each entry in the
  # object should have the fields:
  # * artifactName - (Optional) Name of the artifact published in a previous job that contains the
  #   desired version of the dependency.  Omit to reference a package that is NOT built in this run
  #   (e.g. a previously published SqlServer package): the version argument is still applied, but no
  #   artifact is downloaded, so the dependency is restored from NuGet instead of the local feed.
  # * shortName - Short name of the dependency. This name should correspond to the short name used
  #   when building the package via build.proj
  # * version - Pre-computed version of the dependency (from compute-versions stage).
  - name: dependencies
    type: object
    default: []

  # Assembly file version for APIScan (e.g. 1.0.0.12345). Pre-computed by compute-versions stage.
  - name: fileVersion
    type: string

  # The full name of the package. This is used in the job name, and to form DLL and PDB filenames
  # for APIScan.
  - name: packageFullName
    type: string
    values:
      - 'Microsoft.Data.SqlClient'
      - 'Microsoft.Data.SqlClient.AlwaysEncrypted.AzureKeyVaultProvider'
      - 'Microsoft.Data.SqlClient.Extensions.Abstractions'
      - 'Microsoft.Data.SqlClient.Extensions.Azure'
      - 'Microsoft.Data.SqlClient.Internal.Logging'
      - 'Microsoft.SqlServer.Server'

  # Short package name used in the job name, display strings, filesystem paths, and as a suffix for
  # the default Build and Pack targets if those aren't specified.
  - name: packageShortName
    type: string
    values:
      - 'Abstractions'
      - 'AkvProvider'
      - 'Azure'
      - 'Logging'
      - 'SqlClient'
      - 'SqlServer'

  # Package version (required). Pre-computed by compute-versions stage.
  - name: packageVersion
    type: string

jobs:
  - job: 'build_package_${{ parameters.packageShortName }}'
    displayName: 'Build: ${{ parameters.packageFullName }}'
    pool:
      type: windows

    variables:
      # Placeholder for the Microsoft.SqlServer.Server package-version argument (empty unless this
      # package depends on SqlServer). Constructed below from parameters.dependencies.
      sqlServerVersionArgument: ''

      ob_outputDirectory: '$(JOB_OUTPUT)'

      # APIScan configuration for the package being built by this job.
      ob_sdl_apiscan_enabled: true
      ob_sdl_apiscan_softwareFolder: ${{ parameters.apiScanDllPath }}
      ob_sdl_apiscan_symbolsFolder: ${{ parameters.apiScanPdbPath }}
      ob_sdl_apiscan_softwarename: ${{ parameters.packageFullName }}
      ob_sdl_apiscan_versionNumber: ${{ parameters.fileVersion }}

      # Choose the "PackageVersion" property-name suffix for this job's package.  This is how we
      # build the build.proj property name that specifies this package's version, either
      # PackageVersionSqlClient (shared by the entire SqlClient family), or PackageVersionSqlServer.
      # Deciding the suffix once here keeps the mapping out of the individual build/pack/analysis
      # templates.
      ${{ if eq(parameters.packageShortName, 'SqlServer') }}:
        versionPropertySuffix: SqlServer
      ${{ else }}:
        versionPropertySuffix: SqlClient

    steps:
      - template: /eng/pipelines/onebranch/steps/script-output-environment-variables-step.yml@self

      - ${{ each package in parameters.dependencies }}:
          # Build the dependency version arguments passed to the build/pack/analysis steps.  The
          # SqlClient family shares a single version via Central Package Management, and those steps
          # already pass -p:PackageVersionSqlClient (the package's own version), which pins both the
          # package being built and every family dependency reference.  Family dependencies
          # therefore need no extra version argument here -- only a Microsoft.SqlServer.Server
          # dependency, which is versioned separately, must be pinned explicitly via
          # -p:PackageVersionSqlServer (this applies whether SqlServer is freshly built this run or
          # restored from its published NuGet package).
          - ${{ if eq(package.shortName, 'SqlServer') }}:
            - pwsh: |
                Write-Host "##vso[task.setvariable variable=sqlServerVersionArgument]$(sqlServerVersionArgument) -p:PackageVersionSqlServer=${{ package.version }}"
              displayName: "Append SqlServer Version Argument - ${{ package.shortName }}"

          # Download the pipeline artifact for this dependency package, when it was built in this
          # run.  Dependencies without an artifactName are restored from NuGet instead (e.g. a
          # previously published SqlServer package), so no download is needed.  Use an explicit
          # non-empty check (coalesce handles a missing key) rather than relying on a bare string
          # in the boolean if-expression.
          - ${{ if ne(coalesce(package.artifactName, ''), '') }}:
            - task: DownloadPipelineArtifact@2
              displayName: "Download Artifact - ${{ package.shortName }}"
              inputs:
                artifactName: ${{ package.artifactName }}
                targetPath: $(REPO_ROOT)/packages

      # Install the .NET SDK.
      - template: /eng/pipelines/common/steps/install-dotnet.yml@self

      # Restore dotnet local tools (pwsh, apicompat, etc.). Required by build.proj targets
      # such as _CheckPwshToolRestored that run during RoslynAnalyzers and Build.
      - template: /eng/pipelines/common/steps/restore-dotnet-tools.yml@self

      # Perform Roslyn analysis before building, since this step will clobber build output.
      - template: /eng/pipelines/onebranch/steps/roslyn-analyzers-buildproj-step.yml@self
        parameters:
          dependencyArguments: $(sqlServerVersionArgument)
          packageShortName: ${{ parameters.packageShortName }}
          versionPropertySuffix: $(versionPropertySuffix)
          packageVersion: ${{ parameters.packageVersion }}

      # Build the package, producing DLLs only (no NuGet package yet).
      - template: /eng/pipelines/onebranch/steps/build-buildproj-step.yml@self
        parameters:
          buildConfiguration: Release
          dependencyArguments: $(sqlServerVersionArgument)
          packageShortName: ${{ parameters.packageShortName }}
          versionPropertySuffix: $(versionPropertySuffix)
          packageVersion: ${{ parameters.packageVersion }}

      - ${{ if eq(parameters.shouldSignPackage, true) }}:
          # ESRP sign the DLLs.
          - template: /eng/pipelines/onebranch/steps/esrp-dll-signing-step.yml@self
            parameters:
              appRegistrationClientId: '${{ parameters.signingAppRegistrationClientId }}'
              appRegistrationTenantId: '${{ parameters.signingAppRegistrationTenantId }}'
              authAkvName: '${{ parameters.signingAuthAkvName }}'
              authSignCertName: '${{ parameters.signingAuthSignCertName }}'
              esrpClientId: '${{ parameters.signingEsrpClientId }}'
              esrpConnectedServiceName: '${{ parameters.signingEsrpConnectedServiceName }}'
              pattern: |
                **/${{ parameters.packageFullName }}.dll
                **/${{ parameters.packageFullName }}.resources.dll

      # Copy signed/unsigned DLLs and PDBs to APIScan folders.
      - task: CopyFiles@2
        displayName: Copy DLLs for APIScan
        inputs:
          SourceFolder: $(BUILD_OUTPUT)/${{ parameters.packageFullName }}
          Contents: "**/${{ parameters.packageFullName }}.dll"
          TargetFolder: '${{ parameters.apiScanDllPath }}'
          # We must preserve the folder structure since our C# projects may produce multiple
          # identically named DLLs for different target frameworks (e.g. netstandard2.0, net5.0,
          # etc.), and we need to keep those separate for APIScan to work correctly.
          flattenFolders: false

      - task: CopyFiles@2
        displayName: Copy PDBs for APIScan
        inputs:
          SourceFolder: $(BUILD_OUTPUT)/${{ parameters.packageFullName }}
          Contents: "**/${{ parameters.packageFullName }}.pdb"
          TargetFolder: '${{ parameters.apiScanPdbPath }}'
          # We must preserve the folder structure since our C# projects may produce multiple
          # identically named DLLs for different target frameworks (e.g. netstandard2.0, net5.0,
          # etc.), and we need to keep those separate for APIScan to work correctly.
          flattenFolders: false

      # Pack the signed DLLs into NuGet package (NoBuild=true).
      - template: /eng/pipelines/onebranch/steps/pack-buildproj-step.yml@self
        parameters:
          buildConfiguration: Release
          dependencyArguments: $(sqlServerVersionArgument)
          packageFullName: ${{ parameters.packageFullName }}
          packageShortName: ${{ parameters.packageShortName }}
          versionPropertySuffix: $(versionPropertySuffix)
          packageVersion: ${{ parameters.packageVersion }}

      - ${{ if eq(parameters.shouldSignPackage, true) }}:
          # ESRP sign the NuGet package.
          - template: /eng/pipelines/onebranch/steps/esrp-nuget-signing-step.yml@self
            parameters:
              appRegistrationClientId: '${{ parameters.signingAppRegistrationClientId }}'
              appRegistrationTenantId: '${{ parameters.signingAppRegistrationTenantId }}'
              authAkvName: '${{ parameters.signingAuthAkvName }}'
              authSignCertName: '${{ parameters.signingAuthSignCertName }}'
              esrpClientId: '${{ parameters.signingEsrpClientId }}'
              esrpConnectedServiceName: '${{ parameters.signingEsrpConnectedServiceName }}'
              searchPath: '$(BUILD_OUTPUT)'
              searchPattern: '**/${{ parameters.packageFullName}}.*nupkg'

      # Copy the contents of the build output for this package to the artifacts folder
      - task: CopyFiles@2
        displayName: Copy Build Output to Artifacts Folder
        inputs:
          SourceFolder: '$(BUILD_OUTPUT)/${{ parameters.packageFullName }}'
          Contents: '**/*.*'
          TargetFolder: '$(JOB_OUTPUT)'
          flattenFolders: false
