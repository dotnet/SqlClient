# This file is only included in MDS OneBranch Official pipelines.

variables:
  # OneBranch Variables ====================================================
  # These variables are defined in the OneBranch template and we assign variables to them not.

  # Whether SBOMs should be signed
  - name: Packaging.EnableSBOMSigning
    value: true

  # Whether binskim should break the build. See https://aka.ms/obpipelines/sdl
  - name: ob_sdl_binskim_break
    value: true

  # Docker image which is used to build the project. See https://aka.ms/obpipelines/containers
  - name: WindowsContainerImage
    value: "onebranch.azurecr.io/windows/ltsc2022/vse2022:latest"

  # APIScan Variables ======================================================
  # These variables are defined by us and passed to APIScan.

  # Path where we will place DLLs and tell APIScan to scan (as "software folder")
  - name: apiScanDllPath
    value: '$(Build.SourcesDirectory)/apiScan/dlls'

  # Path where we will place PDBs and tell APIScan to scan (as "symbols folder")
  - name: apiScanPdbPath
    value: '$(Build.SourcesDirectory)/apiScan/pdbs'

  # Artifact Names =========================================================
  # These are the paths where we will drop artifacts for the various stages of the pipeline.
  #
  # OneBranch automatically publishes pipeline artifacts from all jobs. Use of the
  # PublishPipelineArtifacts task is prohibited. All content in the ob_outputDirectory is
  # automatically published. The artifacts are named according to this pattern:
  #
  #   drop_<stageName>_<jobName>
  #
  # Downstream stages and jobs may download these artifacts via the DownloadPipelineArtifact task,
  # but they must know the artifact name.

  # The Microsoft.Data.SqlClient.Extensions.Abstractions package artifacts.
  - name: abstractionsArtifactsName
    value: drop_build_abstractions_build_package_Abstractions

  # The Microsoft.Data.SqlClient.AlwaysEncrypted.AzureKeyVaultProvider package artifacts.
  - name: akvProviderArtifactsName
    value: drop_build_addons_build_package_AkvProvider

  # The Microsoft.Data.SqlClient.Extensions.Azure package artifacts.
  - name: azureArtifactsName
    value: drop_build_dependent_build_package_Azure

  # The Microsoft.Data.SqlClient.Internal.Logging package artifacts.
  - name: loggingArtifactsName
    value: drop_build_independent_build_package_Logging

  # The Microsoft.SqlServer.Server package artifacts.
  - name: mssArtifactsName
    value: drop_build_independent_build_package_SqlServer

  # The Microsoft.Data.SqlClient package artifacts.
  - name: mdsArtifactsName
    value: drop_build_dependent_build_package_SqlClient

