# This file contains variables that relate to the various packages that are produced via the
# OneBranch official/non-official pipelines. They are grouped by the packages they represent.
#
# VERSION STRATEGY
# ================
# Package versions are computed by each project's Versions.props file using one input:
#   - BuildNumber   ($(Build.BuildNumber), provided by ADO)
#
# The *NextVersion property in each Versions.props defines the base version:
#   - On main:            X.Y.Z-preview1  → official produces "X.Y.Z-preview1"
#   - On release/X.Y:    X.Y.Z           → official produces "X.Y.Z"
#
# No per-package version variables are needed here — Versions.props is the single source.
# Downstream stages obtain the computed version via the compute-versions stage.
#
# ARTIFACT NAMING
# ===============
# OneBranch automatically publishes pipeline artifacts from all jobs named as:
#
#   drop_<stageName>_<jobName>
#
# Downstream stages download these via DownloadPipelineArtifact and must know the name.

parameters:
  - name: isPreview
    type: boolean

variables:
  # ------------------------------------------------------------------------
  # Artifact Names
  # These identify the published pipeline artifacts for inter-stage consumption.

  - name: abstractionsArtifactsName
    value: 'drop_build_abstractions_build_package_Abstractions'

  - name: akvProviderArtifactsName
    value: 'drop_build_addons_build_package_AkvProvider'

  - name: azureArtifactsName
    value: 'drop_build_dependent_build_package_Azure'

  - name: loggingArtifactsName
    value: 'drop_build_independent_build_package_Logging'

  - name: sqlClientArtifactsName
    value: 'drop_build_dependent_build_package_SqlClient'

  - name: sqlServerArtifactsName
    value: 'drop_build_independent_build_package_SqlServer'
