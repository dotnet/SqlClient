# This template runs Roslyn Analyzers (SDL) against a build.proj target using the RoslynAnalyzers@3
# task from the Secure Development Team's SDL extension, in "Copy Logs Only" mode:
#
# https://eng.ms/docs/cloud-ai-platform/devdiv/one-engineering-system-1es/1es-mohanb/security-integration/guardian-wiki/sdl-azdo-extension/roslyn-analyzers-build-task
#
# PROVENANCE: Every statement in this file about how the RoslynAnalyzers task behaves is current as
#   of task version v3 (RoslynAnalyzers@3, 3.289.0) and was verified against concrete evidence -- the
#   actual pipeline run logs, the task definition (task.json / inputMap.json), the gdn-task-lib task
#   source, and the Guardian RoslynAnalyzers CLI binaries (Microsoft.Guardian.RoslynAnalyzers*.dll).
#   Re-verify these claims if the task's major version changes.
#
# HOW IT WORKS (integrated analyzers + Copy Logs Only):
#   .NET [Roslyn] security analyzers are compiler-integrated: they only run as part of the actual
#   csc/vbc compilation. build.proj is an orchestrator -- each package's real compile happens in a
#   separate "dotnet build <project>.csproj" that build.proj launches with an <Exec> task. That is
#   the crux: anything the RoslynAnalyzers task appends to an *outer* "dotnet build build.proj"
#   command (its auto/manual "re-run the build" modes) is an MSBuild global property, and global
#   properties do NOT cross an <Exec> into a child "dotnet build" process. So an injected analyzer
#   would only ever see build.proj (which compiles nothing) and never the real projects, producing
#   zero results. That is exactly why earlier auto/manual-mode attempts collected 0 SARIF logs.
#
#   Instead we use the task's documented "Copy Logs Only" alternative -- integrate the analyzers into
#   the build itself, then have the task only collect the results:
#     1. This step runs its own isolated "dotnet build build.proj -t:Build<Package>" with
#        EnableAnalyzers=true. build.proj forwards that flag into every leaf "dotnet build" it execs
#        (via EnableAnalyzersArgument), and src/Directory.Build.props -- which every product project
#        imports -- reacts by enabling the full analyzer set and setting ErrorLog to a per-project
#        "*.csproj.<guid>.sarif" log. Because the analyzers are enabled on the leaf projects
#        themselves, they run inside the real compiles regardless of the <Exec> boundary.
#     2. The RoslynAnalyzers@3 task then runs in Copy Logs Only mode (copyLogsOnly: true) and simply
#        collects and sanitizes those *.csproj.*.sarif logs from logRootDirectory for SDL/Guardian
#        compliance. It performs no build and no compiler re-run, so none of the msBuildVersion /
#        msBuildArchitecture / Visual-Studio-setup concerns apply -- the task never needs MSBuild,
#        so it is inherently agnostic to the container's VS/MSBuild version (e.g. MSBuild 18 on the
#        ltsc2025/vse2026 image).
#
#   EnableAnalyzers and IsolatedBuildPath are independent build.proj properties. We set both here:
#   EnableAnalyzers turns analysis on; IsolatedBuildPath keeps this analysis build from disturbing
#   real build output (see ISOLATION).
#
# WHAT THE TASK ITSELF INJECTS (v3), AND HOW THIS TEMPLATE COVERS IT:
#   In its build-driving modes the task appends five MSBuild properties to the compile command and
#   injects the analyzers via user-profile ImportBefore/ImportAfter files. This template enables the
#   analyzers on the leaf projects instead, reproducing the effects that matter. Item by item:
#
#   | Task injection (v3)                    | Purpose                             | How this template covers it                       |
#   |----------------------------------------|-------------------------------------|---------------------------------------------------|
#   | /p:Features=                           | Turns on Roslyn IOperation +        | latest-all: SDK 18 Roslyn has IOperation on by    |
#   |   "IOperation,flow-analysis"           | dataflow so the taint/crypto        | default, so these rules run. Add                  |
#   |                                        | security rules (CA3xxx/CA5xxx) run. | <Features>flow-analysis</Features> to             |
#   |                                        |                                     | Directory.Build.props if any go missing.          |
#   | /p:CodeAnalysisRuleSet=                | Selects the exact SDL rule IDs +    | AnalysisLevel=latest-all, a superset of the SDL   |
#   |   ...Sdl.Recommended.Warning.ruleset   | severities; disables non-SDL rules. | CA rules. The internal IA* rules need the         |
#   |                                        |                                     | Microsoft.Internal.Analyzers package, which is    |
#   |                                        |                                     | Microsoft-internal-only and MUST NOT be added to  |
#   |                                        |                                     | the public governed feed, so they are not         |
#   |                                        |                                     | reproduced here. See NOTE ON THE INTERNAL IA*     |
#   |                                        |                                     | RULES below.                                      |
#   | /p:TreatWarningsAsErrors=false         | Record every diagnostic instead of  | <TreatWarningsAsErrors>false</...> in the         |
#   |                                        | failing at the first one.           | EnableAnalyzers block of Directory.Build.props.   |
#   | /p:RunCodeAnalysis=false               | Disables legacy *binary* FxCop      | Already false by default in SDK-style projects;   |
#   |                                        | (not the Roslyn analyzers).         | we never enable it.                               |
#   | /p:GdnRoslynAnalyzersRunId=<guid>      | Gates the injected props/targets so | Not needed. We enable analyzers directly on the   |
#   |                                        | they apply only to this build.      | leaf projects, so there is no global injection to |
#   |                                        |                                     | gate (see the note below).                        |
#   | ImportBefore *.props / ImportAfter     | Adds the analyzer assemblies and    | Analyzers: EnableNETAnalyzers + latest-all +      |
#   |   *.targets under %LOCALAPPDATA%\...\  | sets ErrorLog=<per-project>.sarif.  | EnforceCodeStyleInBuild. ErrorLog: we set         |
#   |   MSBuild\Current                      |                                     | <ErrorLog>$(MSBuildProjectFullPath)....sarif</>   |
#   |                                        |                                     | (SARIF v1 -- NO version=2; see the sanitizer      |
#   |                                        |                                     | note in Directory.Build.props).                   |
#
#   WHY THE TASK'S OWN INJECTION YIELDS 0 SARIF THROUGH build.proj: the ImportAfter *.targets live in
#   the user profile, so they ARE imported by build.proj's inner "dotnet build <csproj>" execs -- but
#   they self-gate on $(GdnRoslynAnalyzersRunId), and that property (like CodeAnalysisRuleSet and
#   Features) is passed only on the OUTER "dotnet build build.proj" command and does not cross the
#   <Exec> into the child compiles. So the injected targets no-op in the real compiles. Enabling the
#   analyzers on the leaf projects (EnableAnalyzers) removes that gate entirely.
#
# NOTE ON THE INTERNAL IA* RULES:
#   The SDL-recommended ruleset also contains internal IA* ("Internal Analyzers") rules that ship in
#   the Microsoft.Internal.Analyzers package. That package is Microsoft-internal and confidential: it
#   is NOT on nuget.org, and it MUST NOT be added to this repo's governed feed
#   (sqlclientdrivers.pkgs.visualstudio.com/public/...), which is PUBLIC-scoped -- doing so would
#   leak internal tooling and breach its internal-use license. So the leaf-project analysis above
#   (AnalysisLevel=latest-all) covers the CA* rules but NOT the IA* rules.
#
#   The IA* rules can only be run from the PRIVATE ADO.Net project pipelines (which build the
#   internal dotnet-sqlclient mirror), where a Microsoft-internal NuGet feed is reachable. Options
#   for closing the gap there, WITHOUT touching the public feed:
#     1. Add an internal-only feed to a private NuGet.config (or <packageSourceMapping>) that is used
#        only by the ADO.Net pipelines, restore Microsoft.Internal.Analyzers as a PrivateAssets=all
#        analyzer reference gated on an "InternalAnalyzers" property, and set the SDL ruleset. Gate
#        the whole thing on a variable that is only true in the private project.
#     2. Instead of Copy Logs Only, let the RoslynAnalyzers@3 task run in a build-driving mode in the
#        private pipeline. The task pulls Microsoft.Internal.Analyzers from its own internal source
#        and runs the IA* rules itself -- but it must drive the compile directly (not via build.proj's
#        <Exec> children; see the 0-SARIF note above), e.g. by pointing it at the .slnx/leaf csproj.
#     3. Run the standalone Guardian CLI Roslyn tool in the private pipeline against the leaf
#        projects with the internal ruleset + package, and collect its SARIF the same way.
#   Whichever option is chosen, keep it fenced to the private project so the public repo/feed and
#   public CI never reference the internal package.
#
# ISOLATION:
#   This template is self-contained and safe to run at any point in a job -- before or after a real
#   build -- because the analysis build writes its binaries to a separate location and never touches
#   the real build output. We pass IsolatedBuildPath to build.proj, which redirects every project's
#   binary output (bin) under "$(Agent.TempDirectory)/roslyn/bin/", leaving the real artifacts/
#   folder untouched, and forces a full (non-incremental) recompile so the analyzers see every
#   source file. The per-project SARIF logs are written next to each .csproj under the source tree
#   (only bin is redirected), which is where the Copy Logs Only step collects them from.
#
#   The analysis build shares the default obj/ intermediate directory with a real build, but it
#   still cannot corrupt real build output. --no-incremental does not run Clean or delete anything;
#   it only disables the incremental/up-to-date checks and forces a full recompile. Real output is
#   safe because bin is redirected to the isolated path -- the isolated build only writes to the
#   isolated bin, never the real artifacts/ bin. Every downstream step in
#   build-buildproj-job.yml operates on $(BUILD_OUTPUT) (= artifacts/): DLL signing, the APIScan
#   copies, packing, NuGet signing, and the copy to the job output. None of them read obj/, so
#   rebuilding the shared intermediates has no effect on them.

parameters:
  # Optional arguments to pass to dotnet build to indicate what version of dependencies should be
  # used.
  - name: dependencyArguments
    type: string
    default: ''

  # Project to build. This short name will be appended to "Build" to generate the appropriate
  # target to build from build.proj.
  - name: packageShortName
    type: string
    values:
      - Abstractions
      - AkvProvider
      - Azure
      - Logging
      - SqlClient
      - SqlServer

steps:
  # Step 0: Internal SDL analyzers (IA*) setup.
  #
  # The internal "IA*" rules ship in Microsoft.Internal.Analyzers, a Microsoft-internal, confidential
  # package (see the "NOTE ON THE INTERNAL IA* RULES" section above). This template is only ever run
  # from the OneBranch pipelines (sqlclient-official.yml / sqlclient-non-official.yml), which run
  # exclusively in the internal ADO.Net project, so the internal feed is always reachable and these
  # steps always run. The confidential feed URL is still never hardcoded here - it comes from the
  # MicrosoftInternalAnalyzersFeed variable (defined in the ADO.Net project), so it is not committed
  # to the public repo.

  # Step 0a: Generate a private NuGet.config that adds the internal feed hosting
  # Microsoft.Internal.Analyzers. In packageSourceMapping the longest matching package-pattern wins,
  # so Microsoft.Internal.* resolves ONLY from the internal feed (that pattern is more specific than
  # the "*" on governed/local), while every other package still resolves from governed/local.
  # The config is handed to the leaf builds via -p:InternalAnalyzersNugetConfig
  # (build.proj forwards it as -p:RestoreConfigFile), which replaces the whole NuGet config hierarchy
  # for the analysis restore, leaving the committed root NuGet.config (with its <clear/>) untouched.
  - pwsh: |
      $ErrorActionPreference = 'Stop'
      $feed = '$(MicrosoftInternalAnalyzersFeed)'
      if ([string]::IsNullOrWhiteSpace($feed)) {
          Write-Error "MicrosoftInternalAnalyzersFeed is not set. Define it in the ADO.Net project with the internal feed that hosts Microsoft.Internal.Analyzers."
          exit 1
      }
      # Microsoft.Internal.Analyzers has no default version (see Directory.Packages.props); the
      # pipeline must pin it via the MicrosoftInternalAnalyzersVersion variable.
      $version = '$(MicrosoftInternalAnalyzersVersion)'
      if ([string]::IsNullOrWhiteSpace($version)) {
          Write-Error "MicrosoftInternalAnalyzersVersion is not set. Define it in the ADO.Net project with the Microsoft.Internal.Analyzers version to use."
          exit 1
      }
      $cfg = Join-Path '$(Agent.TempDirectory)' 'internal-analyzers-nuget.config'
      $lines = @(
          '<?xml version="1.0" encoding="utf-8"?>'
          '<configuration>'
          '  <packageSources>'
          '    <clear />'
          '    <add key="governed" value="https://sqlclientdrivers.pkgs.visualstudio.com/public/_packaging/sqlclient/nuget/v3/index.json" />'
          "    <add key=""local"" value=""$(REPO_ROOT)/packages/"" />"
          "    <add key=""internal-analyzers"" value=""$feed"" />"
          '  </packageSources>'
          '  <packageSourceMapping>'
          '    <packageSource key="governed"><package pattern="*" /></packageSource>'
          '    <packageSource key="local"><package pattern="*" /></packageSource>'
          '    <packageSource key="internal-analyzers"><package pattern="Microsoft.Internal.*" /></packageSource>'
          '  </packageSourceMapping>'
          '</configuration>'
      )
      Set-Content -Path $cfg -Value $lines -Encoding utf8
      # Do not log the file contents: they include the confidential internal feed URL. Log only the path.
      Write-Host "Wrote internal NuGet.config to $cfg"
      # Quote the config path so a temp path containing spaces is not mis-parsed as multiple args.
      Write-Host "##vso[task.setvariable variable=internalAnalyzersArgs]-p:InternalAnalyzers=true -p:InternalAnalyzersNugetConfig=`"$cfg`" -p:MicrosoftInternalAnalyzersVersion=$version"
    displayName: 'Internal analyzers: generate private NuGet.config'

  # Step 0b: Authenticate to the internal Azure Artifacts feed so the leaf restores can pull
  # Microsoft.Internal.Analyzers. NuGetAuthenticate sets up the Azure Artifacts credential provider
  # for feeds the build identity can access in this organization.
  - task: NuGetAuthenticate@1
    displayName: 'Internal analyzers: authenticate internal feed'

  # Step 1: Isolated analysis build. Compiles the package with EnableAnalyzers=true so that every
  # leaf "dotnet build" that build.proj execs turns on the full Roslyn analyzer set (see
  # src/Directory.Build.props) and emits a per-project "*.csproj.<guid>.sarif" log next to each
  # project. IsolatedBuildPath redirects bin to a temp location so this never disturbs real build
  # output. We use DotNetCoreCLI@2 (the .NET SDK's MSBuild), so there is no Visual Studio dependency.
  - task: DotNetCoreCLI@2
    displayName: 'Build for Roslyn analysis - build.proj Build${{ parameters.packageShortName }}'
    inputs:
      command: build
      projects: '$(REPO_ROOT)/build.proj'
      # GOTCHA: Keep arguments as a single folded value (>-). Blank lines would be parsed as
      #         multiple arguments and fail.
      #
      # Note: BuildNumber and PackageVersion are intentionally omitted. This build only produces
      # analyzer logs; versioning has no effect on the analysis.
      #
      # $(internalAnalyzersArgs) is set by Step 0 to "-p:InternalAnalyzers=true
      # -p:InternalAnalyzersNugetConfig=<generated config> -p:MicrosoftInternalAnalyzersVersion=<ver>"
      # so the internal IA* rules also run.
      arguments: >-
        -t:Build${{ parameters.packageShortName }}
        -p:Configuration=Release
        -p:ReferenceType=Package
        -p:SkipDependencyPack=true
        -p:IsolatedBuildPath="$(Agent.TempDirectory)/roslyn"
        -p:EnableAnalyzers=true
        $(internalAnalyzersArgs)
        ${{ parameters.dependencyArguments }}

  # Step 2: Fail fast if the analysis build produced no SARIF for THIS package. The RoslynAnalyzers
  # task in Copy Logs Only mode (Step 3) has NO "fail on no logs" option -- it exits 0 even when it
  # finds zero logs. Without this guard, a regression that stops the analyzers from emitting SARIF
  # (e.g. EnableAnalyzers failing to propagate into the leaf builds, or ErrorLog being dropped) would
  # let the analysis silently pass. We match the specific project file name for this package rather
  # than any *.csproj.*.sarif, so a stray/unrelated SARIF cannot mask a package that produced none.
  - pwsh: |
      # SARIF files are named "<projectFileName>.<guid>.sarif" (from ErrorLog =
      # $(MSBuildProjectFullPath).<guid>.sarif). Map this package to its project file name.
      # NOTE: keep this in sync with the *ProjectPath properties in build.proj.
      $expectedCsproj = switch ('${{ parameters.packageShortName }}') {
          'Abstractions' { 'Abstractions.csproj' }
          'AkvProvider'  { 'Microsoft.Data.SqlClient.AlwaysEncrypted.AzureKeyVaultProvider.csproj' }
          'Azure'        { 'Azure.csproj' }
          'Logging'      { 'Logging.csproj' }
          'SqlClient'    { 'Microsoft.Data.SqlClient.csproj' }
          'SqlServer'    { 'Microsoft.SqlServer.Server.csproj' }
          default        { Write-Error "Unknown packageShortName '${{ parameters.packageShortName }}'; update the SARIF verification map."; exit 1 }
      }
      # Match this package's per-project logs directly via -Filter, so we do not enumerate every
      # *.sarif other SDL tools may have produced under the repo.
      $sarif = Get-ChildItem -Path "$(REPO_ROOT)" -Recurse -File -Filter "$expectedCsproj.*.sarif"
      Write-Host "Found $($sarif.Count) Roslyn SARIF log(s) matching '$expectedCsproj.*.sarif':"
      $sarif | ForEach-Object { Write-Host "  $($_.FullName)" }
      if ($sarif.Count -eq 0) {
          Write-Error "No Roslyn SARIF ('$expectedCsproj.*.sarif') was produced by the EnableAnalyzers build for '${{ parameters.packageShortName }}'. The analyzers did not run, or ErrorLog was not set. Failing the build."
          exit 1
      }
    displayName: 'Verify Roslyn analysis produced SARIF logs'

  # Step 3: Collect the analysis results. In Copy Logs Only mode the task does not build or re-run
  # the compiler -- it just gathers and sanitizes the *.csproj.*.sarif logs produced by Step 1 and
  # hands them to Guardian/SDL. No msBuildVersion / msBuildArchitecture / VS setup is involved, and
  # no OAuth token is needed (nothing is queried from Azure DevOps).
  - task: securedevelopmentteam.vss-secure-development-tools.build-task-roslynanalyzers.RoslynAnalyzers@3
    displayName: 'Roslyn Analyzers (collect) - build.proj Build${{ parameters.packageShortName }}'
    inputs:
      copyLogsOnly: true
      # Root to search for the *.csproj.*.sarif logs. The analysis build wrote them next to each
      # project under the repo checkout; the collector globs this directory recursively.
      logRootDirectory: '$(REPO_ROOT)'
