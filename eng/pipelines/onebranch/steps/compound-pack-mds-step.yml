parameters:
  # The C# build configuration to use (eg, Debug or Release).
  - name: buildConfiguration
    type: string
    values:
      - Debug
      - Release

  # Package version parameters ----
  - name: abstractionsPackageVersion
    type: string

  - name: loggingPackageVersion
    type: string

  - name: mdsPackageVersion
    type: string

steps:
  - task: MSBuild@1
    displayName: 'Build2.proj - PackMds'
    inputs:
      solution: '$(REPO_ROOT)/build2.proj'
      configuration: '${{ parameters.buildConfiguration }}'
      msbuildArguments: >-
        -t:PackMds
        -p:Configuration=${{ parameters.buildConfiguration }}
        -p:PackBuild=false
        -p:PackageVersionAbstraction="${{ parameters.abstractionsPackageVersion }}"
        -p:PackageVersionLogging="${{ parameters.loggingPackageVersion }}"
        -p:PackageVersionMds="${{ parameters.mdsPackageVersion }}"
        -p:ReferenceType=Package

  - script: tree /a /f $(ARTIFACT_PATH)
    displayName: Output Artifact Tree
