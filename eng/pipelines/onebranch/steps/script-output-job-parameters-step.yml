# Emits the parameters parameter passed in from the calling job.

parameters:
  - name: providedParameters
    type: object

steps:
  - powershell: |
      $jsonParams = '${{ convertToJson(providedParameters) }}' -replace '\\', '\\'
      $jsonParams = | ConvertFrom-Json | Format-List
    displayName: 'Output Job Parameters'
