# This collection of steps to build a project via the build.proj. This will execute the "Build*"
# target in build.proj, where * is the packageShortName provided in the parameters.
#
# Note: This differs from the pr/ci build-buildproj-step.yml in that it always strong-name signs
#    the assemblies, it only builds in package reference mode, and as such allows for version
#    parameters to be provided.

parameters:
  # Build configuration - Release or Debug.
  - name: buildConfiguration
    type: string
    values:
      - Debug
      - Release

  # Optional arguments to pass to msbuild to indicate what version of dependencies should be used.
  # They should be in the form of "-p:PackageVersionFooBar=1.2.3 ...".
  - name: dependencyArguments
    type: string
    default: ''

  # Project to build. This short name will be appended to "Build" to generate the appropriate
  # target to build from build.proj.
  - name: packageShortName
    type: string
    values:
      - Azure
      - AkvProvider
      - Abstractions
      - Logging
      - SqlClient
      - SqlServer

  #  Suffix appended to "PackageVersion" to form the build.proj msbuild property that stamps this
  #  package's version.  build.proj recognizes only two such properties: PackageVersionSqlClient
  #  (shared by the entire SqlClient family: Logging, Abstractions, SqlClient, Azure, and the AKV
  #  Provider) and PackageVersionSqlServer (Microsoft.SqlServer.Server).  Provided by the caller.
  #  Examples:  'SqlClient' -> -p:PackageVersionSqlClient=7.1.0-preview3
  #             'SqlServer' -> -p:PackageVersionSqlServer=1.0.0
  - name: versionPropertySuffix
    type: string

  #  Version to stamp on the package.  Combined with versionPropertySuffix to form the msbuild
  #  argument, e.g. -p:PackageVersionSqlClient=7.1.0-preview3.
  #  Always required — compute up-front via the compute-versions stage.
  - name: packageVersion
    type: string

steps:
  # Download the strong name signing key from secure file storage
  - task: DownloadSecureFile@1
    displayName: 'Download Signing Key'
    inputs:
      secureFile: 'netfxKeypair.snk'
    name: keyFile

  - task: DotNetCoreCLI@2
    displayName: 'build.proj - Build${{ parameters.packageShortName }}'
    inputs:
      command: build
      projects: '$(REPO_ROOT)/build.proj'
      arguments: >-
        -t:Build${{ parameters.packageShortName }}
        -p:Configuration=${{ parameters.buildConfiguration }}
        -p:ReferenceType=Package
        -p:SkipDependencyPack=true
        -p:SigningKeyPath="$(keyFile.secureFilePath)"
        -p:BuildNumber="$(Build.BuildNumber)"
        ${{ parameters.dependencyArguments }}
        -p:PackageVersion${{ parameters.versionPropertySuffix }}="${{ parameters.packageVersion }}"

  - script: tree /a /f $(BUILD_OUTPUT)
    displayName: Output Build Output Tree
