name: $(Year:YY)$(DayOfYear)$(Rev:.r)

# No activity-based triggers.
pr: none
trigger: none

# We run this pipeline on a daily schedule.
schedules:
  - cron: "30 4 * * *"
    displayName: Daily 04:30 UTC Build
    branches:
      include:
        - internal/main
    always: true

# These parameters are visible in the Azure DevOps pipeline UI when a new run is queued.
parameters:

  # When true, any SDL errors will break the build, and TSA bug filing will be disabled.  When
  # false, SDL errors will be logged but will not break the build, and TSA bug filing will be
  # enabled.
  - name: breakOnSdlError
    displayName: Break on SDL error
    type: boolean
    default: true

  # True to enable debug information and steps.
  - name: debug
    displayName: Enable debug output
    type: boolean
    default: false

  # True if this is a preview build.
  - name: isPreview
    displayName: Is this a preview build?
    type: boolean
    default: false

  # True to publish symbols to private and public servers.
  - name: publishSymbols
    displayName: Publish symbols
    type: boolean
    default: false

  # When true, publish symbols and push NuGet packages to Production environments.  When false,
  # symbols use PPE and NuGet packages use QA/Test.
  - name: releaseToProduction
    displayName: Publish Symbols and NuGet Packages to Production
    type: boolean
    default: false

  # Build parameters — select which packages to build.

  # Build the Microsoft.SqlServer.Server package.
  - name: buildSqlServerServer
    displayName: Build Microsoft.SqlServer.Server
    type: boolean
    default: true

  # Build Microsoft.Data.SqlClient and Extensions packages.
  - name: buildSqlClient
    displayName: Build Microsoft.Data.SqlClient and Extensions
    type: boolean
    default: true

  # Build the Microsoft.Data.SqlClient.AlwaysEncrypted.AzureKeyVaultProvider package.
  - name: buildAkvProvider
    displayName: Build Microsoft.Data.SqlClient.AlwaysEncrypted.AzureKeyVaultProvider
    type: boolean
    default: true

  # Release parameters — select which packages to publish to NuGet.
  # All default to false; toggle at queue time for on-demand selective release.

  # Release the Microsoft.SqlServer.Server package.
  - name: releaseSqlServerServer
    displayName: Release Microsoft.SqlServer.Server
    type: boolean
    default: false

  # Release the Microsoft.Data.SqlClient.Internal.Logging package.
  - name: releaseLogging
    displayName: Release Microsoft.Data.SqlClient.Internal.Logging
    type: boolean
    default: false

  # Release the Microsoft.Data.SqlClient.Extensions.Abstractions package.
  - name: releaseAbstractions
    displayName: Release Microsoft.Data.SqlClient.Extensions.Abstractions
    type: boolean
    default: false

  # Release the Microsoft.Data.SqlClient package.
  - name: releaseSqlClient
    displayName: Release Microsoft.Data.SqlClient
    type: boolean
    default: false

  # Release the Microsoft.Data.SqlClient.Extensions.Azure package.
  - name: releaseAzure
    displayName: Release Microsoft.Data.SqlClient.Extensions.Azure
    type: boolean
    default: false

  # Release the Microsoft.Data.SqlClient.AlwaysEncrypted.AzureKeyVaultProvider package.
  - name: releaseAkvProvider
    displayName: Release Microsoft.Data.SqlClient.AlwaysEncrypted.AzureKeyVaultProvider
    type: boolean
    default: false

variables:
  - template: /eng/pipelines/common/variables/common-variables.yml@self
  - template: /eng/pipelines/onebranch/variables/onebranch-variables.yml@self
  - template: /eng/pipelines/onebranch/variables/package-variables.yml@self
    parameters:
      isPreview: ${{ parameters.isPreview }}

  # Drives ContinuousIntegrationBuild=true in src/Directory.Build.props so the shipped
  # DLLs/PDBs embed portable /_/... source paths and the produced NuGet packages pass
  # NuGet Package Explorer's "Deterministic (build)" check.  Set on both OneBranch
  # pipelines; PR/CI builds leave it unset (false).
  - name: BuildForRelease
    value: true

resources:
  repositories:
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main

extends:
  # See: https://aka.ms/obpipelines/templates
  template: '/v2/OneBranch.Official.CrossPlat.yml@templates'

  parameters:
    featureFlags:
      EnableCDPxPAT: false
      WindowsHostVersion: 1ESWindows2022

    release:
      # This indicates the pipeline category to deploy Box products.  See:
      # https://eng.ms/docs/products/onebranch/release/yamlreleasepipelines/deployboxproducts
      category: NonAzure

    # See: https://aka.ms/obpipelines/sdl
    #
    # The following SDL tasks are auto-injected by the OneBranch / 1ES Pipeline Templates and run
    # WITHOUT any explicit globalSdl configuration.  They were verified as running in recent
    # pipeline runs, so we intentionally do not redeclare them here:
    #
    #   - Component Governance / Component Detection / Secure Supply Chain
    #     Analysis (dependency vulnerability scanning)
    #   - AntiMalware Scanner (Binary + Source)
    #   - 1ES Secret Scanning (SPMI)
    #   - Generate SBoM Manifest
    #   - CodeSign Validation (runs on the signing path; nothing is signed in non-official runs)
    #   - CodeQL 3000 (ALWAYS enabled via the 1ESPT (Official.CrossPlat) entry point, regardless of
    #     the codeql config below.)
    #
    globalSdl:

      # Snapshot of the SDL analyzer findings that pre-existed the breakOnSdlError rollout, so
      # builds only break on NEW findings.  Generated from the SDL analysis artifacts of a full
      # non-official run and kept under .config/ alongside the other SDL tool configs
      # (CredScan/PoliCheck/TSA).
      baseline:
        baselineFile: $(Build.SourcesDirectory)/.config/guardian/.gdnbaselines

      # Configure APIScan behaviour:
      #
      # https://eng.ms/docs/products/onebranch/securitycompliancegovernanceandpolicies/sdlforcontainerizedworkflows/customizesdlforcontainerbuilds#apiscan
      #
      # https://eng.ms/docs/coreai/devdiv/one-engineering-system-1es/1es-mohanb/security-integration/guardian-wiki/sdl-azdo-extension/apiscan-build-task#v2
      #
      apiscan:
        # We want APIScan enabled by default for our jobs.  However, some jobs don't produce any
        # artifacts, and they will disable APIScan via the OneBranch per-job ob_sdl_apiscan_enabled
        # variable.
        enabled: true

        # APIScan errors break the build when breakOnSdlError is set.
        break: ${{ parameters.breakOnSdlError }}

        # Use release mode for official pipelines.
        modeType: release

        # We have a single "name" registered with APIScan for all of our packages.
        #
        # https://eng.ms/docs/products/apiscan/onboard/requirements/registersoftware
        #
        softwareName: Microsoft.Data.SqlClient

        # Similar to the software name, we have a single version registered as well.  This has
        # nothing to do with the NuGet package version.  It is purely an APIScan registration
        # value that points to our backend configuration.
        softwareVersion: '6.10'

        # We want the standard level of logging.
        verbosityLevel: standard

      armory:
        enabled: true
        break: ${{ parameters.breakOnSdlError }}

      asyncSdl:
        # Disabling this as it complicates the build process with minimal gain
        enabled: false

      binskim:
        enabled: true
        break: ${{ parameters.breakOnSdlError }}

      codeql:
        # CodeQL 3000 is configured under the `compiled` key; `enabled` is a sub-property of
        # `compiled` (not of `codeql`).  CodeQL runs asynchronously on its own platform and cannot
        # break the build by design, so it has no `break` value.
        compiled:
          enabled: true

      credscan:
        enabled: true
        suppressionsFile: '$(REPO_ROOT)/.config/CredScanSuppressions.json'

      eslint:
        # Only useful for repos with ECMAscript - which we do not have.
        enabled: false
        # Break value is wired preemptively so it takes effect if eslint is ever enabled.
        break: ${{ parameters.breakOnSdlError }}

      policheck:
        enabled: true
        break: ${{ parameters.breakOnSdlError }}
        exclusionsFile: '$(REPO_ROOT)\.config\PolicheckExclusions.xml'

      psscriptanalyzer:
        # Static analysis of the repository's PowerShell scripts (e.g. under eng/).
        enabled: true
        break: ${{ parameters.breakOnSdlError }}

      roslyn:
        # Note, requires RoslynAnalyzers task to be added as a separate step
        enabled: true
        break: ${{ parameters.breakOnSdlError }}

      publishLogs:
        enabled: true

      sbom:
        enabled: true
        packageName: 'Microsoft.Data.SqlClient'
        packageVersion: '$(Build.BuildNumber)'

      tsa:
        # We deliberately drive every tool's `break` value from breakOnSdlError and set TSA's
        # `enabled` to its negation, rather than relying on OneBranch's implicit behaviour of
        # flipping each tool's break default based on whether TSA is enabled.  We have hit bugs in
        # that implicit break-altering logic in the past, so we set both values explicitly to keep
        # them deterministic.
        #
        # TSA bug filing is enabled when we are not breaking on SDL errors.
        enabled: ${{ not(parameters.breakOnSdlError) }}
        configFile: '$(REPO_ROOT)/.config/tsaoptions.json'

    stages:
      - template: /eng/pipelines/onebranch/stages/build-stages.yml@self
        parameters:
          isOfficial: true # This is an official pipeline.
          buildSqlServerServer: ${{ parameters.buildSqlServerServer }}
          buildSqlClient: ${{ parameters.buildSqlClient }}
          buildAkvProvider: ${{ parameters.buildAkvProvider }}

          abstractionsArtifactsName: '${{ variables.abstractionsArtifactsName }}'
          abstractionsFileVersion: '${{ variables.abstractionsFileVersion }}'
          abstractionsPackageVersion: '${{ variables.abstractionsPackageVersion }}'
          akvProviderArtifactsName: '${{ variables.akvProviderArtifactsName }}'
          akvProviderFileVersion: '${{ variables.akvProviderFileVersion }}'
          akvProviderPackageVersion: '${{ variables.akvProviderPackageVersion }}'
          azureArtifactsName: '${{ variables.azureArtifactsName }}'
          azureFileVersion: '${{ variables.azureFileVersion }}'
          azurePackageVersion: '${{ variables.azurePackageVersion }}'
          loggingArtifactsName: '${{ variables.loggingArtifactsName }}'
          loggingFileVersion: '${{ variables.loggingFileVersion }}'
          loggingPackageVersion: '${{ variables.loggingPackageVersion }}'
          sqlClientArtifactsName: '${{ variables.sqlClientArtifactsName }}'
          sqlClientFileVersion: '${{ variables.sqlClientFileVersion }}'
          sqlClientPackageVersion: '${{ variables.sqlClientPackageVersion }}'
          sqlServerArtifactsName: '${{ variables.sqlServerArtifactsName }}'
          sqlServerFileVersion: '${{ variables.sqlServerFileVersion }}'
          sqlServerPackageVersion: '${{ variables.sqlServerPackageVersion }}'

          signingAppRegistrationClientId: '$(SigningAppRegistrationClientId)'
          signingAppRegistrationTenantId: '$(SigningAppRegistrationTenantId)'
          signingAuthAkvName: '$(SigningAuthAkvName)'
          signingAuthSignCertName: '$(SigningAuthSignCertName)'
          signingEsrpClientId: '$(SigningEsrpClientId)'
          signingEsrpConnectedServiceName: '$(SigningEsrpConnectedServiceName)'

      - template: /eng/pipelines/onebranch/stages/publish-symbols-stage.yml@self
        parameters:
          publishSymbols: ${{ parameters.publishSymbols }}
          buildSqlServerServer: ${{ parameters.buildSqlServerServer }}
          buildSqlClient: ${{ parameters.buildSqlClient }}
          buildAkvProvider: ${{ parameters.buildAkvProvider }}

          abstractionsArtifactsName: '${{ variables.abstractionsArtifactsName }}'
          abstractionsPackageVersion: '${{ variables.abstractionsPackageVersion }}'
          akvProviderArtifactsName: '${{ variables.akvProviderArtifactsName }}'
          akvProviderPackageVersion: '${{ variables.akvProviderPackageVersion }}'
          azureArtifactsName: '${{ variables.azureArtifactsName }}'
          azurePackageVersion: '${{ variables.azurePackageVersion }}'
          loggingArtifactsName: '${{ variables.loggingArtifactsName }}'
          loggingPackageVersion: '${{ variables.loggingPackageVersion }}'
          sqlClientArtifactsName: '${{ variables.sqlClientArtifactsName }}'
          sqlClientPackageVersion: '${{ variables.sqlClientPackageVersion }}'
          sqlServerArtifactsName: '${{ variables.sqlServerArtifactsName }}'
          sqlServerPackageVersion: '${{ variables.sqlServerPackageVersion }}'

          symbolsAzureSubscription: '$(SymbolsAzureSubscription)'
          symbolsPublishProjectName: '$(SymbolsPublishProjectNameSqlClient)'
          # Symbol server target follows releaseToProduction: Production for
          # real releases, PPE for test/QA releases.
          ${{ if eq(parameters.releaseToProduction, true) }}:
            symbolsPublishServer: '$(SymbolsPublishServerProd)'
            symbolsPublishTokenUri: '$(SymbolsPublishTokenUriProd)'
          ${{ else }}:
            symbolsPublishServer: '$(SymbolsPublishServerPPE)'
            symbolsPublishTokenUri: '$(SymbolsPublishTokenUriPPE)'
          symbolsUploadAccount: '$(SymbolsUploadAccount)'

      - template: /eng/pipelines/onebranch/stages/release-stages.yml@self
        parameters:
          debug: ${{ parameters.debug }}
          releaseToProduction: ${{ parameters.releaseToProduction }}
          # This is an official pipeline.
          isOfficial: true
          stageNameSuffix: production

          publishSymbols: ${{ parameters.publishSymbols }}

          abstractionsArtifactsName: '${{ variables.abstractionsArtifactsName }}'
          abstractionsPackageVersion: '${{ variables.abstractionsPackageVersion }}'
          akvProviderArtifactsName: '${{ variables.akvProviderArtifactsName }}'
          akvProviderPackageVersion: '${{ variables.akvProviderPackageVersion }}'
          azureArtifactsName: '${{ variables.azureArtifactsName }}'
          azurePackageVersion: '${{ variables.azurePackageVersion }}'
          loggingArtifactsName: '${{ variables.loggingArtifactsName }}'
          loggingPackageVersion: '${{ variables.loggingPackageVersion }}'
          sqlClientArtifactsName: '${{ variables.sqlClientArtifactsName }}'
          sqlClientPackageVersion: '${{ variables.sqlClientPackageVersion }}'
          sqlServerArtifactsName: '${{ variables.sqlServerArtifactsName }}'
          sqlServerPackageVersion: '${{ variables.sqlServerPackageVersion }}'

          releaseSqlServerServer: ${{ parameters.releaseSqlServerServer }}
          releaseLogging: ${{ parameters.releaseLogging }}
          releaseAbstractions: ${{ parameters.releaseAbstractions }}
          releaseSqlClient: ${{ parameters.releaseSqlClient }}
          releaseAzure: ${{ parameters.releaseAzure }}
          releaseAkvProvider: ${{ parameters.releaseAkvProvider }}
