# =============================================================================
# sqlclient-kerberos
# =============================================================================
# Nightly Kerberos authentication test pipeline for Microsoft.Data.SqlClient.
# Replaces the Classic "Test-SqlClient-Kerberos-Azure" pipeline.
#
# Job breakdown (11 total):
#   Stage: Windows-netfx       → 1 job  (net462)
#   Stage: Windows-netcore     → 6 jobs (3 TFs × 2 ManagedSNI)
#   Stage: Linux-netcore       → 3 jobs (3 TFs, ManagedSNI=True)
#   Stage: Merge-Code-Coverage → 1 job
#
# Required ADO variable groups (link in pipeline UI):
#   - kv-sqldrivers-shared
#   - ADO - SQL Server Setup variables
#
# Required ADO pipeline variables (define in pipeline UI):
#   - REMOTE_TCP_CONN_STRING    (connection string for remote SQL via TCP)
#   - REMOTE_NP_CONN_STRING     (connection string for remote SQL via Named Pipes)
#   - KerberosDomain            (AD domain, e.g. mydomain.contoso.com)
#   - KerberosDomainOU          (OU for computer accounts)
#   - KerberosDomainUser        (domain user, sAMAccountName)
#   - KerberosDomainPassword    (secret — domain user password)
# =============================================================================

trigger: none   # Nightly only — no CI trigger
pr: none        # Not triggered by PRs

schedules:
  - cron: '0 7 * * *'
    displayName: Daily run (07:00 UTC)
    branches:
      include:
        - main
        - release/6.1
        - release/7.0
    always: true

name: $(date:yyyyMMdd)$(rev:.r)

# =============================================================================
# STAGES
# =============================================================================
stages:

  # ===========================================================================
  # Stage 1 — Windows · .NET Framework (1 job)
  # ===========================================================================
  - stage: Windows_netfx
    displayName: Windows - .NET Framework
    dependsOn: []
    jobs:
      - job: Windows_netfx_net462
        displayName: Windows netfx net462
        timeoutInMinutes: 360
        pool:
          name: ADO-Trusted-Domain-Win-WestUS2
          demands:
            - ImageOverride -equals ADO-MMS22-SQL19
        steps:

          - checkout: self
            clean: true
            fetchDepth: 1
            fetchTags: false

          # Install .NET SDK (from global.json) and runtimes using the shared
          # template.
          - template: /eng/pipelines/steps/install-dotnet.yml@self
            parameters:
              runtimes: ['8.x', '9.x']

          # --- Update test configuration ---
          - pwsh: |
              $jdata = Get-Content -Raw "config.default.json" | ConvertFrom-Json
              foreach ($p in $jdata) {
                  $p.TCPConnectionString       = $env:REMOTE_TCP_CONN_STRING
                  $p.NPConnectionString        = $env:REMOTE_NP_CONN_STRING
                  $p.SupportsIntegratedSecurity = "true"
                  $p.UseManagedSNIOnWindows    = "false"
              }
              $jdata | ConvertTo-Json | Set-Content "config.json"
            workingDirectory: src/Microsoft.Data.SqlClient/tests/tools/Microsoft.Data.SqlClient.TestUtilities
            displayName: Update test config.json
            env:
              REMOTE_TCP_CONN_STRING: $(REMOTE_TCP_CONN_STRING)
              REMOTE_NP_CONN_STRING: $(REMOTE_NP_CONN_STRING)

          # --- Prepare Windows services ---
          - powershell: |
              $svc = Get-Service -Name SQLBrowser -ErrorAction SilentlyContinue
              if ($null -ne $svc) {
                  Set-Service -StartupType Automatic SQLBrowser
                  if ($svc.Status -ne 'Running') { Start-Service SQLBrowser }
                  Get-Service SQLBrowser | Select-Object Name, StartType, Status
              }
            displayName: Start SQL Server Browser

          - powershell: |
              Set-DtcNetworkSetting -DtcName "Local" `
                -InboundTransactionsEnabled $true `
                -OutboundTransactionsEnabled $true `
                -RemoteClientAccessEnabled $true `
                -Confirm:$false

              Get-NetFirewallRule -DisplayName "Distributed Transaction Coordinator (RPC)"      | Set-NetFirewallRule -Profile Domain -Action Allow -Enabled True
              Get-NetFirewallRule -DisplayName "Distributed Transaction Coordinator (RPC-EPMAP)" | Set-NetFirewallRule -Profile Domain -Action Allow -Enabled True
              Get-NetFirewallRule -DisplayName "Distributed Transaction Coordinator (TCP-Out)"   | Set-NetFirewallRule -Profile Domain -Action Allow -Enabled True
              Get-NetFirewallRule -DisplayName "Distributed Transaction Coordinator (TCP-In)"    | Set-NetFirewallRule -Profile Domain -Action Allow -Enabled True
            displayName: Enable Network DTC Access

          # --- Build ---
          - task: DotNetCoreCLI@2
            displayName: Build SqlClient
            retryCountOnTaskFailure: 1
            inputs:
              command: build
              projects: build.proj
              arguments: >-
                -t:BuildSqlClient
                -p:Configuration=Release

          # --- Run tests ---
          - task: DotNetCoreCLI@2
            displayName: Run Tests (net462)
            retryCountOnTaskFailure: 2
            inputs:
              command: build
              projects: build.proj
              arguments: >-
                -t:TestSqlClient
                -p:TestFramework=net462
                -p:Configuration=Release

          # --- Publish results & coverage ---
          - task: PublishTestResults@2
            displayName: Publish Test Results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: |
                TestResults/*.trx
                TestResults/**/*.coverage
              mergeTestResults: true
              testRunTitle: Windows-netfx-net462
              buildConfiguration: Release

          - pwsh: |
              cd TestResults
              Get-ChildItem -Filter "*.coverage" -Recurse |
                Rename-Item -NewName { "net462" + $_.Name }
            displayName: Rename coverage files
            condition: succeededOrFailed()

          - task: PublishPipelineArtifact@1
            displayName: Publish Test Artifacts
            condition: succeededOrFailed()
            inputs:
              targetPath: TestResults
              artifact: net462-$(System.JobId)

  # ===========================================================================
  # Stage 2 — Windows · .NET Core (6 jobs = 3 TFs × 2 ManagedSNI)
  # ===========================================================================
  - stage: Windows_netcore
    displayName: Windows - .NET Core
    dependsOn: []
    jobs:
      - job: Windows_netcore
        displayName: Windows netcore
        timeoutInMinutes: 360
        workspace:
          clean: all    # Purge obj/artifacts from prior runs on self-hosted agents
        strategy:
          matrix:
            net8_NativeSNI:
              targetFramework: net8.0
              managedSNI: 'false'
            net8_ManagedSNI:
              targetFramework: net8.0
              managedSNI: 'true'
            net9_NativeSNI:
              targetFramework: net9.0
              managedSNI: 'false'
            net9_ManagedSNI:
              targetFramework: net9.0
              managedSNI: 'true'
            net10_NativeSNI:
              targetFramework: net10.0
              managedSNI: 'false'
            net10_ManagedSNI:
              targetFramework: net10.0
              managedSNI: 'true'
        pool:
          name: ADO-Trusted-Domain-Win-WestUS2
          demands:
            - ImageOverride -equals ADO-MMS22-SQL19
        steps:

          - checkout: self
            clean: true
            fetchDepth: 1
            fetchTags: false

          - template: /eng/pipelines/steps/install-dotnet.yml@self
            parameters:
              runtimes: ['8.x', '9.x']

          # --- Update test configuration ---
          # Uses runtime variables from the matrix ($(managedSNI)) so we use
          # inline PowerShell instead of the shared config template which
          # requires compile-time parameters.
          - pwsh: |
              $jdata = Get-Content -Raw "config.default.json" | ConvertFrom-Json
              foreach ($p in $jdata) {
                  $p.TCPConnectionString       = $env:REMOTE_TCP_CONN_STRING
                  $p.NPConnectionString        = $env:REMOTE_NP_CONN_STRING
                  $p.SupportsIntegratedSecurity = "true"
                  $p.UseManagedSNIOnWindows    = $env:MANAGED_SNI
              }
              $jdata | ConvertTo-Json | Set-Content "config.json"
            workingDirectory: src/Microsoft.Data.SqlClient/tests/tools/Microsoft.Data.SqlClient.TestUtilities
            displayName: Update test config.json
            env:
              REMOTE_TCP_CONN_STRING: $(REMOTE_TCP_CONN_STRING)
              REMOTE_NP_CONN_STRING: $(REMOTE_NP_CONN_STRING)
              MANAGED_SNI: $(managedSNI)

          # --- Prepare Windows services ---
          - powershell: |
              $svc = Get-Service -Name SQLBrowser -ErrorAction SilentlyContinue
              if ($null -ne $svc) {
                  Set-Service -StartupType Automatic SQLBrowser
                  if ($svc.Status -ne 'Running') { Start-Service SQLBrowser }
                  Get-Service SQLBrowser | Select-Object Name, StartType, Status
              }
            displayName: Start SQL Server Browser

          - powershell: |
              Set-DtcNetworkSetting -DtcName "Local" `
                -InboundTransactionsEnabled $true `
                -OutboundTransactionsEnabled $true `
                -RemoteClientAccessEnabled $true `
                -Confirm:$false

              Get-NetFirewallRule -DisplayName "Distributed Transaction Coordinator (RPC)"      | Set-NetFirewallRule -Profile Domain -Action Allow -Enabled True
              Get-NetFirewallRule -DisplayName "Distributed Transaction Coordinator (RPC-EPMAP)" | Set-NetFirewallRule -Profile Domain -Action Allow -Enabled True
              Get-NetFirewallRule -DisplayName "Distributed Transaction Coordinator (TCP-Out)"   | Set-NetFirewallRule -Profile Domain -Action Allow -Enabled True
              Get-NetFirewallRule -DisplayName "Distributed Transaction Coordinator (TCP-In)"    | Set-NetFirewallRule -Profile Domain -Action Allow -Enabled True
            displayName: Enable Network DTC Access

          # --- Build ---

          - task: DotNetCoreCLI@2
            displayName: Build SqlClient
            retryCountOnTaskFailure: 1
            inputs:
              command: build
              projects: build.proj
              arguments: >-
                -t:BuildSqlClient
                -p:Configuration=Release

          # --- Run tests ---
          - task: DotNetCoreCLI@2
            displayName: Run Tests ($(targetFramework))
            retryCountOnTaskFailure: 2
            inputs:
              command: build
              projects: build.proj
              arguments: >-
                -t:TestSqlClient
                -p:TestFramework=$(targetFramework)
                -p:Configuration=Release

          # --- Publish results & coverage ---
          - task: PublishTestResults@2
            displayName: Publish Test Results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: |
                TestResults/*.trx
                TestResults/**/*.coverage
              mergeTestResults: true
              testRunTitle: Windows-netcore-$(targetFramework)-ManagedSNI_$(managedSNI)
              buildConfiguration: Release

          - pwsh: |
              cd TestResults
              Get-ChildItem -Filter "*.coverage" -Recurse |
                Rename-Item -NewName { "$(targetFramework)" + $_.Name }
            displayName: Rename coverage files
            condition: succeededOrFailed()

          - task: PublishPipelineArtifact@1
            displayName: Publish Test Artifacts
            condition: succeededOrFailed()
            inputs:
              targetPath: TestResults
              artifact: $(targetFramework)-ManagedSNI_$(managedSNI)-$(System.JobId)

  # ===========================================================================
  # Stage 3 — Linux · .NET Core + Kerberos (3 jobs = 3 TFs)
  # ===========================================================================
  - stage: Linux_netcore
    displayName: Linux - .NET Core (Kerberos)
    dependsOn: []
    jobs:
      - job: Linux_netcore
        displayName: Linux Kerberos
        timeoutInMinutes: 360
        strategy:
          matrix:
            net8:
              targetFramework: net8.0
            net9:
              targetFramework: net9.0
            net10:
              targetFramework: net10.0
        pool:
          name: ADO-Trusted-Linux-WestUS2
          demands:
            - ImageOverride -equals ADO-UB20-SQL22
        steps:

          - checkout: self
            clean: true
            fetchDepth: 1
            fetchTags: false

          # --- Install .NET SDK and runtimes ---
          - template: /eng/pipelines/steps/install-dotnet.yml@self
            parameters:
              runtimes: ['8.x', '9.x', '10.x']

          # --- Update test configuration (with Kerberos credentials) ---
          - pwsh: |
              $jdata = Get-Content -Raw "config.default.json" | ConvertFrom-Json
              foreach ($p in $jdata) {
                  $p.TCPConnectionString       = $env:REMOTE_TCP_CONN_STRING
                  $p.NPConnectionString        = $env:REMOTE_NP_CONN_STRING
                  $p.SupportsIntegratedSecurity = "true"
              }
              $jdata | Add-Member -NotePropertyName "KerberosDomainUser"     -NotePropertyValue $env:KERBEROS_DOMAIN_USER     -Force
              $jdata | Add-Member -NotePropertyName "KerberosDomainPassword" -NotePropertyValue $env:KERBEROS_DOMAIN_PASSWORD -Force
              $jdata | ConvertTo-Json | Set-Content "config.json"
            workingDirectory: src/Microsoft.Data.SqlClient/tests/tools/Microsoft.Data.SqlClient.TestUtilities
            displayName: Update test config.json (Kerberos)
            env:
              REMOTE_TCP_CONN_STRING: $(REMOTE_TCP_CONN_STRING)
              REMOTE_NP_CONN_STRING: $(REMOTE_NP_CONN_STRING)
              KERBEROS_DOMAIN_USER: $(KerberosDomainUser)
              KERBEROS_DOMAIN_PASSWORD: $(KerberosDomainPassword)

          # --- Kerberos domain join ---
          - template: /eng/pipelines/common/templates/steps/kerberos-init-step.yml@self
            parameters:
              kerberosDomain: $(KerberosDomain)
              kerberosDomainOU: $(KerberosDomainOU)
              kerberosDomainUser: $(KerberosDomainUser)
              kerberosDomainPassword: $(KerberosDomainPassword)

          # --- Verify SQL connectivity ---
          - pwsh: |
              Install-Module -Name SqlServer -Force -Confirm:$false
              Import-Module SqlServer
              Invoke-Sqlcmd -Query "SELECT @@VERSION, @@SERVERNAME" -ConnectionString $env:REMOTE_TCP_CONN_STRING
            displayName: Verify SQL connectivity
            env:
              REMOTE_TCP_CONN_STRING: $(REMOTE_TCP_CONN_STRING)

          # --- Build ---
          - task: DotNetCoreCLI@2
            displayName: Build SqlClient
            inputs:
              command: build
              projects: build.proj
              arguments: >-
                -t:BuildSqlClient
                -p:Configuration=Release

          # --- Run tests ---
          - task: DotNetCoreCLI@2
            displayName: Run Tests ($(targetFramework))
            inputs:
              command: build
              projects: build.proj
              arguments: >-
                -t:TestSqlClient
                -p:TestFramework=$(targetFramework)
                -p:Configuration=Release

          # --- Publish results & coverage ---
          - task: PublishTestResults@2
            displayName: Publish Test Results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: |
                TestResults/*.trx
                TestResults/**/*.coverage
              mergeTestResults: true
              testRunTitle: Linux-netcore-$(targetFramework)
              buildConfiguration: Release

          - pwsh: |
              cd TestResults
              Get-ChildItem -Filter "*.coverage" -Recurse |
                Rename-Item -NewName { "$(targetFramework)" + $_.Name }
            displayName: Rename coverage files
            condition: succeededOrFailed()

          - task: PublishPipelineArtifact@1
            displayName: Publish Test Artifacts
            condition: succeededOrFailed()
            inputs:
              targetPath: TestResults
              artifact: $(targetFramework)-linux-$(System.JobId)

          # --- Kerberos cleanup (always runs) ---
          - template: /eng/pipelines/common/templates/steps/kerberos-cleanup-step.yml@self
            parameters:
              kerberosDomain: $(KerberosDomain)
              kerberosDomainUser: $(KerberosDomainUser)
              kerberosDomainPassword: $(KerberosDomainPassword)

  # ===========================================================================
  # Stage 4 — Merge Code Coverage (1 job)
  # ===========================================================================
  - stage: Merge_Code_Coverage
    displayName: Merge Code Coverage
    dependsOn:
      - Windows_netfx
      - Windows_netcore
      - Linux_netcore
    condition: succeededOrFailed()
    jobs:
      - template: /eng/pipelines/common/templates/jobs/ci-code-coverage-job.yml@self
        parameters:
          upload: false
