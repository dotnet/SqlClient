####################################################################################################
#
# stages/compile-stage.yml
#
# PURPOSE
#   Compiles test binaries for each matrix entry (OS×Arch) using the upstream NuGet packages
#   from setup_stage. Each matrix entry produces ONE compile job that builds all test categories
#   (SqlClient, Abstractions, Azure) for all target frameworks. Compiled outputs are published
#   as named pipeline artifacts so test jobs can download and run them with --no-build.
#
# STAGES EXPOSED
#   compile_stage  (dependsOn: setup_stage)
#
# JOBS GENERATED (per matrix entry)
#   compile_<os>_<arch>  — Compiles all test projects for all TFMs
#
# ARTIFACTS PUBLISHED (per matrix entry)
#   compiled-tests-<os>-<arch>              — SqlClient FunctionalTests + ManualTests
#   compiled-tests-abstractions-<os>-<arch> — Abstractions extension tests
#   compiled-tests-azure-<os>-<arch>        — Azure extension tests
#
####################################################################################################

parameters:
  # The test execution matrix array (from matrix-stages.yml).
  - name: matrix
    type: object

  # The MSBuild configuration passed to 'dotnet build -c'.
  - name: buildConfiguration
    type: string
    values:
      - Debug
      - Release

  # Passed through to install-dotnet.yml to enable verbose SDK installation diagnostics.
  - name: debug
    type: boolean

  # Verbosity level forwarded to all 'dotnet restore' and 'dotnet build' invocations (-v flag).
  - name: dotnetVerbosity
    type: string

stages:
  - stage: compile_stage
    displayName: Compile Tests
    dependsOn:
      - setup_stage
    variables:
      - name: abstractionsPackageVersion
        value: $[ stageDependencies.setup_stage.setup_artifacts.outputs['resolve_versions.abstractionsPackageVersion'] ]
      - name: loggingPackageVersion
        value: $[ stageDependencies.setup_stage.setup_artifacts.outputs['resolve_versions.loggingPackageVersion'] ]
      - name: sqlClientPackageVersion
        value: $[ stageDependencies.setup_stage.setup_artifacts.outputs['resolve_versions.sqlClientPackageVersion'] ]
      - name: sqlServerPackageVersion
        value: $[ stageDependencies.setup_stage.setup_artifacts.outputs['resolve_versions.sqlServerPackageVersion'] ]

    jobs:
      - ${{ each entry in parameters.matrix }}:
        - template: /eng/pipelines/ci/test/jobs/compile-all-tests-job.yml@self
          parameters:
            jobName: compile_${{ lower(entry.os) }}_${{ entry.arch }}
            jobDisplayName: Compile ${{ entry.os }} ${{ entry.arch }}
            poolName: ${{ entry.poolName }}
            image: ${{ entry.image }}
            architecture: ${{ entry.arch }}
            os: ${{ entry.os }}
            arch: ${{ entry.arch }}
            buildConfiguration: ${{ parameters.buildConfiguration }}
            debug: ${{ parameters.debug }}
            dotnetVerbosity: ${{ parameters.dotnetVerbosity }}
