####################################################################################################
#
# stages/setup-stage.yml
#
# PURPOSE
#   First stage in the sqlclient-test pipeline. Its single job:
#     1. Downloads the upstream NuGet package artifacts produced by the sqlclient-package
#        pipeline from whichever ADO project triggered this run (Public or ADO.Net). Both
#        resource aliases are attempted; the triggering alias is preferred when both exist.
#     2. Copies the chosen packages into the local feed directory ($(localFeedPath)) so
#        downstream jobs can restore from it.
#     3. Resolves exact package versions by scanning nupkg filenames and publishes them as
#        job output variables so compile and test jobs can pass the correct
#        -p:PackageVersion* arguments to dotnet.
#     4. Re-publishes the local feed directory as the pipeline artifact 'upstream-packages'
#        so all subsequent stages can download it with a single DownloadPipelineArtifact
#        step instead of re-downloading from the originating pipeline.
#
# STAGES EXPOSED
#   setup_stage
#
# JOBS
#   setup_artifacts
#
# OUTPUT VARIABLES (accessible downstream as
#   stageDependencies.setup_stage.setup_artifacts.outputs['resolve_versions.<var>'])
#   abstractionsPackageVersion  - Microsoft.Data.SqlClient.Extensions.Abstractions version
#   loggingPackageVersion       - Microsoft.Data.SqlClient.Internal.Logging version
#   sqlClientPackageVersion     - Microsoft.Data.SqlClient version
#   sqlServerPackageVersion     - Microsoft.SqlServer.Server version
#
# ARTIFACTS PUBLISHED
#   upstream-packages  - the local NuGet feed directory for downstream compile and test jobs
#
# PARAMETERS
#   None. All configuration comes from pipeline variables defined in common-variables.yml.
#
####################################################################################################

stages:
  - stage: setup_stage
    displayName: Setup Upstream Artifacts
    jobs:
      - job: setup_artifacts
        displayName: Download Upstream Packages and Resolve Versions
        pool:
          name: $(ciPoolName)
          demands:
            - imageOverride -equals ADO-UB24

        steps:
          - checkout: self

          # The two download steps below use a runtime condition to skip whichever pipeline
          # resource did not participate in this run.
          #
          # resources.pipeline.<alias>.runID is a runtime-only variable (not available at
          # template compile time), so conditional inclusion via ${{ if }} is not possible.
          # The condition: property is the correct ADO mechanism: the step is always compiled
          # into the job but the runtime engine marks it Skipped when the expression evaluates
          # to false, leaving no downloaded artifact at that alias path.
          #
          # For a completion-triggered run exactly one alias will have a non-empty runID. For
          # a manually queued run the operator selects specific resource versions via the Run
          # Pipeline UI, so one or both aliases may have a runID depending on what was chosen.

          # TODO: Uncomment once sqlclient-package pipeline exists in the Public project.
          # - download: sqlclientPackagePublic
          #   displayName: Download Public sqlclient-package artifact
          #   artifact: $(packageArtifactName)
          #   # Skip if Public resource did not trigger; runID is empty when absent.
          #   condition: and(succeeded(), ne(variables['resources.pipeline.sqlclientPackagePublic.runID'], ''))

          - download: sqlclientPackageAdo
            displayName: Download ADO.Net sqlclient-package artifact
            artifact: $(packageArtifactName)
            # Skip if ADO.Net resource did not trigger; runID is empty when absent.
            condition: and(succeeded(), ne(variables['resources.pipeline.sqlclientPackageAdo.runID'], ''))

          # Choose the correct downloaded artifacts and copy them to the local feed directory for
          # downstream stages.
          - task: PowerShell@2
            displayName: Select Triggering Artifact and Build Local Feed
            inputs:
              filePath: eng/pipelines/ci/test/scripts/select-upstream-artifact.ps1
              arguments: >-
                -PipelineWorkspace '$(Pipeline.Workspace)'
                -PackageArtifactName '$(packageArtifactName)'
                -LocalFeedPath '$(localFeedPath)'
                -TriggeringAlias '$(Resources.TriggeringAlias)'
              pwsh: true

          # Extract package versions from the chosen artifact and publish them as job output
          # variables for downstream stages.
          - task: PowerShell@2
            name: resolve_versions
            displayName: Resolve Package Versions from Upstream Artifact
            inputs:
              filePath: eng/pipelines/ci/test/scripts/resolve-package-versions.ps1
              arguments: -LocalFeedPath '$(localFeedPath)'
              pwsh: true

          # Publish the local feed containing the upstream packages for downstream stages.
          - task: PublishPipelineArtifact@1
            displayName: Publish Upstream Packages for Downstream Stages
            inputs:
              targetPath: $(localFeedPath)
              artifactName: upstream-packages
              publishLocation: pipeline
