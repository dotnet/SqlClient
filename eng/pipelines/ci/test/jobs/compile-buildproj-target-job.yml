####################################################################################################
#
# jobs/compile-buildproj-target-job.yml
#
# PURPOSE
#   Generic compile job template that invokes a build.proj build target in package mode and
#   publishes a specific source subtree as a pipeline artifact.
#
#   This supports compile-once/run-many workflows for additional test projects (for example
#   Abstractions and Azure tests) that should be reused downstream.
#
####################################################################################################

parameters:
  # Unique ADO job identifier.
  - name: jobName
    type: string

  # Human-readable label shown in the pipeline UI.
  - name: jobDisplayName
    type: string

  # Agent pool name (1ES self-hosted or Azure Pipelines hosted).
  - name: poolName
    type: string

  # The pool image name — either a vmImage (hosted) or an imageOverride demand (1ES self-hosted).
  - name: image
    type: string

  # Target CPU architecture forwarded to build.proj via TestArchitecture.
  - name: architecture
    type: string
    values:
      - x64
      - x86

  # Target framework moniker passed to build.proj via TestFramework (e.g. net9.0).
  - name: targetFramework
    type: string

  # MSBuild configuration passed to build.proj via Configuration.
  - name: buildConfiguration
    type: string
    values:
      - Debug
      - Release

  # Enable verbose diagnostic output in SDK installation steps.
  - name: debug
    type: boolean

  # Verbosity level for dotnet restore/build (-v flag).
  - name: dotnetVerbosity
    type: string

  # build.proj target name to invoke (e.g. BuildAbstractionsTests, BuildAzureTests).
  - name: buildTarget
    type: string

  # Source path to publish as a pipeline artifact after compilation.
  - name: publishPath
    type: string

  # Pipeline artifact name for the compiled output.
  - name: compileArtifactName
    type: string

jobs:
  - job: ${{ parameters.jobName }}
    displayName: ${{ parameters.jobDisplayName }}
    pool:
      name: ${{ parameters.poolName }}
      ${{ if eq(parameters.poolName, 'Azure Pipelines') }}:
        vmImage: ${{ parameters.image }}
      ${{ else }}:
        demands:
          - imageOverride -equals ${{ parameters.image }}

    variables:
      abstractionsPackageVersion: $[ stageDependencies.setup_stage.setup_artifacts.outputs['resolve_versions.abstractionsPackageVersion'] ]
      loggingPackageVersion: $[ stageDependencies.setup_stage.setup_artifacts.outputs['resolve_versions.loggingPackageVersion'] ]
      sqlClientPackageVersion: $[ stageDependencies.setup_stage.setup_artifacts.outputs['resolve_versions.sqlClientPackageVersion'] ]
      sqlServerPackageVersion: $[ stageDependencies.setup_stage.setup_artifacts.outputs['resolve_versions.sqlServerPackageVersion'] ]

    steps:
      - checkout: self

      - task: DownloadPipelineArtifact@2
        displayName: Download Upstream Packages
        inputs:
          artifactName: upstream-packages
          targetPath: $(localFeedPath)

      - template: /eng/pipelines/steps/install-dotnet.yml@self
        parameters:
          architecture: ${{ parameters.architecture }}
          debug: ${{ parameters.debug }}
          runtimes: [8.x, 9.x]

      - task: DotNetCoreCLI@2
        displayName: Build ${{ parameters.buildTarget }} (build.proj)
        inputs:
          command: build
          projects: $(Build.SourcesDirectory)/build.proj
          arguments: >-
            -t:${{ parameters.buildTarget }}
            -p:Configuration=${{ parameters.buildConfiguration }}
            -p:TestFramework=${{ parameters.targetFramework }}
            -p:TestArchitecture=${{ parameters.architecture }}
            -p:ReferenceType=Package
            -p:PackageVersionAbstractions=$(abstractionsPackageVersion)
            -p:PackageVersionLogging=$(loggingPackageVersion)
            -p:PackageVersionSqlClient=$(sqlClientPackageVersion)
            -p:PackageVersionSqlServer=$(sqlServerPackageVersion)
            -verbosity:${{ parameters.dotnetVerbosity }}

      - task: PublishPipelineArtifact@1
        displayName: Publish Compiled Test Outputs
        inputs:
          targetPath: ${{ parameters.publishPath }}
          artifactName: ${{ parameters.compileArtifactName }}
          publishLocation: pipeline
