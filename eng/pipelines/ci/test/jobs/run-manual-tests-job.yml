####################################################################################################
#
# jobs/run-manual-tests-job.yml
#
# PURPOSE
#   Reusable job template that runs the ManualTests project against a live SQL Server instance.
#   Structurally identical to run-functional-tests-job.yml except it invokes build.proj target
#   TestSqlClientManual once per test set identifier (1, 2, 3, AE), passing -p:TestSet=<id>.
#   This partitions the test suite into smaller, independently-attributable runs.
#
#   Test sets map to categories within ManualTests:
#     1   - core connectivity and command execution
#     2   - data types and SqlBulkCopy
#     3   - transactions, pooling, diagnostics
#     AE  - Always Encrypted scenarios
#
#   Each set produces a separate .trx file. All .trx files are merged into a single test run by
#   publish-results-step.yml.
#
#   The test step uses four DotNetCoreCLI@2 tasks (command: build), one per set, invoking
#   build.proj target TestSqlClientManual with TestNoBuild=true and TestNoRestore=true.
#
#   Package versions (abstractionsPackageVersion, loggingPackageVersion, sqlClientPackageVersion,
#   sqlServerPackageVersion) are runtime output variables from setup_stage. They are mapped as
#   job-level variables here and passed to the target in package mode.
#
####################################################################################################

parameters:
  # Unique ADO job identifier, e.g. manual_windows_x64_sql22.
  - name: jobName
    type: string

  # Human-readable label shown in the pipeline UI.
  - name: jobDisplayName
    type: string

  # Controls SupportsIntegratedSecurity and test run title.
  - name: operatingSystem
    type: string
    values:
      - Windows
      - Linux
      - Mac

  # Agent pool name.
  - name: poolName
    type: string

  # The pool image name — either a vmImage (hosted) or an imageOverride demand (1ES self-hosted).
  - name: image
    type: string

  # Dotnet/runtime architecture installed on the agent and forwarded to build.proj via
  # TestArchitecture.
  - name: architecture
    type: string
    values:
      - x64
      - x86
      - arm64

  # TFM passed to build.proj via TestFramework.
  - name: targetFramework
    type: string

  # Configuration passed to build.proj via Configuration.
  - name: buildConfiguration
    type: string
    values:
      - Debug
      - Release

  # Name of the pipeline artifact that holds the pre-compiled test output.
  - name: compileArtifactName
    type: string

  # Enables verbose diagnostics in the install-dotnet step.
  - name: debug
    type: boolean

jobs:
  - job: ${{ parameters.jobName }}
    displayName: ${{ parameters.jobDisplayName }}
    pool:
      name: ${{ parameters.poolName }}
      ${{ if eq(parameters.poolName, 'Azure Pipelines') }}:
        vmImage: ${{ parameters.image }}
      ${{ else }}:
        demands:
          - imageOverride -equals ${{ parameters.image }}

    variables:
      abstractionsPackageVersion: $[ stageDependencies.setup_stage.setup_artifacts.outputs['resolve_versions.abstractionsPackageVersion'] ]
      akvProviderPackageVersion: $[ stageDependencies.setup_stage.setup_artifacts.outputs['resolve_versions.akvProviderPackageVersion'] ]
      loggingPackageVersion: $[ stageDependencies.setup_stage.setup_artifacts.outputs['resolve_versions.loggingPackageVersion'] ]
      sqlClientPackageVersion: $[ stageDependencies.setup_stage.setup_artifacts.outputs['resolve_versions.sqlClientPackageVersion'] ]
      sqlServerPackageVersion: $[ stageDependencies.setup_stage.setup_artifacts.outputs['resolve_versions.sqlServerPackageVersion'] ]

    steps:
      - checkout: self

      - task: DownloadPipelineArtifact@2
        displayName: Download Upstream Packages
        inputs:
          artifactName: upstream-packages
          targetPath: $(localFeedPath)

      - task: DownloadPipelineArtifact@2
        displayName: Download Compiled Test Outputs
        inputs:
          artifactName: ${{ parameters.compileArtifactName }}
          targetPath: $(Build.SourcesDirectory)/src/Microsoft.Data.SqlClient

      - template: /eng/pipelines/steps/install-dotnet.yml@self
        parameters:
          architecture: ${{ parameters.architecture }}
          debug: ${{ parameters.debug }}
          runtimes: [8.x, 9.x]

      - template: /eng/pipelines/ci/test/steps/configure-test-config-step.yml@self
        parameters:
          operatingSystem: ${{ parameters.operatingSystem }}

      - task: DotNetCoreCLI@2
        displayName: Run Manual Tests (Set 1, build.proj)
        inputs:
          command: build
          projects: $(Build.SourcesDirectory)/build.proj
          arguments: >-
            -t:TestSqlClientManual
            -p:Configuration=${{ parameters.buildConfiguration }}
            -p:TestFramework=${{ parameters.targetFramework }}
            -p:TestArchitecture=${{ parameters.architecture }}
            -p:TestSet=1
            -p:ReferenceType=Package
            -p:PackageVersionAbstractions=$(abstractionsPackageVersion)
            -p:PackageVersionAkvProvider=$(akvProviderPackageVersion)
            -p:PackageVersionLogging=$(loggingPackageVersion)
            -p:PackageVersionSqlClient=$(sqlClientPackageVersion)
            -p:PackageVersionSqlServer=$(sqlServerPackageVersion)
            -p:TestNoBuild=true
            -p:TestNoRestore=true
            -p:TestResultsFolderPath=$(testResultsDirectory)

      - task: DotNetCoreCLI@2
        displayName: Run Manual Tests (Set 2, build.proj)
        inputs:
          command: build
          projects: $(Build.SourcesDirectory)/build.proj
          arguments: >-
            -t:TestSqlClientManual
            -p:Configuration=${{ parameters.buildConfiguration }}
            -p:TestFramework=${{ parameters.targetFramework }}
            -p:TestArchitecture=${{ parameters.architecture }}
            -p:TestSet=2
            -p:ReferenceType=Package
            -p:PackageVersionAbstractions=$(abstractionsPackageVersion)
            -p:PackageVersionAkvProvider=$(akvProviderPackageVersion)
            -p:PackageVersionLogging=$(loggingPackageVersion)
            -p:PackageVersionSqlClient=$(sqlClientPackageVersion)
            -p:PackageVersionSqlServer=$(sqlServerPackageVersion)
            -p:TestNoBuild=true
            -p:TestNoRestore=true
            -p:TestResultsFolderPath=$(testResultsDirectory)

      - task: DotNetCoreCLI@2
        displayName: Run Manual Tests (Set 3, build.proj)
        inputs:
          command: build
          projects: $(Build.SourcesDirectory)/build.proj
          arguments: >-
            -t:TestSqlClientManual
            -p:Configuration=${{ parameters.buildConfiguration }}
            -p:TestFramework=${{ parameters.targetFramework }}
            -p:TestArchitecture=${{ parameters.architecture }}
            -p:TestSet=3
            -p:ReferenceType=Package
            -p:PackageVersionAbstractions=$(abstractionsPackageVersion)
            -p:PackageVersionAkvProvider=$(akvProviderPackageVersion)
            -p:PackageVersionLogging=$(loggingPackageVersion)
            -p:PackageVersionSqlClient=$(sqlClientPackageVersion)
            -p:PackageVersionSqlServer=$(sqlServerPackageVersion)
            -p:TestNoBuild=true
            -p:TestNoRestore=true
            -p:TestResultsFolderPath=$(testResultsDirectory)

      - task: DotNetCoreCLI@2
        displayName: Run Manual Tests (Set AE, build.proj)
        inputs:
          command: build
          projects: $(Build.SourcesDirectory)/build.proj
          arguments: >-
            -t:TestSqlClientManual
            -p:Configuration=${{ parameters.buildConfiguration }}
            -p:TestFramework=${{ parameters.targetFramework }}
            -p:TestArchitecture=${{ parameters.architecture }}
            -p:TestSet=AE
            -p:ReferenceType=Package
            -p:PackageVersionAbstractions=$(abstractionsPackageVersion)
            -p:PackageVersionAkvProvider=$(akvProviderPackageVersion)
            -p:PackageVersionLogging=$(loggingPackageVersion)
            -p:PackageVersionSqlClient=$(sqlClientPackageVersion)
            -p:PackageVersionSqlServer=$(sqlServerPackageVersion)
            -p:TestNoBuild=true
            -p:TestNoRestore=true
            -p:TestResultsFolderPath=$(testResultsDirectory)

      - template: /eng/pipelines/ci/test/steps/publish-results-step.yml@self
        parameters:
          testRunTitle: ${{ format('Manual_{0}_{1}', parameters.operatingSystem, parameters.targetFramework) }}
