# Installs the dotnet SDK or Runtime for ARM64 using the dotnet-install.ps1
# script.  This avoids a bug in UseDotNet@2:
#
# [BUG]: UseDotNet task installs x86 build
# https://github.com/microsoft/azure-pipelines-tasks/issues/20300

parameters:

  # True to enable debug logging.
  - name: debug
    type: boolean
    default: false
  
  # Whether to install the full SDK or the "dotnet" runtime
  - name: installType
    type: string
    values:
      - Runtime
      - SDK

  # SDK or Runtime version to install.
  #
  # See dotnet-install.ps1 documentation for version format:
  #
  # https://learn.microsoft.com/en-us/dotnet/core/tools/dotnet-install-script
  #
  - name: version
    type: string

steps:

  - pwsh: |-
      #------------------------------------------------------------------------
      # Download the dotnet-install.ps1 script

      Invoke-WebRequest -Uri "https://builds.dotnet.microsoft.com/dotnet/scripts/v1/dotnet-install.ps1" -OutFile "dotnet-install.ps1"
      
      #------------------------------------------------------------------------
      # Install dotnet

      $installParams = @{
          Architecture = "arm64"
          Channel =      "${{ parameters.version }}"
          InstallDir =   "$(Agent.ToolsDirectory)"
          Quality =      "GA"
      }
      
      if ('${{ parameters.installType }}' -eq 'Runtime') {
          $installParams.add('Runtime', 'dotnet')
      }
      
      & ./dotnet-install.ps1 -Verbose @installParams

      #----------------------------------------------------------------------
      # Remove the install script.

      Remove-Item dotnet-install.ps1 -ErrorAction:Ignore
      
      #----------------------------------------------------------------------
      # Set the DOTNET_ROOT environment variable, and add the tools dir to the
      # path.  These values propagate back out to the pipeline and are used by
      # subsequent steps.

      Write-Host "##vso[task.setvariable variable=DOTNET_ROOT]$(Agent.ToolsDirectory)"
      Write-Host "##vso[task.prependpath]$(Agent.ToolsDirectory)"
    
    displayName: Install .NET ${{ parameters.version }} ${{ parameters.installType }} for ARM64
