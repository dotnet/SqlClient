# This step installs the latest SQL Server 2025 onto the macOS host as a docker container and
# configures it for use.

parameters:

  # The SA password to set when configuring SQL Server.
  - name: saPassword
    type: string

steps:

  # Configure SQL Server.  This includes installing Docker and the SQLCMD tools, starting a SQL
  # Server container, and verifying we can connect to it.
  - bash: |
      # The "user" pipeline variable conflicts with homebrew, causing errors during install. Set it
      # back to the pipeline user.
      USER=`whoami`

      SQLCMD_ERRORS=$(Agent.TempDirectory)/sqlcmd_err.log
      echo "Errors will be written to: $SQLCMD_ERRORS"

      # Configure the prompt to show the current timestamp so we can see how long each command takes.
      export PS4='+ [$(date "+%Y-%m-%d %H:%M:%S")] '
      set -x

      # Install Docker CLI (not Desktop — Colima provides the daemon) and SQLCMD tools.
      brew install colima
      brew install docker
      brew tap microsoft/mssql-release https://github.com/Microsoft/homebrew-mssql-release
      brew update
      # Homebrew 5.2+ requires explicit trust for third-party taps.  Run this
      # after 'brew update' so the trust command is available even if the runner
      # image shipped an older Homebrew version.
      brew trust microsoft/mssql-release
      HOMEBREW_ACCEPT_EULA=Y brew install mssql-tools18

      # Fail fast if sqlcmd was not installed (e.g. tap-trust or formula error).
      # Without this check the script would loop for ~6 minutes trying to connect.
      if ! command -v sqlcmd &>/dev/null; then
        echo "ERROR: sqlcmd is not on PATH after brew install. Check the mssql-tools18 installation above."
        exit 1
      fi

      # Start Colima with Virtualization.framework for x86_64 binary translation
      # on Apple Silicon.  Rosetta/binfmt emulation is enabled by default in
      # Colima >= 0.8 when using --vm-type vz, which is dramatically faster than
      # --arch x86_64 (full QEMU VM emulation).
      # Requires macOS >= 13 (Ventura).
      #
      # The Lima hostagent that backs Colima intermittently fails to become
      # ready within its short startup window on the macOS CI runners
      # ("hostagent did not start up in 5s"), which is transient. Retry a few
      # times, tearing down the half-created instance between attempts and
      # dumping the hostagent log for diagnostics, before giving up.
      colimaAttempts=3
      colimaStarted=0
      for ((c=1; c<=colimaAttempts; c++))
      do
        echo "Starting Colima (attempt #$c of $colimaAttempts)..."
        if colima start --vm-type vz --cpu 4 --memory 4; then
          colimaStarted=1
          break
        fi
        echo "colima start failed (attempt #$c of $colimaAttempts)."
        echo "--- hostagent stderr (last 40 lines) ---"
        tail -40 "$HOME/.colima/_lima/colima/ha.stderr.log" 2>/dev/null || true
        echo "--- Tearing down half-created instance before retry ---"
        colima delete --force || true
        sleep 5
      done

      if [ $colimaStarted -ne 1 ]; then
        echo "ERROR: colima failed to start after $colimaAttempts attempts."
        colima status || true
        exit 1
      fi

      # Point the docker CLI at Colima's daemon socket.  Colima normally sets an
      # active docker context, but the standalone docker CLI (installed above via
      # 'brew install docker') can default to unix:///var/run/docker.sock, which
      # does not exist on macOS without Docker Desktop.  This caused every
      # 'docker pull' to fail instantly with:
      #   failed to connect to the docker API at unix:///var/run/docker.sock
      # Export DOCKER_HOST explicitly so all docker commands reach Colima.
      export DOCKER_HOST="unix://${HOME}/.colima/default/docker.sock"
      docker --version

      # Verify the docker daemon is actually reachable before attempting to pull.
      # This fails fast with useful diagnostics instead of looping through the
      # pull retries when the socket is misconfigured.
      if ! docker info >/dev/null 2>&1; then
        echo "ERROR: docker daemon is not reachable at $DOCKER_HOST."
        echo "--- colima status ---"
        colima status || true
        echo "--- docker context ls ---"
        docker context ls || true
        exit 1
      fi

      # Pull the SQL Server image with retries.  The macOS agents intermittently
      # fail to resolve or reach mcr.microsoft.com (DNS lookups or registry i/o
      # time out), which previously failed the whole step on the first attempt.
      # Retry a handful of times with a fixed delay before giving up.
      pullAttempts=5
      pullDelay=15
      pulled=0
      for ((p=1; p<=pullAttempts; p++))
      do
        echo "Pulling SQL Server image (attempt #$p of $pullAttempts)..."
        if docker pull --platform linux/amd64 mcr.microsoft.com/mssql/server:2025-latest; then
          pulled=1
          break
        fi
        echo "docker pull failed (attempt #$p of $pullAttempts). Retrying in ${pullDelay}s..."
        sleep $pullDelay
      done

      if [ $pulled -ne 1 ]; then
        echo "ERROR: Unable to pull mcr.microsoft.com/mssql/server:2025-latest after $pullAttempts attempts (registry/DNS unreachable)."
        exit 1
      fi

      # Password for the SA user (required)
      MSSQL_SA_PW="${{ parameters.saPassword }}"

      # Start the container and fail fast (with diagnostics) if it does not launch,
      # rather than silently falling through to the connection-wait loop.
      if ! docker run --platform linux/amd64 -e "ACCEPT_EULA=Y" -e "MSSQL_SA_PASSWORD=$MSSQL_SA_PW" -p 1433:1433 -p 1434:1434 --name sql1 --hostname sql1 -d mcr.microsoft.com/mssql/server:2025-latest; then
        echo "ERROR: Failed to start the sql1 container."
        docker ps -a --filter "name=^/sql1$"
        exit 1
      fi

      sleep 10

      docker ps -a

      # Connect to the SQL Server container and get its version.
      #
      # With Rosetta 2 emulation, SQL Server starts much faster than under full
      # QEMU emulation, but it can still take a minute or two.  We allow up to
      # 6 minutes (72 attempts × 5 seconds) as a generous upper bound.

      # Wait 5 seconds between attempts.
      delay=5

      # Try up to 72 times (~6 minutes) to connect.
      maxAttempts=72

      # Attempt counter.
      attempt=1

      # Flag to indicate when SQL Server is ready to accept connections.
      ready=0

      while [ $attempt -le $maxAttempts ]
      do

        echo "Waiting for SQL Server to start (attempt #$attempt of $maxAttempts)..."

        # -C trusts the self-signed certificate inside the container.
        sqlcmd -S 127.0.0.1 -No -C -U sa -P "$MSSQL_SA_PW" -Q "SELECT @@VERSION" >> $SQLCMD_ERRORS 2>&1

        # If the command was successful, then the SQL Server is ready.
        if [ $? -eq 0 ]; then
          ready=1
          break
        fi

        # Verify the container is still running; no point retrying if it crashed.
        if ! docker ps --filter "name=^/sql1$" --filter "status=running" --format '{{.Names}}' | grep -Fxq 'sql1'; then
          echo "ERROR: sql1 container is no longer running."
          docker ps -a --filter "name=^/sql1$"
          echo "--- Container logs ---"
          docker logs sql1 2>&1 | tail -50
          rm -f $SQLCMD_ERRORS
          exit 1
        fi

        # Increment the attempt counter.
        ((attempt++))

        # Wait before trying again.
        sleep $delay

      done

      # Is the SQL Server ready?
      if [ $ready -eq 0 ]
      then
        # No, so report the error(s) and exit.
        echo "Cannot connect to SQL Server after $maxAttempts attempts; installation aborted."
        echo "--- sqlcmd errors ---"
        cat $SQLCMD_ERRORS
        echo "--- Container status ---"
        docker ps -a --filter "name=^/sql1$"
        echo "--- Container logs (last 80 lines) ---"
        docker logs sql1 2>&1 | tail -80
        rm -f $SQLCMD_ERRORS
        exit 1
      fi

      rm -f $SQLCMD_ERRORS

      echo "Use sqlcmd to show which IP addresses are being listened on..."
      echo 0.0.0.0
      sqlcmd -S 0.0.0.0 -No -C -U sa -P "$MSSQL_SA_PW" -Q "SELECT @@VERSION" -l 2
      echo 127.0.0.1
      sqlcmd -S 127.0.0.1 -No -C -U sa -P "$MSSQL_SA_PW" -Q "SELECT @@VERSION" -l 2
      echo ::1
      sqlcmd -S ::1 -No -C -U sa -P "$MSSQL_SA_PW" -Q "SELECT @@VERSION" -l 2
      echo localhost
      sqlcmd -S localhost -No -C -U sa -P "$MSSQL_SA_PW" -Q "SELECT @@VERSION" -l 2
      echo "(sqlcmd default / not specified)"
      sqlcmd -No -C -U sa -P "$MSSQL_SA_PW" -Q "SELECT @@VERSION" -l 2

      echo "Configuring Dedicated Administer Connections to allow remote connections..."
      sqlcmd -S 127.0.0.1 -No -C -U sa -P "$MSSQL_SA_PW" -Q "sp_configure 'remote admin connections', 1; RECONFIGURE;"
      if [ $? = 1 ]
      then
        echo "Error configuring DAC for remote access."
        exit $errstatus
      else
        echo "Configuration complete."
      fi

    displayName: 'Configure SQL Server [macOS]'
