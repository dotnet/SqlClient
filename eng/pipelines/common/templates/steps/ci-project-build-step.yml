parameters:
  - name: platform
    type: string
    default: $(Platform)

  # The C# build configuration to build (e.g. Debug or Release).
  - name: buildConfiguration
    type: string
    values:
      - Debug
      - Release

  # The C# project reference type to use when building and packing the packages.
  - name: referenceType
    type: string
    values:
      # Reference sibling packages as NuGet packages.
      - Package
      # Reference sibling packages as C# projects.
      - Project

  - name: buildNumber
    type: string
    default: $(Build.BuildNumber)

  - name: operatingSystem
    type: string
    default: deferedToRuntime
    values:
      - Windows
      - Linux
      - MacOS
      - deferedToRuntime

  - name: build
    type: string
    default: MDS
    values:
      - MDS
      - AkvProvider
      - all
      - allNoDocs

  # The version to apply to the SqlClient family packages (SqlClient, Abstractions, Logging, and the
  # AKV Provider).  They all share this version.  Used when referenceType is Package; ignored for
  # Project.
  - name: packageVersion
    type: string
    default: $(packageVersion)

  # Necessary when referenceType is Package.  Ignored when referenceType is Project.
  - name: sqlServerPackageVersion
    type: string
    default: $(sqlServerPackageVersion)

steps:
  # Build MDS
  - ${{ if or(eq(parameters.build, 'MDS'), eq(parameters.build, 'all'), eq(parameters.build, 'allNoDocs')) }}:
    - task: DotNetCoreCLI@2
      displayName: 'Build Driver'
      condition: and(succeeded(), eq(variables['Agent.OS'], 'Windows_NT'))
      inputs:
        command: build
        projects: build.proj
        arguments: >-
          -t:BuildSqlClient
          -p:Configuration=${{ parameters.buildConfiguration }}
          -p:ReferenceType=${{ parameters.referenceType }}
          -p:BuildNumber=${{ parameters.buildNumber }}
          -p:PackageVersionSqlClient=${{ parameters.packageVersion }}
          -p:PackageVersionSqlServer=${{ parameters.sqlServerPackageVersion }}

  # Build AKV Provider
  - ${{ if or(eq(parameters.build, 'AkvProvider'), eq(parameters.build, 'all'), eq(parameters.build, 'allNoDocs')) }}:
    - task: DotNetCoreCLI@2
      displayName: 'Build AKV Provider'
      condition: and(succeeded(), eq(variables['Agent.OS'], 'Windows_NT'))
      inputs:
        command: build
        projects: build.proj
        arguments: >-
          -t:BuildAkvProvider
          -p:Configuration=${{ parameters.buildConfiguration }}
          -p:ReferenceType=${{ parameters.referenceType }}
          -p:BuildNumber=${{ parameters.buildNumber }}
          -p:PackageVersionSqlClient=${{ parameters.packageVersion }}
          -p:PackageVersionSqlServer=${{ parameters.sqlServerPackageVersion }}
