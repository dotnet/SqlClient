parameters:
  - name: platform
    type: string
    default: $(Platform)

  # The C# build configuration to build (e.g. Debug or Release).
  - name: buildConfiguration
    type: string
    values:
      - Debug
      - Release

  # The C# project reference type to use when building and packing the packages.
  - name: referenceType
    type: string
    values:
      # Reference sibling packages as NuGet packages.
      - Package
      # Reference sibling packages as C# projects.
      - Project

  - name: buildNumber
    type: string
    default: $(Build.BuildNumber)

  - name: operatingSystem
    type: string
    default: deferedToRuntime
    values:
      - Windows
      - Linux
      - MacOS
      - deferedToRuntime

  - name: build
    type: string
    default: MDS
    values:
      - MDS
      - AkvProvider
      - all
      - allNoDocs

  # The build number suffix to apply to all assembly file versions built by this step.
  - name: assemblyBuildNumber
    type: string

  # Necessary to build MDS when referenceType is Package.  Ignored when referenceType is Project.
  - name: abstractionsPackageVersion
    type: string
    default: $(abstractionsPackageVersion)

  # Necessary to build MDS when referenceType is Package.  Ignored when referenceType is Project.
  - name: loggingPackageVersion
    type: string
    default: $(loggingPackageVersion)

  # Necessary to build AKV Provider when referenceType is Package.  Ignored when referenceType is Project.
  - name: mdsPackageVersion
    type: string
    default: $(mdsPackageVersion)

  # Necessary to build AKV Provider when referenceType is Package.  Ignored when referenceType is Project.
  - name: akvPackageVersion
    type: string
    default: $(akvPackageVersion)

steps:
  # Build MDS
  - ${{ if or(eq(parameters.build, 'MDS'), eq(parameters.build, 'all'), eq(parameters.build, 'allNoDocs')) }}:
    - task: MSBuild@1
      displayName: 'Build Driver'
      condition: and(succeeded(), eq(variables['Agent.OS'], 'Windows_NT'))
      inputs:
        solution: build2.proj
        msbuildArchitecture: x64
        platform: '${{ parameters.platform }}'
        configuration: '${{ parameters.buildConfiguration }}'
        msbuildArguments:
          -t:BuildMds
          -p:ReferenceType=${{ parameters.referenceType }}
          -p:BuildNumber=${{ parameters.buildNumber }}
          -p:BuildSuffix=ci
          -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
          -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}

  # Build AKV Provider
  - ${{ if or(eq(parameters.build, 'AkvProvider'), eq(parameters.build, 'all'), eq(parameters.build, 'allNoDocs')) }}:
    - task: MSBuild@1
      displayName: 'Build AKV Provider'
      condition: and(succeeded(), eq(variables['Agent.OS'], 'Windows_NT'))
      inputs:
        solution: build.proj
        msbuildArchitecture: x64
        platform: '${{ parameters.platform }}'
        configuration: '${{ parameters.buildConfiguration }}'
        msbuildArguments: >-
          -t:BuildAkvProvider
          -p:ReferenceType=${{ parameters.referenceType }}
          -p:TestEnabled=true
          -p:GenerateNuget=false
          -p:Configuration=${{ parameters.buildConfiguration }}
          -p:BuildNumber=${{ parameters.buildNumber }}
          -p:AssemblyBuildNumber=${{ parameters.assemblyBuildNumber }}
          -p:AkvPackageVersion=${{ parameters.akvPackageVersion }}
          -p:AbstractionsPackageVersion=${{ parameters.abstractionsPackageVersion }}
          -p:LoggingPackageVersion=${{ parameters.loggingPackageVersion }}
          -p:MdsPackageVersion=${{ parameters.mdsPackageVersion }}
        verbosityRestore: Detailed
        verbosityPack: Detailed

