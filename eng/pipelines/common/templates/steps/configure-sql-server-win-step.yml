# This step configures an existing SQL Server running on the local Windows host.  For example, our
# 1ES Hosted Pool has images like ADO-MMS22-SQL22 that come with SQL Server 2022 pre-installed and
# running.

parameters:

  - name: instanceName
    type: string
    default: MSSQLSERVER

  - name: user
    type: string
    default: $(user)

  - name: saUser
    type: string
    default: $(saUser)

  # The SA password to set when configuring SQL Server.  This is also used for the user password.
  - name: saPassword
    type: string

  - name: SQLRootPath
    type: string
    default: ''

  - name: fileStreamDirectory
    type: string
    default: ''

  - name: x64AliasRegistryPath
    type: string
    default: $(x64AliasRegistryPath)

  - name: x86AliasRegistryPath
    type: string
    default: $(x86AliasRegistryPath)

  - name: SQLAliasName
    type: string
    default: $(SQLAliasName)

  - name: SQLAliasPort
    type: string
    default: $(SQLAliasPort)

  - name: enableLocalDB
    type: boolean
    default: false

  - name: localDbAppName
    type: string
    default: $(LocalDbAppName)

  - name: localDbSharedInstanceName
    type: string
    default: $(LocalDbSharedInstanceName)

# Step execution order:
#   1. Enable TCP, NP & Firewall   — Enable TCP and Named Pipes protocols, open firewall ports
#   2. Create SQL user              — Create test login/user, grant sysadmin, enable SA; restarts SQL if needed
#   3. Enable FileStream [Win]      — (conditional) Enable FileStream via WMI; sp_configure deferred to step 8
#   4. Create FileStreamFolder      — (conditional) Create the FileStream data directory
#   5. Setup SQL Alias              — Register TCP aliases in x86/x64 registry paths
#   6. Add SQL Certificate          — Generate self-signed cert, trust it, bind to SQL Server, grant key access
#   7. Restart SQL Server           — Restart to pick up protocol, cert, and FileStream WMI changes; wait for readiness
#   8. Configure FileStream Access  — (conditional) Run sp_configure filestream_access_level after restart
#   9. Start SQL Server Browser     — Start the Browser service for named-instance discovery
#  10. Enable LocalDB               — (conditional) Start and share the LocalDB instance

steps:

  # Step 1: Enable TCP, Named Pipes protocols and configure Windows Firewall rules.
  # GOTCHA: We must use the Windows-only powershell task here instead of the cross-platform pwsh
  # task because we call some Windows-specific cmdlets.
  - powershell: |
      try
      {
        # Acquire a WMI handle.
        Import-Module "sqlps"
        $smo = 'Microsoft.SqlServer.Management.Smo.'
        $wmi = new-object ($smo + 'Wmi.ManagedComputer')

        # List the WMI, including the instance names.
        Write-Host "WMI Information:"
        $wmi

        # Enable the TCP protocol on the default instance.
        $Tcp = $wmi.GetSmoObject("ManagedComputer[@Name='$env:COMPUTERNAME']/ ServerInstance[@Name='${{parameters.instanceName }}']/ServerProtocol[@Name='Tcp']")
        $Tcp.IsEnabled = $true
        $Tcp.Alter()

        # Emit the TCP object to the pipeline log.
        Write-Host "TCP Information:"
        $Tcp

        # Enable the NP protocol on the default instance.
        $Np = $wmi.GetSmoObject("ManagedComputer[@Name='$env:COMPUTERNAME']/ ServerInstance[@Name='${{parameters.instanceName }}']/ServerProtocol[@Name='Np']")
        $Np.IsEnabled = $true
        $Np.Alter()

        # Emit the NP object to the pipeline log.
        Write-Host "NP Information:"
        $Np
      }
      catch
      {
        $error[0] | format-list -force
        throw
      }

      New-NetFirewallRule -DisplayName "SQL TCP Ports" -Direction Inbound -Protocol TCP -LocalPort 1433 -Action allow
      $sqlSrvPath = (Get-WmiObject win32_service | ?{$_.DisplayName -eq 'SQL Server (${{parameters.instanceName }})'} | select @{Name="Path"; Expression={$_.PathName.split('"')[1]}}).Path
      New-NetFirewallRule -DisplayName "sqlservr.exe" -Program "$sqlSrvPath"
    displayName: 'Enable TCP, NP & Firewall [Win]'
    retryCountOnTaskFailure: 2

  # Step 2: Create test login and user with sysadmin privileges, enable and set the SA password.
  # If SQL Server is unresponsive (e.g. after protocol changes), this step will restart it once
  # and retry before failing.
  - powershell: |
      $password = "${{ parameters.saPassword }}"

      $machineName = $env:COMPUTERNAME

      if ("${{parameters.instanceName }}" -ne "MSSQLSERVER"){
        $machineName += "\${{parameters.instanceName }}"
      }

      Write-Host $machineName
      Import-Module "sqlps"

      # Determine the Windows service name for this SQL instance.
      $serviceName = "${{parameters.instanceName }}"
      if ("${{parameters.instanceName }}" -ne "MSSQLSERVER") {
          $serviceName = "MSSQL`$${{parameters.instanceName }}"
      }

      $hasRestarted = $false
      $tries = 0
      while ($true) {
          $tries++
          try {
              Invoke-Sqlcmd -ServerInstance "$machineName" -ConnectionTimeout 5 -ErrorAction Stop @"
                  CREATE LOGIN [${{parameters.user }}] WITH PASSWORD=N'$password',
                  DEFAULT_DATABASE=[master], DEFAULT_LANGUAGE=[us_english], CHECK_EXPIRATION=OFF, CHECK_POLICY=OFF;
                  CREATE USER [${{parameters.user }}] FROM LOGIN [${{parameters.user }}];
                  ALTER SERVER ROLE [sysadmin] ADD MEMBER [${{parameters.user }}];
                  ALTER LOGIN [${{parameters.saUser }}] ENABLE;
                  ALTER LOGIN [${{parameters.saUser }}] WITH PASSWORD = '$password';
      "@
              break
          } catch {
              if (-not $hasRestarted -and $tries -ge 5) {
                  # SQL Server may need a restart after protocol changes (TCP/NP).
                  Write-Host "Connection failed after $tries attempts. Restarting SQL Server ($serviceName) and retrying..."
                  Restart-Service -Name $serviceName -Force -ErrorAction Stop
                  $hasRestarted = $true
                  $tries = 0
                  Start-Sleep -Seconds 5
                  continue
              }
              if ($tries -ge 10) {  
                  Write-Host "##[error]Failed to create database user after $tries tries (including a restart)."
                  throw
              }
              Write-Host "Failed to connect to server (attempt $tries). Retrying in 5 seconds..."
              Start-Sleep -Seconds 5
          }
      }
    displayName: 'Create SQL user [Win]'
    env:
      SQL_USER: ${{parameters.user }}
      SQL_PASSWD: ${{ parameters.saPassword }}

  # Step 3: Enable FileStream at the OS/WMI level (conditional on SQLRootPath being set).
  # Only the WMI flag is toggled here. The T-SQL sp_configure call happens in step 8,
  # after the full SQL Server restart in step 7, to avoid needing a double restart.
  - ${{ if ne(parameters.SQLRootPath, '') }}:
    - powershell: |
        #Enable FileStream via WMI.
        # The sp_configure call is deferred to after the "Restart SQL Server [Win]"
        # step so we don't need a separate restart here.
        $instance = "${{parameters.instanceName }}"
        $wmi = Get-WmiObject -Namespace "${{parameters.SQLRootPath }}" -Class FilestreamSettings | where {$_.InstanceName -eq $instance}
        $wmi.EnableFilestream(3, $instance)
        Write-Host "FileStream enabled via WMI for instance '$instance'."
      displayName: 'Enable FileStream [Win]'

  # Step 4: Create the FileStream data directory (conditional on fileStreamDirectory being set).
  - ${{ if ne(parameters.FileStreamDirectory, '') }}:
    - powershell: |
        New-Item -Path ${{ parameters.fileStreamDirectory }} -ItemType Directory
      displayName: 'Create FileStreamFolder'
      retryCountOnTaskFailure: 1
      continueOnError: true

  # Step 5: Register TCP-based SQL Server aliases in both x86 and x64 registry hives
  # so test connections using the alias name resolve to the correct host and port.
  - powershell: |
      $SQLServerName = ("{0}" -f [System.Net.Dns]::GetHostByName($env:computerName).HostName)
      Write-Host  FQDN is: $SQLServerName

      if ((Test-Path -Path ${{parameters.x64AliasRegistryPath }}) -ne $true) {
          New-Item ${{parameters.x64AliasRegistryPath }}
      }

      if ((Test-Path -Path ${{parameters.x86AliasRegistryPath }}) -ne $true) {
          New-Item ${{parameters.x86AliasRegistryPath }}
      }

      $TCPAliasName = "DBMSSOCN, $SQLServerName, ${{parameters.SQLAliasPort }}"

      New-ItemProperty -Path ${{parameters.x86AliasRegistryPath }} -Name ${{parameters.SQLAliasName }} -PropertyType string -Value $TCPAliasName
      New-ItemProperty -Path ${{parameters.x64AliasRegistryPath }} -Name ${{parameters.SQLAliasName }} -PropertyType string -Value $TCPAliasName
    displayName: 'Setup SQL Alias [Win]'

  # Step 6: Generate a self-signed TLS certificate, add it to the trusted root store,
  # bind it to all SQL Server instances, and grant the SQL service account read access
  # to the private key.
  - powershell: |
      # Create Certificate
      $computerDnsName = [System.Net.Dns]::Resolve($null).HostName
      $certificate = New-SelfSignedCertificate -DnsName $computerDnsName,localhost -CertStoreLocation cert:\LocalMachine\My -FriendlyName test99 -KeySpec KeyExchange

      # Get path to Private key (used later)
      $keyPath = $certificate.PrivateKey.CspKeyContainerInfo.UniqueKeyContainerName
      $machineKeyPath = "$env:ProgramData\Microsoft\Crypto\RSA\MachineKeys\$keyPath"

      # Add certificate to trusted roots
      $store = new-object System.Security.Cryptography.X509Certificates.X509Store(
          [System.Security.Cryptography.X509Certificates.StoreName]::Root,
          "localmachine"
      )

      $store.open("MaxAllowed")
      $store.add($certificate)
      $store.close()

      # Get SQL Server instances and add the Certificate
      $instances = Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Microsoft SQL Server\Instance Names\SQL'
      foreach ($instance in $instances){
          $instance | ForEach-Object {
          $_.PSObject.Properties | Where-Object { $_.Name -notmatch '^PS.*' } | ForEach-Object {
                  Set-ItemProperty "HKLM:\SOFTWARE\Microsoft\Microsoft SQL Server\$($_.Value)\MSSQLServer\SuperSocketNetLib" -Name Certificate -Value $certificate.Thumbprint.ToLower()

                  # Grant read access to Private Key for SQL Service Account
                  if ($($_.Name) -eq "MSSQLSERVER") {
                      icacls $machineKeyPath /grant "NT Service\MSSQLSERVER:R"
                  } else {
                      icacls $machineKeyPath /grant "NT Service\MSSQL`$$($_.Name):R"
                  }
              }
          }
      }
    displayName: 'Add SQL Certificate [Win]'

  # Step 7: Restart SQL Server to apply all preceding configuration changes (protocols,
  # certificate, FileStream WMI). Waits for SQL Server to accept connections before
  # proceeding (up to ~160s).
  - powershell: |
      # You need to restart SQL Server for the change to persist
      # -Force takes care of any dependent services, like SQL Agent.
      # Note: if the instance is named, replace MSSQLSERVER with MSSQL$ followed by
      # the name of the instance (e.g. MSSQL$MYINSTANCE)

      $serviceName = "${{parameters.instanceName }}"
      $InstancePrefix = 'MSSQL$'

      if ( "${{parameters.instanceName }}" -ne "MSSQLSERVER" )
      {
          $serviceName = $InstancePrefix+"${{parameters.instanceName }}"
      }

      Restart-Service -Name "$serviceName" -Force
      Restart-Service -Name MSSQLSERVER* -Force

      # Wait for SQL Server to be ready to accept connections after restart.
      # Worst-case budget: 20 attempts x (5s connection timeout + 3s sleep) = ~160s
      $machineName = $env:COMPUTERNAME
      if ("${{parameters.instanceName }}" -ne "MSSQLSERVER") {
          $machineName += "\${{parameters.instanceName }}"
      }

      Import-Module "sqlps"
      $tries = 0
      while ($true) {
          $tries++
          try {
              Invoke-Sqlcmd -ServerInstance "$machineName" -Query "SELECT @@VERSION" -ConnectionTimeout 5 -ErrorAction Stop
              Write-Host "SQL Server is ready after restart (attempt $tries)."
              break
          } catch {
              if ($tries -ge 20) {
                  Write-Host "##[error]SQL Server did not become ready after $tries attempts."
                  throw
              }
              Write-Host "Waiting for SQL Server to start (attempt $tries/20)..."
              Start-Sleep -Seconds 3
          }
      }

    displayName: 'Restart SQL Server [Win]'

  # Step 8: Configure FileStream access level via T-SQL after the restart so we don't
  # need a separate restart in the "Enable FileStream [Win]" step.
  - ${{ if ne(parameters.SQLRootPath, '') }}:
    - powershell: |
        $machineName = $env:COMPUTERNAME
        if ("${{parameters.instanceName }}" -ne "MSSQLSERVER") {
            $machineName += "\${{parameters.instanceName }}"
        }

        Set-ExecutionPolicy Unrestricted
        Import-Module "sqlps"

        # Immediately after the restart SQL Server can still be stabilizing, which
        # can surface transient errors such as "the session is in the kill state"
        # or other severe command errors.  Retry a few times before failing so a
        # momentary hiccup does not fail the whole step.
        $tries = 0
        while ($true) {
            $tries++
            try {
                Invoke-Sqlcmd -ServerInstance "$machineName" -ConnectionTimeout 5 -Query "EXEC sp_configure filestream_access_level, 2; RECONFIGURE;" -ErrorAction Stop
                Write-Host "FileStream access level configured successfully (attempt $tries)."
                break
            } catch {
                if ($tries -ge 10) {
                    Write-Host "##[error]Failed to configure FileStream access level after $tries attempts."
                    throw
                }
                Write-Host "FileStream configuration failed (attempt $tries/10): $($_.Exception.Message). Retrying..."
                Start-Sleep -Seconds 5
            }
        }
      displayName: 'Configure FileStream Access Level [Win]'

  # Step 9: Start the SQL Server Browser service so that named instances can be
  # discovered by clients.
  - powershell: |
      $arrService = Get-Service -Name "SQLBrowser"
      $arrService

      if ($arrService.Status -eq 'Stopped') {
          Write-Host 'Attempt to run the service ...'
          # updating the startup type to make sure it's not disabled
          Set-Service -StartupType Automatic $arrService.Name
          $arrService.Start()

          $arrService.WaitForStatus('Running', '00:00:30')
          if ($arrService.Status -eq 'Running') {
              $arrService
          } else {
              Write-Error 'Timed out waiting for service to start.'
          }
      }
    displayName: 'Start Sql Server Browser [Win]'

  # Step 10: Start and share the LocalDB instance (conditional on enableLocalDB).
  - ${{ if parameters.enableLocalDB }}:
    - powershell: |
        #script to enable local db

        SqlLocalDB info
        #SqlLocalDB create ${{parameters.localDbAppName }}
        SqlLocalDB info ${{parameters.localDbAppName }}
        SqlLocalDB share ${{parameters.localDbAppName }} ${{parameters.LocalDbSharedInstanceName }}
        SqlLocalDB start ${{parameters.localDbAppName }}
        SqlLocalDB info ${{parameters.localDbAppName }}

        sqlcmd -S "(localdb)\.\${{parameters.LocalDbSharedInstanceName }}" -q "SELECT @@VERSION"
      displayName: 'Enable LocalDB [Win]'
