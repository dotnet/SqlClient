steps:
  # Install whichever .NET SDKs are specified in our global.json.
  - task: UseDotNet@2
    displayName: Install .NET SDKs
    inputs:
      packageType: sdk
      useGlobalJson: true

  # Install the .NET 9.0 runtime to run tests that target it.
  - task: UseDotNet@2
    displayName: Install .NET 9.0 Runtime
    inputs:
      packageType: runtime
      version: 9.x

  # Install the .NET 8.0 runtime to run tests that target it.
  - task: UseDotNet@2
    displayName: Install .NET 8.0 Runtime
    inputs:
      packageType: runtime
      version: 8.x

  - script: SET
    displayName: 'Print Environment Variables'

  - powershell: |
      # use sqlcmd to try to connect to localdb
      $svc_name = "SQLBrowser"
      Get-Service $svc_name | Select-Object -Property Name, StartType, Status
      Set-Service -StartupType Automatic $svc_name
      net start $svc_name
      Get-Service $svc_name | Select-Object -Property Name, StartType, Status
    displayName: 'Start SQLBrowser'

  - task: NuGetToolInstaller@1
    displayName: 'Use NuGet'
