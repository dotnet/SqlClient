parameters:
  - name: debug
    type: boolean
    default: false

  - name: targetFramework
    type: string

  - name: nugetPackageVersion
    type: string
    default: $(NugetPackageVersion)

  - name: platform
    type: string
    default: $(Platform)
  
  - name: configuration
    type: string
    default: '$(Configuration)'

  - name: referenceType
    default: Package
    values:
      - Project
      - Package

  - name: testSet
    type: string

  - name: msbuildArchitecture
    default: x64
    values:
      - x64
      - x86
  
  - name: dotnetx86RootPath # full path to the x86 dotnet root folder with trailing slash
    type: string
    default: ''
  
  - name: operatingSystem
    type: string
    default: 'Windows'

steps:
- ${{ if parameters.debug }}:
  - powershell: 'dotnet sdk check'
    displayName: '.NET sdk check [debug]'
    condition: succeededOrFailed()

- ${{if eq(parameters.operatingSystem, 'Windows')}}:
  - ${{if eq(parameters.referenceType, 'Project')}}:
    - task: MSBuild@1
      displayName: 'Run Unit Tests ${{parameters.msbuildArchitecture }}'
      inputs:
        solution: build.proj
        msbuildArchitecture: ${{parameters.msbuildArchitecture }}
        platform: '${{parameters.platform }}'
        configuration: '${{parameters.configuration }}'
        ${{ if eq(parameters.msbuildArchitecture, 'x64') }}:   
          msbuildArguments: '-t:RunUnitTests -p:TF=${{parameters.targetFramework }} -p:MdsPackageVersion=${{parameters.nugetPackageVersion }}'
        ${{ else }}: # x86
          msbuildArguments: '-t:RunUnitTests -p:TF=${{parameters.targetFramework }} -p:MdsPackageVersion=${{parameters.nugetPackageVersion }} -p:DotnetPath=${{parameters.dotnetx86RootPath }}'
        condition: and(succeeded(), eq(variables['Agent.OS'], 'Windows_NT'))
        retryCountOnTaskFailure: 1

    - task: MSBuild@1
      displayName: 'Run Flaky Unit Tests ${{ parameters.msbuildArchitecture }}'
      inputs:
        solution: build.proj
        msbuildArchitecture: ${{parameters.msbuildArchitecture }}
        platform: '${{parameters.platform }}'
        configuration: '${{parameters.configuration }}'
        ${{ if eq(parameters.msbuildArchitecture, 'x64') }}:
          msbuildArguments: '-t:RunUnitTests -p:TF=${{parameters.targetFramework }} -p:MdsPackageVersion=${{parameters.nugetPackageVersion }} -p:Filter="category=flaky"'
        ${{ else }}: #x86
          msbuildArguments: '-t:RunUnitTests -p:TF=${{parameters.targetFramework }} -p:MdsPackageVersion=${{parameters.nugetPackageVersion }} -p:DotnetPath=${{parameters.dotnetx86RootPath }} -p:Filter="category=flaky"'
        verbosityRestore: Detailed
        verbosityPack: Detailed
      condition: succeededOrFailed()
      continueOnError: true

  - task: MSBuild@1
    displayName: 'Run Functional Tests ${{parameters.msbuildArchitecture }}'
    inputs:
      solution: build.proj
      msbuildArchitecture: ${{parameters.msbuildArchitecture }}
      platform: '${{parameters.platform }}'
      configuration: '${{parameters.configuration }}'
      ${{ if eq(parameters.msbuildArchitecture, 'x64') }}:      
        msbuildArguments: '-t:RunFunctionalTests -p:TF=${{parameters.targetFramework }} -p:TestSet=${{parameters.testSet }} -p:ReferenceType=${{parameters.referenceType }} -p:MdsPackageVersion=${{parameters.nugetPackageVersion }}'
      ${{ else }}: # x86
        msbuildArguments: '-t:RunFunctionalTests -p:TF=${{parameters.targetFramework }} -p:TestSet=${{parameters.testSet }} -p:ReferenceType=${{parameters.referenceType }} -p:MdsPackageVersion=${{parameters.nugetPackageVersion }} -p:DotnetPath=${{parameters.dotnetx86RootPath }}'
    condition: succeededOrFailed()
    retryCountOnTaskFailure: 1

  - task: MSBuild@1
    displayName: 'Run Flaky Functional Tests ${{parameters.msbuildArchitecture }}'
    inputs:
      solution: build.proj
      msbuildArchitecture: ${{parameters.msbuildArchitecture }}
      platform: '${{parameters.platform }}'
      configuration: '${{parameters.configuration }}'
      ${{ if eq(parameters.msbuildArchitecture, 'x64') }}:
        msbuildArguments: '-t:RunFunctionalTests -p:TF=${{parameters.targetFramework }} -p:TestSet=${{parameters.testSet }} -p:ReferenceType=${{parameters.referenceType }} -p:MdsPackageVersion=${{parameters.nugetPackageVersion }} -p:Filter="category=flaky"'
      ${{ else }}: # x86
        msbuildArguments: '-t:RunFunctionalTests -p:TF=${{parameters.targetFramework }} -p:TestSet=${{parameters.testSet }} -p:ReferenceType=${{parameters.referenceType }} -p:MdsPackageVersion=${{parameters.nugetPackageVersion }} -p:DotnetPath=${{parameters.dotnetx86RootPath }} -p:Filter="category=flaky"'
    condition: succeededOrFailed()
    continueOnError: true

  - task: MSBuild@1
    displayName: 'Run Manual Tests ${{parameters.msbuildArchitecture }}'
    inputs:
      solution: build.proj
      msbuildArchitecture: ${{parameters.msbuildArchitecture }}
      platform: '${{parameters.platform }}'
      configuration: '${{parameters.configuration }}'
      ${{ if eq(parameters.msbuildArchitecture, 'x64') }}:
        msbuildArguments: '-t:RunManualTests -p:TF=${{parameters.targetFramework }} -p:TestSet=${{parameters.testSet }} -p:ReferenceType=${{parameters.referenceType }} -p:MdsPackageVersion=${{parameters.nugetPackageVersion }}'
      ${{ else }}: # x86
        msbuildArguments: '-t:RunManualTests -p:TF=${{parameters.targetFramework }} -p:TestSet=${{parameters.testSet }} -p:ReferenceType=${{parameters.referenceType }} -p:MdsPackageVersion=${{parameters.nugetPackageVersion }} -p:DotnetPath=${{parameters.dotnetx86RootPath }}'
    condition: succeededOrFailed()
    retryCountOnTaskFailure: 2

  - task: MSBuild@1
    displayName: 'Run Flaky Manual Tests ${{parameters.msbuildArchitecture }}'
    inputs:
      solution: build.proj
      msbuildArchitecture: ${{parameters.msbuildArchitecture }}
      platform: '${{parameters.platform }}'
      configuration: '${{parameters.configuration }}'
      ${{ if eq(parameters.msbuildArchitecture, 'x64') }}:
        msbuildArguments: '-t:RunManualTests -p:TF=${{parameters.targetFramework }} -p:TestSet=${{parameters.testSet }} -p:ReferenceType=${{parameters.referenceType }} -p:MdsPackageVersion=${{parameters.nugetPackageVersion }} -p:Filter="category=flaky"'
      ${{ else }}: # x86
        msbuildArguments: '-t:RunManualTests -p:TF=${{parameters.targetFramework }} -p:TestSet=${{parameters.testSet }} -p:ReferenceType=${{parameters.referenceType }} -p:MdsPackageVersion=${{parameters.nugetPackageVersion }} -p:DotnetPath=${{parameters.dotnetx86RootPath }} -p:Filter="category=flaky"'
    condition: succeededOrFailed()
    continueOnError: true

- ${{ else }}: # Linux or macOS
  - ${{if eq(parameters.referenceType, 'Project')}}:
    - task: DotNetCoreCLI@2
      displayName: 'Run Unit Tests'
      inputs:
        command: custom
        projects: build.proj
        custom: msbuild
        arguments: '-t:RunUnitTests -p:TF=${{parameters.targetFramework }} -p:TestSet=${{parameters.testSet }} -p:ReferenceType=${{parameters.referenceType }} -p:MdsPackageVersion=${{parameters.nugetPackageVersion }} -p:platform=${{parameters.platform }} -p:Configuration=${{parameters.configuration }}'
        verbosityRestore: Detailed
        verbosityPack: Detailed
      retryCountOnTaskFailure: 1
      condition: and(succeeded(), ne(variables['Agent.OS'], 'Windows_NT'))

    - task: DotNetCoreCLI@2
      displayName: 'Run Flaky Unit Tests'
      inputs:
        command: custom
        projects: build.proj
        custom: msbuild
        arguments: '-t:RunUnitTests -p:TF=${{ parameters.targetFramework }} -p:TestSet=${{ parameters.testSet }} -p:MdsPackageVersion=${{ parameters.nugetPackageVersion }} -p:platform=${{ parameters.platform }} -p:Configuration=${{ parameters.configuration }} -p:Filter="category=flaky"'
        verbosityRestore: Detailed
        verbosityPack: Detailed
      condition: succeededOrFailed()
      continueOnError: true

  - task: DotNetCoreCLI@2
    displayName: 'Run Functional Tests'
    inputs:
      command: custom
      projects: build.proj
      custom: msbuild
      arguments: '-t:RunFunctionalTests -p:TF=${{parameters.targetFramework }} -p:TestSet=${{parameters.testSet }} -p:ReferenceType=${{parameters.referenceType }} -p:MdsPackageVersion=${{parameters.nugetPackageVersion }} -p:platform=${{parameters.platform }} -p:Configuration=${{parameters.configuration }}'
      verbosityRestore: Detailed
      verbosityPack: Detailed
    retryCountOnTaskFailure: 1
    condition: succeededOrFailed()

  - task: DotNetCoreCLI@2
    displayName: 'Run Flaky Functional Tests'
    inputs:
      command: custom
      projects: build.proj
      custom: msbuild
      arguments: '-t:RunFunctionalTests -p:TF=${{parameters.targetFramework }} -p:TestSet=${{parameters.testSet }} -p:ReferenceType=${{parameters.referenceType }} -p:MdsPackageVersion=${{parameters.nugetPackageVersion }} -p:platform=${{parameters.platform }} -p:Configuration=${{parameters.configuration }} -p:Filter="category=flaky"'
      verbosityRestore: Detailed
      verbosityPack: Detailed
    condition: succeededOrFailed()
    continueOnError: true

  - task: DotNetCoreCLI@2
    displayName: 'Run Manual Tests'
    inputs:
      command: custom
      projects: build.proj
      custom: msbuild
      arguments: '-t:RunManualTests -p:TF=${{parameters.targetFramework }} -p:TestSet=${{parameters.testSet }} -p:ReferenceType=${{parameters.referenceType }} -p:MdsPackageVersion=${{parameters.nugetPackageVersion }} -p:platform=${{parameters.platform }} -p:Configuration=${{parameters.configuration }}'
      verbosityRestore: Detailed
      verbosityPack: Detailed
    retryCountOnTaskFailure: 2
    condition: succeededOrFailed()

  - task: DotNetCoreCLI@2
    displayName: 'Run Flaky Manual Tests'
    inputs:
      command: custom
      projects: build.proj
      custom: msbuild
      arguments: '-t:RunManualTests -p:TF=${{parameters.targetFramework }} -p:TestSet=${{parameters.testSet }} -p:ReferenceType=${{parameters.referenceType }} -p:MdsPackageVersion=${{parameters.nugetPackageVersion }} -p:platform=${{parameters.platform }} -p:Configuration=${{parameters.configuration }} -p:Filter="category=flaky"'
      verbosityRestore: Detailed
      verbosityPack: Detailed
    condition: succeededOrFailed()
    continueOnError: true
