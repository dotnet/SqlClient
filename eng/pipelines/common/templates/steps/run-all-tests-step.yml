parameters:

  - name: abstractionsPackageVersion
    type: string

  - name: loggingPackageVersion
    type: string

  # True to emit debug information and steps.
  - name: debug
    type: boolean
    default: false

  - name: targetFramework
    type: string

  - name: mdsPackageVersion
    type: string

  - name: platform
    type: string
    default: $(Platform)

  # The C# build configuration to build (e.g. Debug or Release).
  - name: buildConfiguration
    type: string
    values:
      - Debug
      - Release

  # The C# project reference type to use when building and packing the packages.
  - name: referenceType
    type: string
    default: Package
    values:
      # Reference sibling packages as NuGet packages.
      - Package
      # Reference sibling packages as C# projects.
      - Project

  - name: testSet
    type: string

  - name: msbuildArchitecture
    default: x64
    values:
      - x64
      - x86

  # Full path to the x86 dotnet root folder with trailing slash.
  - name: dotnetx86RootPath
    type: string
    default: ''

  - name: operatingSystem
    type: string
    values:
      - Linux
      - Mac
      - Windows
    default: Windows

  - name: retryCountOnManualTests
    type: number
    default: 2

steps:
- ${{ if parameters.debug }}:
  - powershell: 'dotnet sdk check'
    displayName: '[Debug] .NET sdk check'
    condition: succeededOrFailed()

- ${{if eq(parameters.operatingSystem, 'Windows')}}:
  - ${{if eq(parameters.referenceType, 'Project')}}:
    - task: MSBuild@1
      displayName: 'Run Unit Tests ${{parameters.msbuildArchitecture }}'
      condition: succeededOrFailed()
      inputs:
        solution: build2.proj
        msbuildArchitecture: ${{parameters.msbuildArchitecture }}
        platform: '${{parameters.platform }}'
        configuration: '${{parameters.buildConfiguration }}'
        ${{ if eq(parameters.msbuildArchitecture, 'x64') }}:
          msbuildArguments: >-
            -t:TestMdsUnit
            -p:TargetFramework=${{ parameters.targetFramework }}
            -p:ReferenceType=${{ parameters.referenceType }}
        ${{ else }}: # x86
          msbuildArguments: >-
            -t:TestMdsUnit
            -p:TargetFramework=${{ parameters.targetFramework }}
            -p:ReferenceType=${{ parameters.referenceType }}
            -p:DotnetPath=${{ parameters.dotnetx86RootPath }}

    - task: MSBuild@1
      displayName: 'Run Flaky Unit Tests ${{parameters.msbuildArchitecture }}'
      condition: succeededOrFailed()
      inputs:
        solution: build2.proj
        msbuildArchitecture: ${{parameters.msbuildArchitecture }}
        platform: '${{parameters.platform }}'
        configuration: '${{parameters.buildConfiguration }}'
        ${{ if eq(parameters.msbuildArchitecture, 'x64') }}:
          msbuildArguments: >-
            -t:TestMdsUnit
            -p:TargetFramework=${{ parameters.targetFramework }}
            -p:ReferenceType=${{ parameters.referenceType }}
            -p:TestFilters="category=flaky"
            -p:CollectCodeCoverage=false
        ${{ else }}: # x86
          msbuildArguments: >-
            -t:TestMdsUnit
            -p:TargetFramework=${{ parameters.targetFramework }}
            -p:ReferenceType=${{ parameters.referenceType }}
            -p:DotnetPath=${{ parameters.dotnetx86RootPath }}
            -p:TestFilters="category=flaky"
            -p:TestCodeCoverage=false
      continueOnError: true

  - task: MSBuild@1
    displayName: 'Run Functional Tests ${{parameters.msbuildArchitecture }}'
    condition: succeededOrFailed()
    inputs:
      solution: build2.proj
      msbuildArchitecture: ${{parameters.msbuildArchitecture }}
      platform: '${{parameters.platform }}'
      configuration: '${{parameters.buildConfiguration }}'
      ${{ if eq(parameters.msbuildArchitecture, 'x64') }}:
        msbuildArguments: >-
          -t:TestMdsFunctional
          -p:TargetFramework=${{ parameters.targetFramework }}
          -p:ReferenceType=${{ parameters.referenceType }}
          -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
          -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
          -p:PackageVersionMds=${{ parameters.mdsPackageVersion }}
      ${{ else }}: # x86
        msbuildArguments: >-
          -t:TestMdsFunctional
          -p:TargetFramework=${{ parameters.targetFramework }}
          -p:ReferenceType=${{ parameters.referenceType }}
          -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
          -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
          -p:PackageVersionMds=${{ parameters.mdsPackageVersion }}
          -p:DotnetPath=${{ parameters.dotnetx86RootPath }}

  - task: MSBuild@1
    condition: succeededOrFailed()
    displayName: 'Run Flaky Functional Tests ${{parameters.msbuildArchitecture }}'
    inputs:
      solution: build2.proj
      msbuildArchitecture: ${{parameters.msbuildArchitecture }}
      platform: '${{parameters.platform }}'
      configuration: '${{parameters.buildConfiguration }}'
      ${{ if eq(parameters.msbuildArchitecture, 'x64') }}:
        msbuildArguments: >-
          -t:TestMdsFunctional
          -p:TargetFramework=${{ parameters.targetFramework }}
          -p:ReferenceType=${{ parameters.referenceType }}
          -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
          -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
          -p:PackageVersionMds=${{ parameters.mdsPackageVersion }}
          -p:TestFilters="category=flaky"
          -p:TestCodeCoverage=false
      ${{ else }}: # x86
        msbuildArguments: >-
          -t:TestMdsFunctional
          -p:TargetFramework=${{ parameters.targetFramework }}
          -p:ReferenceType=${{ parameters.referenceType }}
          -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
          -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
          -p:PackageVersionMds=${{ parameters.mdsPackageVersion }}
          -p:DotnetPath=${{ parameters.dotnetx86RootPath }}
          -p:TestFilters="category=flaky"
          -p:TestCodeCoverage=false
    continueOnError: true

  - task: MSBuild@1
    condition: succeededOrFailed()
    displayName: 'Run Manual Tests ${{parameters.msbuildArchitecture }}'
    inputs:
      solution: build2.proj
      msbuildArchitecture: ${{parameters.msbuildArchitecture }}
      platform: '${{parameters.platform }}'
      configuration: '${{parameters.buildConfiguration }}'
      ${{ if eq(parameters.msbuildArchitecture, 'x64') }}:
        msbuildArguments: >-
          -t:TestMdsManual
          -p:TargetFramework=${{ parameters.targetFramework }}
          -p:TestSet=${{ parameters.testSet }}
          -p:ReferenceType=${{ parameters.referenceType }}
          -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
          -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
          -p:PackageVersionMds=${{ parameters.mdsPackageVersion }}
      ${{ else }}: # x86
        msbuildArguments: >-
          -t:TestMdsManual
          -p:TargetFramework=${{ parameters.targetFramework }}
          -p:TestSet=${{ parameters.testSet }}
          -p:ReferenceType=${{ parameters.referenceType }}
          -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
          -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
          -p:PackageVersionMds=${{ parameters.mdsPackageVersion }}
          -p:DotnetPath=${{ parameters.dotnetx86RootPath }}
    retryCountOnTaskFailure: ${{parameters.retryCountOnManualTests }}

  - task: MSBuild@1
    condition: succeededOrFailed()
    displayName: 'Run Flaky Manual Tests ${{parameters.msbuildArchitecture }}'
    inputs:
      solution: build2.proj
      msbuildArchitecture: ${{parameters.msbuildArchitecture }}
      platform: '${{parameters.platform }}'
      configuration: '${{parameters.buildConfiguration }}'
      ${{ if eq(parameters.msbuildArchitecture, 'x64') }}:
        msbuildArguments: >-
          -t:TestMdsManual
          -p:TargetFramework=${{ parameters.targetFramework }}
          -p:TestSet=${{ parameters.testSet }}
          -p:ReferenceType=${{ parameters.referenceType }}
          -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
          -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
          -p:PackageVersionMds=${{ parameters.mdsPackageVersion }}
          -p:TestFilters="category=flaky"
          -p:TestCodeCoverage=false
      ${{ else }}: # x86
        msbuildArguments: >-
          -t:TestMdsManual
          -p:TargetFramework=${{ parameters.targetFramework }}
          -p:TestSet=${{ parameters.testSet }}
          -p:ReferenceType=${{ parameters.referenceType }}
          -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
          -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
          -p:PackageVersionMds=${{ parameters.mdsPackageVersion }}
          -p:DotnetPath=${{ parameters.dotnetx86RootPath }}
          -p:TestFilters="category=flaky"
          -p:TestCodeCoverage=false
    continueOnError: true

- ${{ else }}: # Linux or macOS
  - ${{if eq(parameters.referenceType, 'Project')}}:
    - task: DotNetCoreCLI@2
      displayName: 'Run Unit Tests'
      condition: succeededOrFailed()
      inputs:
        command: custom
        projects: build2.proj
        custom: msbuild
        arguments: >-
          -t:TestMdsUnit
          -p:TargetFramework=${{ parameters.targetFramework }}
          -p:ReferenceType=${{ parameters.referenceType }}
          -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
          -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
          -p:PackageVersionMds=${{ parameters.mdsPackageVersion }}
          -p:Configuration=${{ parameters.buildConfiguration }}
        verbosityRestore: Detailed
        verbosityPack: Detailed

    - task: DotNetCoreCLI@2
      displayName: 'Run Flaky Unit Tests'
      condition: succeededOrFailed()
      inputs:
        command: custom
        projects: build2.proj
        custom: msbuild
        arguments: >-
          -t:TestMdsUnit
          -p:TargetFramework=${{ parameters.targetFramework }}
          -p:ReferenceType=${{ parameters.referenceType }}
          -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
          -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
          -p:PackageVersionMds=${{ parameters.mdsPackageVersion }}
          -p:Configuration=${{ parameters.buildConfiguration }}
          -p:TestFilters="category=flaky"
          -p:TestCodeCoverage=false
        verbosityRestore: Detailed
        verbosityPack: Detailed
      continueOnError: true

  - task: DotNetCoreCLI@2
    displayName: 'Run Functional Tests'
    condition: succeededOrFailed()
    inputs:
      command: custom
      projects: build2.proj
      custom: msbuild
      arguments: >-
        -t:TestMdsFunctional
        -p:TargetFramework=${{ parameters.targetFramework }}
        -p:ReferenceType=${{ parameters.referenceType }}
        -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
        -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
        -p:PackageVersionMds=${{ parameters.mdsPackageVersion }}
        -p:Configuration=${{ parameters.buildConfiguration }}
      verbosityRestore: Detailed
      verbosityPack: Detailed

  - task: DotNetCoreCLI@2
    condition: succeededOrFailed()
    displayName: 'Run Flaky Functional Tests'
    inputs:
      command: custom
      projects: build2.proj
      custom: msbuild
      arguments: >-
        -t:TestMdsFunctional
        -p:TargetFramework=${{ parameters.targetFramework }}
        -p:ReferenceType=${{ parameters.referenceType }}
        -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
        -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
        -p:PackageVersionMds=${{ parameters.mdsPackageVersion }}
        -p:Configuration=${{ parameters.buildConfiguration }}
        -p:TestFilters="category=flaky"
        -p:TestCodeCoverage=false
      verbosityRestore: Detailed
      verbosityPack: Detailed
    continueOnError: true

  - task: DotNetCoreCLI@2
    displayName: 'Run Manual Tests'
    condition: succeededOrFailed()
    inputs:
      command: custom
      projects: build2.proj
      custom: msbuild
      arguments: >-
        -t:TestMdsManual
        -p:TargetFramework=${{ parameters.targetFramework }}
        -p:TestSet=${{ parameters.testSet }}
        -p:ReferenceType=${{ parameters.referenceType }}
        -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
        -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
        -p:PackageVersionMds=${{ parameters.mdsPackageVersion }}
        -p:Configuration=${{ parameters.buildConfiguration }}
      verbosityRestore: Detailed
      verbosityPack: Detailed
    retryCountOnTaskFailure: ${{parameters.retryCountOnManualTests }}

  - task: DotNetCoreCLI@2
    displayName: 'Run Flaky Manual Tests'
    condition: succeededOrFailed()
    inputs:
      command: custom
      projects: build2.proj
      custom: msbuild
      arguments: >-
        -t:TestMdsManual
        -p:TargetFramework=${{ parameters.targetFramework }}
        -p:TestSet=${{ parameters.testSet }}
        -p:ReferenceType=${{ parameters.referenceType }}
        -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
        -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
        -p:PackageVersionMds=${{ parameters.mdsPackageVersion }}
        -p:Configuration=${{ parameters.buildConfiguration }}
        -p:TestFilters="category=flaky"
        -p:TestCodeCoverage=false
      verbosityRestore: Detailed
      verbosityPack: Detailed
    continueOnError: true
