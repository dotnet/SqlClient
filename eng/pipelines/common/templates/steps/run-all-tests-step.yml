parameters:

  - name: abstractionsPackageVersion
    type: string

  - name: loggingPackageVersion
    type: string

  # True to emit debug information and steps.
  - name: debug
    type: boolean
    default: false

  - name: targetFramework
    type: string

  - name: mdsPackageVersion
    type: string

  - name: platform
    type: string
    default: $(Platform)

  # The C# build configuration to build (e.g. Debug or Release).
  - name: buildConfiguration
    type: string
    values:
      - Debug
      - Release

  # The C# project reference type to use when building and packing the packages.
  - name: referenceType
    type: string
    default: Package
    values:
      # Reference sibling packages as NuGet packages.
      - Package
      # Reference sibling packages as C# projects.
      - Project

  - name: testSet
    type: string

  - name: msbuildArchitecture
    default: x64
    values:
      - x64
      - x86

  # Full path to the x86 dotnet root folder with trailing slash.
  - name: dotnetx86RootPath
    type: string
    default: ''

  - name: operatingSystem
    type: string
    values:
      - Linux
      - Mac
      - Windows
    default: Windows

  - name: retryCountOnManualTests
    type: number
    default: 2

steps:
- ${{ if parameters.debug }}:
  - powershell: 'dotnet sdk check'
    displayName: '[Debug] .NET sdk check'
    condition: succeededOrFailed()

- ${{if eq(parameters.operatingSystem, 'Windows')}}:
  - ${{if eq(parameters.referenceType, 'Project')}}:
    - task: DotNetCoreCLI@2
      displayName: 'Run Unit Tests ${{parameters.msbuildArchitecture }}'
      condition: and(eq(variables['setupSucceeded'], 'true'), succeededOrFailed())
      inputs:
        command: build
        projects: build.proj
        ${{ if eq(parameters.msbuildArchitecture, 'x64') }}:
          arguments: >-
            -t:TestSqlClientUnit
            -p:TestFramework=${{ parameters.targetFramework }}
            -p:Configuration=${{ parameters.buildConfiguration }}
            -p:TestResultsFolderPath=TestResults
        ${{ else }}: # x86
          arguments: >-
            -t:TestSqlClientUnit
            -p:TestFramework=${{ parameters.targetFramework }}
            -p:Configuration=${{ parameters.buildConfiguration }}
            -p:DotnetPath=${{ parameters.dotnetx86RootPath }}
            -p:TestResultsFolderPath=TestResults

    - task: DotNetCoreCLI@2
      displayName: 'Run Flaky Unit Tests ${{parameters.msbuildArchitecture }}'
      condition: and(eq(variables['setupSucceeded'], 'true'), succeededOrFailed())
      inputs:
        command: build
        projects: build.proj
        ${{ if eq(parameters.msbuildArchitecture, 'x64') }}:
          arguments: >-
            -t:TestSqlClientUnit
            -p:TestFramework=${{ parameters.targetFramework }}
            -p:Configuration=${{ parameters.buildConfiguration }}
            -p:TestFilters="category=flaky"
            -p:TestResultsFolderPath=TestResults
            -p:TestCodeCoverage=false
        ${{ else }}: # x86
          arguments: >-
            -t:TestSqlClientUnit
            -p:TestFramework=${{ parameters.targetFramework }}
            -p:Configuration=${{ parameters.buildConfiguration }}
            -p:DotnetPath=${{ parameters.dotnetx86RootPath }}
            -p:TestFilters="category=flaky"
            -p:TestResultsFolderPath=TestResults
            -p:TestCodeCoverage=false
      continueOnError: true

  - task: DotNetCoreCLI@2
    displayName: 'Run Functional Tests ${{parameters.msbuildArchitecture }}'
    condition: and(eq(variables['setupSucceeded'], 'true'), succeededOrFailed())
    inputs:
      command: build
      projects: build.proj
      ${{ if eq(parameters.msbuildArchitecture, 'x64') }}:
        arguments: >-
          -t:TestSqlClientFunctional
          -p:TestFramework=${{ parameters.targetFramework }}
          -p:ReferenceType=${{ parameters.referenceType }}
          -p:Configuration=${{ parameters.buildConfiguration }}
          -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
          -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
          -p:PackageVersionSqlClient=${{ parameters.mdsPackageVersion }}
          -p:TestResultsFolderPath=TestResults
      ${{ else }}: # x86
        arguments: >-
          -t:TestSqlClientFunctional
          -p:TestFramework=${{ parameters.targetFramework }}
          -p:ReferenceType=${{ parameters.referenceType }}
          -p:Configuration=${{ parameters.buildConfiguration }}
          -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
          -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
          -p:PackageVersionSqlClient=${{ parameters.mdsPackageVersion }}
          -p:DotnetPath=${{ parameters.dotnetx86RootPath }}
          -p:TestResultsFolderPath=TestResults

  - task: DotNetCoreCLI@2
    displayName: 'Run Flaky Functional Tests ${{parameters.msbuildArchitecture }}'
    condition: and(eq(variables['setupSucceeded'], 'true'), succeededOrFailed())
    inputs:
      command: build
      projects: build.proj
      ${{ if eq(parameters.msbuildArchitecture, 'x64') }}:
        arguments: >-
          -t:TestSqlClientFunctional
          -p:TestFramework=${{ parameters.targetFramework }}
          -p:ReferenceType=${{ parameters.referenceType }}
          -p:Configuration=${{ parameters.buildConfiguration }}
          -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
          -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
          -p:PackageVersionSqlClient=${{ parameters.mdsPackageVersion }}
          -p:TestFilters="category=flaky"
          -p:TestResultsFolderPath=TestResults
          -p:TestCodeCoverage=false
      ${{ else }}: # x86
        arguments: >-
          -t:TestSqlClientFunctional
          -p:TestFramework=${{ parameters.targetFramework }}
          -p:ReferenceType=${{ parameters.referenceType }}
          -p:Configuration=${{ parameters.buildConfiguration }}
          -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
          -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
          -p:PackageVersionSqlClient=${{ parameters.mdsPackageVersion }}
          -p:DotnetPath=${{ parameters.dotnetx86RootPath }}
          -p:TestFilters="category=flaky"
          -p:TestResultsFolderPath=TestResults
          -p:TestCodeCoverage=false
    continueOnError: true

  - task: DotNetCoreCLI@2
    displayName: 'Run Manual Tests ${{parameters.msbuildArchitecture }}'
    condition: and(eq(variables['setupSucceeded'], 'true'), succeededOrFailed())
    inputs:
      command: build
      projects: build.proj
      ${{ if eq(parameters.msbuildArchitecture, 'x64') }}:
        arguments: >-
          -t:TestSqlClientManual
          -p:TestFramework=${{ parameters.targetFramework }}
          -p:TestSet=${{ parameters.testSet }}
          -p:ReferenceType=${{ parameters.referenceType }}
          -p:Configuration=${{ parameters.buildConfiguration }}
          -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
          -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
          -p:PackageVersionSqlClient=${{ parameters.mdsPackageVersion }}
          -p:TestResultsFolderPath=TestResults
      ${{ else }}: # x86
        arguments: >-
          -t:TestSqlClientManual
          -p:TestFramework=${{ parameters.targetFramework }}
          -p:TestSet=${{ parameters.testSet }}
          -p:ReferenceType=${{ parameters.referenceType }}
          -p:Configuration=${{ parameters.buildConfiguration }}
          -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
          -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
          -p:PackageVersionSqlClient=${{ parameters.mdsPackageVersion }}
          -p:DotnetPath=${{ parameters.dotnetx86RootPath }}
          -p:TestResultsFolderPath=TestResults
    retryCountOnTaskFailure: ${{parameters.retryCountOnManualTests }}

  - task: DotNetCoreCLI@2
    displayName: 'Run Flaky Manual Tests ${{parameters.msbuildArchitecture }}'
    condition: and(eq(variables['setupSucceeded'], 'true'), succeededOrFailed())
    inputs:
      command: build
      projects: build.proj
      ${{ if eq(parameters.msbuildArchitecture, 'x64') }}:
        arguments: >-
          -t:TestSqlClientManual
          -p:TestFramework=${{ parameters.targetFramework }}
          -p:TestSet=${{ parameters.testSet }}
          -p:ReferenceType=${{ parameters.referenceType }}
          -p:Configuration=${{ parameters.buildConfiguration }}
          -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
          -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
          -p:PackageVersionSqlClient=${{ parameters.mdsPackageVersion }}
          -p:TestFilters="category=flaky"
          -p:TestResultsFolderPath=TestResults
          -p:TestCodeCoverage=false
      ${{ else }}: # x86
        arguments: >-
          -t:TestSqlClientManual
          -p:TestFramework=${{ parameters.targetFramework }}
          -p:TestSet=${{ parameters.testSet }}
          -p:ReferenceType=${{ parameters.referenceType }}
          -p:Configuration=${{ parameters.buildConfiguration }}
          -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
          -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
          -p:PackageVersionSqlClient=${{ parameters.mdsPackageVersion }}
          -p:DotnetPath=${{ parameters.dotnetx86RootPath }}
          -p:TestFilters="category=flaky"
          -p:TestResultsFolderPath=TestResults
          -p:TestCodeCoverage=false
    continueOnError: true

- ${{ else }}: # Linux or macOS
  - ${{if eq(parameters.referenceType, 'Project')}}:
    - task: DotNetCoreCLI@2
      displayName: 'Run Unit Tests'
      condition: and(eq(variables['setupSucceeded'], 'true'), succeededOrFailed())
      inputs:
        command: build
        projects: build.proj
        arguments: >-
          -t:TestSqlClientUnit
          -p:TestFramework=${{ parameters.targetFramework }}
          -p:Configuration=${{ parameters.buildConfiguration }}
          -p:TestResultsFolderPath=TestResults

    - task: DotNetCoreCLI@2
      displayName: 'Run Flaky Unit Tests'
      condition: and(eq(variables['setupSucceeded'], 'true'), succeededOrFailed())
      inputs:
        command: build
        projects: build.proj
        arguments: >-
          -t:TestSqlClientUnit
          -p:TestFramework=${{ parameters.targetFramework }}
          -p:Configuration=${{ parameters.buildConfiguration }}
          -p:TestFilters="category=flaky"
          -p:TestResultsFolderPath=TestResults
          -p:TestCodeCoverage=false
      continueOnError: true

  - task: DotNetCoreCLI@2
    displayName: 'Run Functional Tests'
    condition: and(eq(variables['setupSucceeded'], 'true'), succeededOrFailed())
    inputs:
      command: build
      projects: build.proj
      arguments: >-
        -t:TestSqlClientFunctional
        -p:TestFramework=${{ parameters.targetFramework }}
        -p:ReferenceType=${{ parameters.referenceType }}
        -p:Configuration=${{ parameters.buildConfiguration }}
        -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
        -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
        -p:PackageVersionSqlClient=${{ parameters.mdsPackageVersion }}
        -p:TestResultsFolderPath=TestResults

  - task: DotNetCoreCLI@2
    displayName: 'Run Flaky Functional Tests'
    condition: and(eq(variables['setupSucceeded'], 'true'), succeededOrFailed())
    inputs:
      command: build
      projects: build.proj
      arguments: >-
        -t:TestSqlClientFunctional
        -p:TestFramework=${{ parameters.targetFramework }}
        -p:ReferenceType=${{ parameters.referenceType }}
        -p:Configuration=${{ parameters.buildConfiguration }}
        -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
        -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
        -p:PackageVersionSqlClient=${{ parameters.mdsPackageVersion }}
        -p:TestFilters="category=flaky"
        -p:TestResultsFolderPath=TestResults
        -p:TestCodeCoverage=false
    continueOnError: true
  - task: DotNetCoreCLI@2
    displayName: 'Run Manual Tests'
    condition: and(eq(variables['setupSucceeded'], 'true'), succeededOrFailed())
    inputs:
      command: build
      projects: build.proj
      arguments: >-
        -t:TestSqlClientManual
        -p:TestFramework=${{ parameters.targetFramework }}
        -p:TestSet=${{ parameters.testSet }}
        -p:ReferenceType=${{ parameters.referenceType }}
        -p:Configuration=${{ parameters.buildConfiguration }}
        -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
        -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
        -p:PackageVersionSqlClient=${{ parameters.mdsPackageVersion }}
        -p:TestResultsFolderPath=TestResults
    retryCountOnTaskFailure: ${{parameters.retryCountOnManualTests }}

  - task: DotNetCoreCLI@2
    displayName: 'Run Flaky Manual Tests'
    condition: and(eq(variables['setupSucceeded'], 'true'), succeededOrFailed())
    inputs:
      command: build
      projects: build.proj
      arguments: >-
        -t:TestSqlClientManual
        -p:TestFramework=${{ parameters.targetFramework }}
        -p:TestSet=${{ parameters.testSet }}
        -p:ReferenceType=${{ parameters.referenceType }}
        -p:Configuration=${{ parameters.buildConfiguration }}
        -p:PackageVersionAbstractions=${{ parameters.abstractionsPackageVersion }}
        -p:PackageVersionLogging=${{ parameters.loggingPackageVersion }}
        -p:PackageVersionSqlClient=${{ parameters.mdsPackageVersion }}
        -p:TestFilters="category=flaky"
        -p:TestResultsFolderPath=TestResults
        -p:TestCodeCoverage=false
    continueOnError: true
