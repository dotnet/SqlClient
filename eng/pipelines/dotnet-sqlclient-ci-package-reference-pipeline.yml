# This pipeline builds and tests the following packages using package
# references:
#
#   - Microsoft.SqlServer.Server
#   - Microsoft.Data.SqlClient
#   - Microsoft.Data.SqlClient.AlwaysEncrypted.AzureKeyVaultProvider
#
# It runs via CI push triggers and schedules and uses the Release build
# configuration:
#
#   - Commits to GitHub release/7.0
#   - Commits to ADO internal/release/7.0
#   - Sundays at 05:30 UTC on GitHub release/7.0
#   - Sundays at 06:30 UTC on ADO internal/release/7.0
#
# Changes are batched together to ensure that the pipline never runs
# concurrently.
#
# This pipeline definition is mapped to the following Azure DevOps pipelines:
#
# - CI-SqlClient-Package in the Public project:
#
#   https://sqlclientdrivers.visualstudio.com/public/_build?definitionId=1917
#
# - MDS Main CI-Package in the ADO.net project:
#
#   https://sqlclientdrivers.visualstudio.com/ADO.Net/_build?definitionId=1933

# Set the pipeline run name to the day-of-year and the daily run counter.
name: $(DayOfYear)$(Rev:rr)

# Do not trigger this pipeline for PRs.
pr: none

# Trigger this pipeline on commits to certain branches.
trigger:

  # Don't trigger a new run until the previous one completes.  This may cause
  # multiple commits to be batched into a single run.
  batch: true

  branches:
    include:
    # GitHub release/7.0 branch.
    - release/7.0

    # ADO internal/release/7.0 branch.
    - internal/release/7.0

# Trigger this pipline on a schedule.
schedules:

  # GitHub release/7.0 on Sundays (1 hour after release/6.1's 04:30 UTC run).
  - cron: '30 5 * * Sun'
    displayName: Sunday Run GitHub (Release Config)
    branches:
      include:
      - release/7.0
    always: true

  # ADO internal/release/7.0 on Sundays (1 hour after release/6.1's 05:30 UTC run).
  - cron: '30 6 * * Sun'
    displayName: Sunday Run ADO Internal (Release Config)
    branches:
      include:
      - internal/release/7.0
    always: true

# Pipeline parameters, visible in the Azure DevOps UI.
parameters:

  # The C# build configuration to use; defaults to Release.
  - name: buildConfiguration
    displayName: Build Configuration
    type: string
    default: Release
    values:
      - Debug
      - Release

  - name: buildPlatforms
    displayName: Build Platforms on Windows
    type: object
    default: [AnyCPU]

  # True to emit debug information and steps.
  - name: debug
    displayName: Enable debug output
    type: boolean
    default: false

  # True to run the stress tests stage.
  - name: enableStressTests
    displayName: Enable Stress Tests
    type: boolean
    default: false

  # The target frameworks to build and run tests for on Windows.
  #
  # These are _not_ the target frameworks to build the driver packages for.
  #
  # Note: We are excluding .NET 10.0 here to avoid consuming too many resources
  # during PR pipeline runs, and until we update our 1ES images to include
  # Visual Studio 2026 (18.0) whose MSBuild SDK supports .NET 10.
  #
  - name: targetFrameworks
    displayName: Target Frameworks on Windows
    type: object
    default: [net462, net8.0, net9.0]

  # The target frameworks to build and run tests for on Unix.
  #
  # These are _not_ the target frameworks to build the driver packages for.
  #
  # Note: We are excluding .NET 10.0 here to avoid consuming too many resources
  # during PR pipeline runs, and until we update our 1ES images to include
  # Visual Studio 2026 (18.0) whose MSBuild SDK supports .NET 10.
  #
  - name: targetFrameworksUnix
    displayName: Target Frameworks on Unix
    type: object
    default: [net8.0, net9.0]

  # The timeout, in minutes, for each test job.
  - name: testJobTimeout
    displayName: Test job timeout (in minutes)
    type: number
    default: 90

  - name: testSets
    displayName: Test Sets
    type: object
    default: [1, 2, 3]

  - name: useManagedSNI
    displayName: |
      Use Managed/Native SNI on Windows,
      values [false, true], [false] or [true] are allowed
    type: object
    default: [false, true]

  # Dotnet CLI verbosity level.
  - name: dotnetVerbosity
    displayName: dotnet CLI Verbosity
    type: string
    default: normal
    values:
      - quiet
      - minimal
      - normal
      - detailed
      - diagnostic

extends:
  template: /eng/pipelines/dotnet-sqlclient-ci-core.yml@self
  parameters:
    buildConfiguration: ${{ parameters.buildConfiguration }}
    buildPlatforms: ${{ parameters.buildPlatforms }}
    referenceType: Package
    debug: ${{ parameters.debug }}
    dotnetVerbosity: ${{ parameters.dotnetVerbosity }}
    enableStressTests: ${{ parameters.enableStressTests }}
    targetFrameworks: ${{ parameters.targetFrameworks }}
    targetFrameworksUnix: ${{ parameters.targetFrameworksUnix }}
    testJobTimeout: ${{ parameters.testJobTimeout }}
    testSets: ${{ parameters.testSets }}
    useManagedSNI: ${{ parameters.useManagedSNI }}
