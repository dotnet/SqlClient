# These stages are meant to validate a PR against a battery of tests to ensure confidence in the
# changes the PR presents. There is, however, a balance to be struck between completeness of
# confidence and expedience of validation.

parameters:
  - name: buildConfiguration
    type: string
    values:
      - Debug
      - Release

  - name: buildSuffix
    type: string

  - name: stageNamePack
    type: string

  - name: stageNameSecrets
    type: string

  # Manual Test Configuration Parameters ==================================

  - name: manualTestAzureKeyVaultTenantId
    type: string

  - name: manualTestAzureKeyVaultUrl
    type: string

  - name: manualTestConnectionStringNpAzure
    type: string

  - name: manualTestConnectionStringNpLocalhost
    type: string

  - name: manualTestConnectionStringTcpAzure
    type: string

  - name: manualTestConnectionStringTcpLocalhost
    type: string

  - name: manualTestFileStreamDirectory
    type: string

  - name: manualTestLocalDbAppName
    type: string

  - name: manualTestLocalDbSharedInstanceName
    type: string

  # This is an array of objects with the following fields:
  # - displayName - Friendly name to use when displaying the stage name and job names. This must
  #                 only contain alphanumeric characters and '_'. It will be used for both display
  #                 name fields and stage/job names.
  # - dotnet      - Version of dotnet runtime to use to execute the tests
  # - image       - Image to use to execute the test jobs in the pipeline
  #
  # Each one of the objects in this parameter will become a stage that executes all test projects
  # available.
  - name: platforms
    type: object
    default: []

stages:
  - ${{ each platform in parameters.platforms }}:
      - stage: "test_${{ platform.displayName }}"
        displayName: "Test: ${{ platform.displayName }}"
        dependsOn:
          - ${{ parameters.stageNamePack }}
          - ${{ parameters.stageNameSecrets }}

        variables:
          # Bring the generated SA password from the secrets stage into scope for this test stage.
          - name: manualTestSaPassword
            value: $[stageDependencies.${{ parameters.stageNameSecrets }}.secrets_job.outputs['SaPassword.Value']]

        jobs:
          # TestAbstractions
          - template: /eng/pipelines/pr/jobs/test-buildproj-job.yml@self
            parameters:
              buildConfiguration: ${{ parameters.buildConfiguration }}
              buildSuffix: ${{ parameters.buildSuffix }}
              platformDisplayName: ${{ platform.displayName }}
              platformDotnet: ${{ platform.dotnet }}
              platformImage: ${{ platform.image }}

              packageShortName: "Abstractions"
              testDisplayName: "abstractions"

          # TestAzure
          - template: /eng/pipelines/pr/jobs/test-buildproj-job.yml@self
            parameters:
              buildConfiguration: ${{ parameters.buildConfiguration }}
              buildSuffix: ${{ parameters.buildSuffix }}
              platformDisplayName: ${{ platform.displayName }}
              platformDotnet: ${{ platform.dotnet }}
              platformImage: ${{ platform.image }}

              packageShortName: "Azure"
              testDisplayName: "azure"

          # TestSqlClientFunctional
          - template: /eng/pipelines/pr/jobs/test-buildproj-job.yml@self
            parameters:
              buildConfiguration: ${{ parameters.buildConfiguration }}
              buildSuffix: ${{ parameters.buildSuffix }}
              platformDisplayName: ${{ platform.displayName }}
              platformDotnet: ${{ platform.dotnet }}
              platformImage: ${{ platform.image }}

              packageShortName: "SqlClient"
              testDisplayName: "sqlclient_functional"
              testProject: "Functional"

          # TestSqlClientManual - Localhost
          - template: /eng/pipelines/pr/jobs/test-sqlclientmanual-job.yml@self
            parameters:
              buildConfiguration: ${{ parameters.buildConfiguration }}
              buildSuffix: ${{ parameters.buildSuffix }}
              platformDisplayName: ${{ platform.displayName }}
              platformDotnet: ${{ platform.dotnet }}
              platformImage: ${{ platform.image }}

              azureKeyVaultTenantId: ${{ parameters.manualTestAzureKeyVaultTenantId }}
              azureKeyVaultUrl: ${{ parameters.manualTestAzureKeyVaultUrl }}
              connectionStringNp: ${{ parameters.manualTestConnectionStringNpLocalhost }}
              connectionStringTcp: ${{ parameters.manualTestConnectionStringTcpLocalhost }}
              fileStreamDirectory: ${{ parameters.manualTestFileStreamDirectory }}
              localDbAppName: ${{ parameters.manualTestLocalDbAppName }}
              localDbSharedInstanceName: ${{ parameters.manualTestLocalDbSharedInstanceName }}
              saPassword: $(manualTestSaPassword)

#          # TestSqlClientManual - Azure
#          - template: /eng/pipelines/pr/jobs/test-sqlclientmanual-job.yml@self
#            parameters:
#              buildConfiguration: ${{ parameters.buildConfiguration }}
#              buildSuffix: ${{ parameters.buildSuffix }}
#              platformDisplayName: ${{ platform.displayName }}
#              platformDotnet: ${{ platform.dotnet }}
#              platformImage: ${{ platform.image }}
#
#              azureKeyVaultTenantId: ${{ parameters.manualTestAzureKeyVaultTenantId }}
#              azureKeyVaultUrl: ${{ parameters.manualTestAzureKeyVaultUrl }}
#              connectionStringNp: ${{ parameters.manualTestConnectionStringNpAzure }}
#              connectionStringTcp: ${{ parameters.manualTestConnectionStringTcpAzure }}
#              fileStreamDirectory: ${{ parameters.manualTestFileStreamDirectory }}
#              localDbAppName: ${{ parameters.manualTestLocalDbAppName }}
#              localDbSharedInstanceName: ${{ parameters.manualTestLocalDbSharedInstanceName }}
#              saPassword: $(manualTestSaPassword)

          # TestSqlClientUnit
          - template: /eng/pipelines/pr/jobs/test-buildproj-job.yml@self
            parameters:
              buildConfiguration: ${{ parameters.buildConfiguration }}
              buildSuffix: ${{ parameters.buildSuffix }}
              platformDisplayName: ${{ platform.displayName }}
              platformDotnet: ${{ platform.dotnet }}
              platformImage: ${{ platform.image }}

              packageShortName: "SqlClient"
              testDisplayName: "sqlclient_unit"
              testProject: "Unit"
