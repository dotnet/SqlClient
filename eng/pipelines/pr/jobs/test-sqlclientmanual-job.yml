parameters:
  - name: buildConfiguration
    type: string
    values:
      - Debug
      - Release

  - name: buildSuffix
    type: string

  # Platform Parameters ====================================================

  - name: platformDisplayName
    type: string

  - name: platformDotnet
    type: string

  - name: platformImage
    type: string

  # Test Configuration Parameters ==========================================

  - name: azureKeyVaultTenantId
    type: string

  - name: azureKeyVaultUrl
    type: string

  - name: connectionStringNp
    type: string

  - name: connectionStringTcp
    type: string

  - name: fileStreamDirectory
    type: string

  - name: localDbAppName
    type: string

  - name: localDbSharedInstanceName
    type: string

  - name: saPassword
    type: string

jobs:
  - job: "test_${{ parameters.platformDisplayName }}_sqlclient_manual"
    displayName: "sqlclient_manual_${{ parameters.platformDisplayName }}"

    pool:
      # TEST
      name: ADO-1ES-Pool
      vmImage: ${{ parameters.platformImage }}

    steps:
      - template: /eng/pipelines/pr/steps/install-dotnet.yml@self
        parameters:
          runtimeVersion: ${{ parameters.platformDotnet }}

      - template: /eng/pipelines/pr/steps/configure-sqlserver-step.yml@self
        parameters:
          dotnetVersion: ${{ parameters.platformDotnet }}
          fileStreamDirectory: ${{ parameters.fileStreamDirectory }}
          saPassword: ${{ parameters.saPassword }}

      # @TODO: Document these thingies

      - pwsh: |
          $password = "${{ parameters.saPassword }}"
          Write-Host "##vso[task.setvariable variable=Password;isSecret=true]$password"
        displayName: Set Connection String Password

      - pwsh: |
          $defaultConfigPath = "$(REPO_ROOT)/src/Microsoft.Data.SqlClient/tests/tools/Microsoft.Data.SqlClient.TestUtilities/config.default.json"
          $configDirectory = "$(Agent.TempDirectory)/mds-config"
          $configPath = Join-Path $configDirectory "config.json"

          New-Item -ItemType Directory -Force -Path $configDirectory | Out-Null

          $config = Get-Content -Raw $defaultConfigPath | ConvertFrom-Json

          $config.TCPConnectionString = "${{ parameters.connectionStringTcp }}"
          $config.NPConnectionString = "${{ parameters.connectionStringNp }}"
          $config.AzureKeyVaultURL = "${{ parameters.azureKeyVaultUrl }}"
          $config.AzureKeyVaultTenantId = "${{ parameters.azureKeyVaultTenantId }}"
          $config.LocalDbAppName = "${{ parameters.localDbAppName }}"
          $config.LocalDbSharedInstanceName = "${{ parameters.localDbSharedInstanceName }}"
          $config.ManagedIdentitySupported = true

          $enableWindowsLocalFeatures = "$(Agent.OS)" -eq "Windows_NT"
          $config.SupportsFileStream = $enableWindowsLocalFeatures
          $config.FileStreamDirectory = if ($enableWindowsLocalFeatures) { "${{ parameters.fileStreamDirectory }}" } else { "" }
          $config.SupportsIntegratedSecurity = $enableWindowsLocalFeatures

          $config | ConvertTo-Json | Set-Content $configPath

          Write-Host "##vso[task.setvariable variable=TEST_MDS_CONFIG]$configPath"
        displayName: 'Generate manual test config'

      - template: /eng/pipelines/pr/steps/test-buildproj-step.yml
        parameters:
          buildConfiguration: ${{ parameters.buildConfiguration }}
          buildSuffix: ${{ parameters.buildSuffix }}

          packageShortName: "SqlClient"
          testFramework: ${{ parameters.platformDotnet }}
          testProject: "Manual"

