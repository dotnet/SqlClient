name: $(DayOfYear)$(Rev:rr)

variables:
  - template: /eng/pipelines/common/variables/common-variables.yml@self
  - template: /eng/pipelines/pr/variables/pr-variables.yml@self

stages:
  # Stage 1: Build and pack all projects in the repository
  - template: /eng/pipelines/pr/stages/pack-stage.yml
    parameters:
      buildConfiguration: Debug
      buildSuffix: pr

  # Stage 2: Execute tests and collect code coverage
  - template: /eng/pipelines/pr/stages/test-stages.yml
    parameters:
      buildConfiguration: Debug
      buildSuffix: pr
      manualTestConnectionStringTcp: $(SQL_TCP_CONN_STRING)
      manualTestConnectionStringNp: $(SQL_NP_CONN_STRING)
      manualTestAzureKeyVaultUrl: $(AzureKeyVaultUrl)
      manualTestAzureKeyVaultTenantId: $(AzureKeyVaultTenantId)
      manualTestFileStreamDirectory: $(FileStreamDirectory)
      manualTestLocalDbAppName: $(LocalDbAppName)
      manualTestLocalDbSharedInstanceName: $(LocalDbSharedInstanceName)
      manualTestAliasName: ''
      manualTestSupportsIntegratedSecurity: $(SupportsIntegratedSecurity)
      manualTestSupportsFileStream: 'false'
      manualTestUseManagedSNIOnWindows: $(UseManagedSNIOnWindows)
      manualTestManagedIdentitySupported: 'true'
      manualTestSaPassword: $(Password)
      platforms:
        # @TODO: Expand to cover different SQL Server targets
        - displayName: "windows_net462"
          image: "ADO-MMS22-SQL22"
          dotnet: "net462"
        - displayName: "windows_net8"
          image: "ADO-MMS22-SQL22"
          dotnet: "net8.0"
        - displayName: "windows_net9"
          image: "ADO-MMS22-SQL22"
          dotnet: "net9.0"
        - displayName: "windows_net10"
          image: "ADO-MMS22-SQL22"
          dotnet: "net10.0"

        - displayName: "linux_net8"
          image: "ADO-UB22-SQL22"
          dotnet: "net8.0"
        - displayName: "linux_net9"
          image: "ADO-UB22-SQL22"
          dotnet: "net9.0"
        - displayName: "linux_net10"
          image: "ADO-UB22-SQL22"
          dotnet: "net10.0"


