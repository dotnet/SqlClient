# This file contains variables used for running PR pipelines.

variables:
  # Libraries ==============================================================

  # These variables are used to construct the config file for manual tests.
  #
  # AzureKeyVaultTenantId
  # AzureKeyVaultUrl
  # ConnectionStringNp_Azure_ManagedIdentity
  # ConnectionStringNp_LocalhostDefault_UsernamePassword
  # ConnectionStringTcp_Azure_ManagedIdentity
  # ConnectionStringTcp_LocalhostDefault_UsernamePassword
  # LocalDbAppName
  # LocalDbSharedInstanceName
  # PoolNameDefault
  # UserManagedIdentityClientId
  - group: sqlclient-testconfig-v1

  # General Variables ======================================================

  # Name to use for the packaging stage. This is to ensure that the packaging stage and the test
  # stages (that will depend on the packaging stage passing) use the same name.
  - name: stageNamePack
    value: "pack_stage"

  # Name to use for the secret generation stage. This is to ensure that the secret generation stage
  # and the test stages (that will depend on the generated secret) use the same name.
  - name: stageNameSecrets
    value: "secrets_stage"

  # Base name of the test result artifacts. Job ID should be appended to this to prevent collision.
  - name: testResultsArtifactBaseName
    value: "test_results"
